<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2 — DRED</title>
  <link rel="icon" type="image/svg+xml" href="dred_favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Gowun+Batang:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    :root {
      --black: #000;
      --purple: #5B4FCF;
      --white: #EDEDED;
      --font-main: 'Syne', sans-serif;
      --font-kw: 'Courier Prime', 'Gowun Batang', serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%; background: var(--black);
      color: var(--white); font-family: var(--font-main); overflow: hidden;
    }

    .dred-img-gradient { display: none; } /* PC: hidden */
    .cursor-dot {
      position: fixed; width: 5px; height: 5px;
      background: rgba(237,237,237,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.1s, height 0.1s, background 0.1s;
    }
    .cursor-dot.on-btn { width: 28px; height: 28px; background: transparent; border: 1px solid rgba(91,79,207,0.65); }
    .cursor-dot.on-random { width: 3px; height: 3px; background: rgba(91,79,207,0.5); }

    /* GRAIN */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9997; opacity: 0.5;
    }

    /* LAYOUT */
    .layout { display: flex; height: 100vh; width: 100vw; }

    /* ═══ LEFT: DRED SPACE ═══ */
    .dred-space {
      width: 60%; height: 100%;
      position: relative; overflow: hidden;
      border-right: 1px solid #0f0f0f; flex-shrink: 0;
    }

    /* Primary image layers */
    .dred-img-layer {
      position: absolute; inset: 0;
      transition: opacity 0.5s ease;
    }
    .dred-img-layer img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      filter: grayscale(15%);
    }
    #dredImg1 { opacity: 1; z-index: 1; }
    #dredImg1 img { opacity: 0.72; }
    #dredImg2 { opacity: 0; z-index: 2; }
    #dredImg2 img { opacity: 0.85; }

    /* Dark overlay for transition */
    .dred-overlay {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      pointer-events: none; z-index: 3;
      transition: opacity 0.7s ease-in;
    }
    .dred-overlay.darkening { opacity: 1; }
    .dred-overlay.revealing { opacity: 0; transition: opacity 0.6s ease-out; }

    /* Ambient cycling states (above overlay) */
    .dred-ambient {
      position: absolute; inset: 0; z-index: 4;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 1.4s ease; pointer-events: none;
    }
    .dred-ambient.active { opacity: 1; }

    .dred-big-text {
      font-family: var(--font-main);
      font-size: clamp(7rem,15vw,15rem); font-weight: 800;
      color: var(--white); letter-spacing: -0.05em; opacity: 0.04; user-select: none;
    }
    .dred-state-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 35% 65%, rgba(91,79,207,0.14) 0%, transparent 68%);
      display: flex; align-items: center; justify-content: center;
    }
    .dred-glow-dot {
      width: 2px; height: 2px; background: var(--purple); border-radius: 50%;
      box-shadow: 0 0 80px 40px rgba(91,79,207,0.22), 0 0 160px 100px rgba(91,79,207,0.07);
      animation: glow-pulse 5s ease-in-out infinite;
    }
    @keyframes glow-pulse { 0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.85;transform:scale(2);} }

    .dred-state-quote {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-end;
      padding: 3rem;
    }
    .dred-quote-label {
      font-family: var(--font-mono); font-size: 0.58rem;
      color: var(--purple); letter-spacing: 0.22em;
      text-transform: uppercase; margin-bottom: 0.9rem;
    }
    .dred-quote-text {
      font-family: var(--font-mono); font-size: clamp(0.78rem,1vw,0.95rem);
      font-weight: 300; color: #3a3a3a; line-height: 1.8; max-width: 320px;
    }

    .dred-space::before {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 1px; height: 26%;
      background: linear-gradient(to top, var(--purple), transparent); z-index: 10;
    }

    /* ═══ RIGHT: INTERACT ═══ */
    .interact-space {
      width: 40%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    /* TOP BAR */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 2rem; z-index: 20;
    }
    .d2-label { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.22em; color: var(--purple); text-transform: uppercase; }
    .lang-toggle { display: flex; border: 1px solid #181818; }
    .lang-btn { background: none; border: none; padding: 0.28rem 0.6rem; font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; color: #2a2a2a; transition: all 0.15s; }
    .lang-btn.active { background: var(--purple); color: var(--white); }

    /* SCREENS */
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
    .screen.visible { display: flex; }

    /* SELECT */
    #screen-select { padding-top: 4rem; }
    .scatter-area { position: relative; flex: 1; overflow: hidden; }

    /* KEYWORDS */
    .kw-btn {
      position: absolute;
      background: none; border: none;
      font-family: var(--font-kw); font-weight: 700; font-size: 0.9rem;
      letter-spacing: -0.01em; white-space: nowrap;
      line-height: 1; padding: 0.15rem 0;
      color: var(--white);
      transform-origin: center center; will-change: transform;
      transition: opacity 0.22s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .kw-btn.selected { color: var(--purple) !important; }
    .kw-btn.fading { opacity: 0 !important; pointer-events: none; transition: opacity 0.2s ease !important; }

    /* RANDOM */
    .random-area { position: absolute; bottom: 1.8rem; left: 2rem; }
    .random-btn {
      background: none; border: none;
      font-family: var(--font-mono); font-size: 0.6rem;
      color: #1e1e1e; letter-spacing: 0.08em;
      transition: color 0.2s; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .random-btn:hover { color: #404040; }

    /* Panel flash */
    .panel-flash {
      position: absolute; inset: 0;
      background: rgba(91,79,207,0.06);
      pointer-events: none; z-index: 30;
      animation: panel-flash-out 0.6s ease forwards;
    }
    @keyframes panel-flash-out { 0%{opacity:1;}100%{opacity:0;} }

    /* LOADING */
    #screen-loading { align-items: center; justify-content: center; }
    .loading-text {
      font-family: var(--font-main);
      font-size: clamp(1.8rem,4vw,3.2rem);
      font-weight: 800; letter-spacing: -0.04em; color: var(--white);
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:1;}50%{opacity:0.1;} }

    /* RESULT */
    #screen-result { padding: 4.5rem 2rem 1.8rem; justify-content: space-between; overflow-y: auto; }
    .result-top { flex: 1; }
    .result-meta { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.22em; color: var(--purple); text-transform: uppercase; margin-bottom: 2rem; }
    .result-artist { font-family: var(--font-mono); font-size: 0.68rem; font-weight: 300; color: #3a3a3a; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .result-title { font-family: var(--font-main); font-size: clamp(1.8rem,4.2vw,3.8rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; color: var(--white); margin-bottom: 1.6rem; }
    .result-dred-line { font-family: var(--font-mono); font-size: clamp(0.9rem,1.3vw,1.05rem); font-weight: 300; font-style: italic; color: #5a5a5a; line-height: 1.75; border-left: 1px solid var(--purple); padding-left: 1rem; margin-bottom: 1.8rem; max-width: 310px; }
    .spotify-wrap { margin-bottom: 1.5rem; }
    .spotify-wrap iframe { border-radius: 2px; width: 100%; }
    .result-actions { display: flex; gap: 2rem; justify-content: flex-end; align-items: center; flex-shrink: 0; }
    .action-btn { background: none; border: none; font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: #282828; transition: color 0.15s; padding: 0; -webkit-tap-highlight-color: transparent; }
    .action-btn:hover { color: var(--white); }
    .action-btn.primary { color: var(--purple); }
    .action-btn.primary:hover { color: var(--white); }

    /* SHARE */
    .share-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; align-items: center; justify-content: center; z-index: 200; }
    .share-overlay.visible { display: flex; }
    .share-card { background: #000; border: 1px solid #181818; width: 300px; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 1.5rem; position: relative; overflow: hidden; }
    .share-card::after { content: ''; position: absolute; bottom: 0; right: 0; width: 80px; height: 80px; background: radial-gradient(at 100% 100%, rgba(91,79,207,0.16) 0%, transparent 70%); }
    .sc-top { font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.22em; color: var(--purple); text-transform: uppercase; }
    .sc-artist { font-family: var(--font-mono); font-size: 0.62rem; color: #2e2e2e; margin-bottom: 0.2rem; }
    .sc-title { font-family: var(--font-main); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; color: var(--white); margin-bottom: 0.6rem; }
    .sc-line { font-family: var(--font-mono); font-size: 0.65rem; font-style: italic; color: #333; line-height: 1.6; }
    .sc-footer { font-family: var(--font-mono); font-size: 0.48rem; letter-spacing: 0.15em; color: #181818; text-transform: uppercase; }
    .share-close { position: absolute; top: -1.8rem; right: 0; background: none; border: none; color: #2a2a2a; font-size: 1.2rem; padding: 0.5rem; transition: color 0.15s; }
    .share-close:hover, .share-close:active { color: var(--white); }
    .share-hint { margin-top: 0.7rem; font-family: var(--font-mono); font-size: 0.52rem; color: #1e1e1e; letter-spacing: 0.1em; text-align: center; }

    /* ═══ MOBILE ═══ */
    @media (max-width: 767px) {
      .cursor-dot { display: none; }
      *, *::before, *::after { cursor: auto !important; }

      .dred-space { position: fixed; inset: 0; width: 100%; border-right: none; z-index: 0; }
      #dredImg1 img, #dredImg2 img { opacity: 0.55; }

      /* Gradient: top bright, bottom dark */
      .dred-img-gradient {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: linear-gradient(
          to bottom,
          rgba(0,0,0,0)   0%,
          rgba(0,0,0,0)   25%,
          rgba(0,0,0,0.5) 55%,
          rgba(0,0,0,0.7) 100%
        );
      }

      .interact-space { position: fixed; inset: 0; width: 100%; z-index: 10; background: transparent; }
      .kw-btn { font-size: 1.1rem !important; }
      .random-btn { font-size: 0.72rem; padding: 0.5rem 0; }
      .random-area { bottom: 2rem; left: 1.5rem; }

      #screen-result {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 72vh; background: rgba(0,0,0,0.92);
        backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
        border-top: 1px solid #1a1a1a; border-radius: 12px 12px 0 0;
        padding: 1.8rem 1.5rem 2.5rem;
        transform: translateY(100%);
        transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
        overflow-y: auto; z-index: 30;
      }
      #screen-result.visible { display: flex; transform: translateY(0); }
      .result-title { font-size: 1.9rem; margin-bottom: 1.2rem; }
      .result-dred-line { font-size: 0.92rem; }

      #screen-loading { position: fixed; inset: 0; z-index: 30; background: transparent; }
    }
  </style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<div class="layout">

  <!-- LEFT: DRED -->
  <div class="dred-space">

    <!-- State 1: selection (DRED not looking) -->
    <div class="dred-img-layer" id="dredImg1">
      <img src="https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_d2_state1.webp" alt="">
    </div>

    <!-- State 2: result (DRED watching) -->
    <div class="dred-img-layer" id="dredImg2">
      <img src="https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_d2_state2.webp" alt="">
    </div>

    <!-- Gradient overlay (mobile only) -->
    <div class="dred-img-gradient"></div>

    <!-- Transition overlay -->
    <div class="dred-overlay" id="dredOverlay"></div>

    <!-- Ambient cycling (text / glow / quote) -->
    <div class="dred-ambient" id="ambText">
      <div class="dred-big-text" id="bigText">.</div>
    </div>
    <div class="dred-ambient" id="ambGlow">
      <div class="dred-state-glow">
        <div class="dred-glow-dot"></div>
      </div>
    </div>
    <div class="dred-ambient" id="ambQuote">
      <div class="dred-state-quote">
        <div class="dred-quote-label">DRED</div>
        <div class="dred-quote-text" id="quoteText"></div>
      </div>
    </div>

  </div>

  <!-- RIGHT: INTERACT -->
  <div class="interact-space" id="interactSpace">
    <div class="top-bar">
      <span class="d2-label">D2</span>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">KO</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <div class="screen visible" id="screen-select">
      <div class="scatter-area" id="scatterArea"></div>
      <div class="random-area">
        <button class="random-btn" id="randomBtn" onclick="submitRandom()"></button>
      </div>
    </div>

    <div class="screen" id="screen-loading">
      <div class="loading-text" id="loadingText">잠깐 기다려..</div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-top">
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-artist" id="resultArtist"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-dred-line" id="resultDredLine"></div>
        <div class="spotify-wrap" id="spotifyWrap"></div>
      </div>
      <div class="result-actions">
        <button class="action-btn" onclick="resetToSelect()" id="btnAgain"></button>
        <button class="action-btn primary" onclick="openShare()" id="btnShare"></button>
      </div>
    </div>
  </div>
</div>

<div class="share-overlay" id="shareOverlay">
  <div style="position:relative">
    <div class="share-card">
      <div class="sc-top">D2 · DRED</div>
      <div>
        <div class="sc-artist" id="sc-artist"></div>
        <div class="sc-title" id="sc-title"></div>
        <div class="sc-line" id="sc-line"></div>
      </div>
      <div class="sc-footer">kinxdred.com/dred/d2</div>
    </div>
    <button class="share-close" onclick="closeShare()">×</button>
    <div class="share-hint" id="shareHint"></div>
  </div>
</div>

<script>
const KEYWORDS = {
  ko: ['퇴근하는 길','새벽인데','밥은 혼자','잠이 안 와','그냥 걷고 싶어','어딘가 가는 중','그냥 지쳤어','멍때리는 중','뭔가 놓친 것 같아','할 말이 있는데','결정을 못 하겠어','괜찮다고 했는데','끝난 것 같은데','이유 없이 별로','설레면 안 되는데'],
  en: ['on the way home',"it's 3am",'eating alone',"can't sleep",'just walking','going somewhere','just tired','zoning out','feels like i missed something','i have something to say',"can't decide",'said i was fine',"feels like it's over",'off for no reason',"shouldn't be excited"]
};
const COPY = {
  ko: { random:'— 그냥 줘', again:'다시', share:'공유', hint:'스크린샷으로 저장하세요', meta:'DRED의 선곡', loading:'잠깐 기다려..' },
  en: { random:'— just give it', again:'again', share:'share', hint:'screenshot to save', meta:"DRED's pick", loading:'hold on..' }
};
const DRED_QUOTES = {
  ko: ['알고 있어.','봐.','그래서.','네가 고른 거야.','이미 답 알잖아.','상관없어.'],
  en: ['already knew.','watching.','so.','your pick.','you already know.',"doesn't matter."]
};
const BIG_TEXTS = ['.','..','D','R','E','D','..'];
const API_URL = 'https://d2-api-production.up.railway.app/api/d2/now';
const OVERLAY_DURATION = 700; // ms for overlay to go dark

let currentLang = 'ko';
let selectedTags = [];
let currentResult = null;
let autoSubmitTimer = null;
let ambStateIndex = 0;
let ambTimer = null;
const isMobile = window.innerWidth < 768;

/* CURSOR */
const cursorDot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e => {
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseover', e => {
  const t = e.target.closest('.kw-btn') || e.target;
  cursorDot.classList.remove('on-btn','on-random');
  if (t.classList.contains('kw-btn')) cursorDot.classList.add('on-btn');
  else if (t.classList.contains('random-btn')) cursorDot.classList.add('on-random');
});

/* ═══ ANIMATOR ═══ */
class KWAnimator {
  constructor(el) {
    this.el = el; this.floatAnim = null; this.hoverAnim = null; this.phase = 'float';
    this.startFloat();
    if (!isMobile) {
      el.addEventListener('mouseenter', () => this.onHover());
      el.addEventListener('mouseleave', () => this.onLeave());
    }
  }
  startFloat() {
    const dur = 8000 + Math.random() * 5000;
    const del = -Math.random() * dur;
    const dx1 = (Math.random()-.5)*(isMobile?18:22), dy1 = (Math.random()-.5)*(isMobile?14:18);
    const dx2 = (Math.random()-.5)*(isMobile?18:22), dy2 = (Math.random()-.5)*(isMobile?14:18);
    this.floatAnim = this.el.animate([
      {transform:`translate(0px,0px) scale(0.93)`},
      {transform:`translate(${dx1}px,${dy1}px) scale(1.07)`},
      {transform:`translate(${dx2}px,${dy2*.5}px) scale(0.96)`},
      {transform:`translate(${dx1*.3}px,${dy2}px) scale(1.09)`},
      {transform:`translate(0px,0px) scale(0.93)`},
    ], {duration:dur, delay:del, iterations:Infinity, easing:'ease-in-out'});
  }
  getScale() { const m = new DOMMatrix(window.getComputedStyle(this.el).transform); return Math.sqrt(m.a*m.a+m.b*m.b)||1; }
  cancelHover() { if (this.hoverAnim) { this.hoverAnim.cancel(); this.hoverAnim = null; } }
  onHover() {
    if (this.phase==='selected') return;
    this.phase='approaching';
    if (this.floatAnim) this.floatAnim.pause();
    const s0 = this.getScale(); this.cancelHover();
    this.hoverAnim = this.el.animate([{transform:`scale(${s0})`},{transform:'scale(1.4)'}],{duration:1000,easing:'ease-out',fill:'forwards'});
    this.hoverAnim.onfinish = () => {
      if (this.phase!=='approaching') return;
      this.phase='oscillating'; this.cancelHover();
      this.hoverAnim = this.el.animate([{transform:'scale(1.4)'},{transform:'scale(1.2)'},{transform:'scale(1.4)'}],{duration:1400,easing:'ease-in-out',iterations:Infinity});
    };
  }
  onLeave() {
    if (this.phase==='selected') return;
    this.phase='leaving';
    const s0 = this.getScale(); this.cancelHover();
    const under = Math.max(s0*.82,.88);
    this.hoverAnim = this.el.animate([{transform:`scale(${s0})`},{transform:`scale(${under})`},{transform:'scale(1.05)'},{transform:'scale(0.97)'},{transform:'scale(1.0)'}],{duration:480,easing:'ease-out',fill:'forwards'});
    this.hoverAnim.onfinish = () => {
      if (this.phase!=='leaving') return;
      this.cancelHover(); this.el.style.transform=''; this.phase='float';
      if (this.floatAnim) this.floatAnim.play();
    };
  }
  select() {
    this.phase='selected'; const s0=this.getScale(); this.cancelHover();
    if (this.floatAnim) this.floatAnim.pause();
    this.hoverAnim = this.el.animate([{transform:`scale(${s0})`},{transform:'scale(1.28)',offset:0.3},{transform:'scale(1.2)'}],{duration:360,easing:'ease-out',fill:'forwards'});
  }
  deselect() {
    this.phase='float'; this.cancelHover(); this.el.style.transform='';
    if (this.floatAnim) this.floatAnim.play();
  }
  fadeOut() {
    this.phase='selected'; this.cancelHover();
    if (this.floatAnim) this.floatAnim.pause();
    this.el.classList.add('fading');
  }
}

/* ═══ IMAGE TRANSITION ═══ */
function startOverlay() {
  return new Promise(resolve => {
    const overlay = document.getElementById('dredOverlay');
    overlay.classList.remove('revealing');
    // Force reflow
    void overlay.offsetWidth;
    overlay.classList.add('darkening');
    setTimeout(resolve, OVERLAY_DURATION);
  });
}

function revealState2() {
  const img1    = document.getElementById('dredImg1');
  const img2    = document.getElementById('dredImg2');
  const overlay = document.getElementById('dredOverlay');

  // Swap images while screen is black
  img1.style.opacity = '0';
  img2.style.opacity = '1';

  // Fade overlay back out
  overlay.classList.remove('darkening');
  void overlay.offsetWidth;
  overlay.classList.add('revealing');
}

function resetImages() {
  const img1    = document.getElementById('dredImg1');
  const img2    = document.getElementById('dredImg2');
  const overlay = document.getElementById('dredOverlay');
  img1.style.opacity = '1';
  img2.style.opacity = '0';
  overlay.classList.remove('darkening','revealing');
  overlay.style.opacity = '';
}

/* ═══ LANG ═══ */
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang===lang));
  renderKeywords(); updateCopy();
}
function updateCopy() {
  const c = COPY[currentLang];
  document.getElementById('randomBtn').textContent   = c.random;
  document.getElementById('btnAgain').textContent    = c.again;
  document.getElementById('btnShare').textContent    = c.share;
  document.getElementById('shareHint').textContent   = c.hint;
  document.getElementById('loadingText').textContent = c.loading;
  const qt = document.getElementById('quoteText');
  if (qt.textContent) qt.textContent = pick(DRED_QUOTES[currentLang]);
}

/* ═══ PLACEMENT ═══ */
function placeKeywords(buttons, area) {
  const rect = area.getBoundingClientRect();
  const W=rect.width, H=rect.height;
  const xPad=W*.05, yTop=H*(isMobile?.30:.30), yPad=H*.05;
  const xMax=W-xPad, yMax=H-yPad, GAP=isMobile?20:14;
  const placed=[];
  buttons.forEach(btn => {
    const bw=btn.offsetWidth, bh=btn.offsetHeight;
    let best=null;
    for (let t=0; t<400; t++) {
      const l=xPad+Math.random()*Math.max(1,xMax-xPad-bw);
      const t2=yTop+Math.random()*Math.max(1,yMax-yTop-bh);
      const r=l+bw+GAP, b=t2+bh+GAP;
      if (!placed.some(p=>l<p.r&&r>p.l&&t2<p.b&&b>p.t)) { best={l,t:t2,r,b}; break; }
    }
    if (!best) { const l=xPad+Math.random()*Math.max(1,xMax-xPad-bw); const t2=yTop+Math.random()*Math.max(1,yMax-yTop-bh); best={l,t:t2,r:l+bw+GAP,b:t2+bh+GAP}; }
    placed.push(best); btn.style.left=best.l+'px'; btn.style.top=best.t+'px';
  });
}

/* ═══ RENDER ═══ */
let animators=[];
function renderKeywords() {
  clearTimeout(autoSubmitTimer); selectedTags=[]; animators=[];
  const area=document.getElementById('scatterArea'); area.innerHTML='';
  const buttons=KEYWORDS[currentLang].map((kw,i)=>{
    const btn=mkBtn(kw,i); btn.style.visibility='hidden'; btn.style.left='0'; btn.style.top='0';
    area.appendChild(btn); return btn;
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    placeKeywords(buttons,area);
    buttons.forEach((btn,i)=>{ btn.style.visibility='visible'; animators.push(new KWAnimator(btn)); });
  }));
}
function mkBtn(kw,i) {
  const btn=document.createElement('button'); btn.className='kw-btn'; btn.dataset.index=i; btn.textContent=kw;
  btn.onclick=()=>toggle(btn,i); return btn;
}

/* ═══ TOGGLE ═══ */
function toggle(btn, index) {
  clearTimeout(autoSubmitTimer);
  const kw=KEYWORDS[currentLang][index], isSel=btn.classList.contains('selected');
  if (isSel) {
    btn.classList.remove('selected'); selectedTags=selectedTags.filter(t=>t!==kw); animators[index].deselect();
    document.querySelectorAll('.kw-btn').forEach(b=>{ b.classList.remove('fading'); b.style.opacity=''; if(!b.classList.contains('selected')){ const ai=parseInt(b.dataset.index); if(!isNaN(ai)&&animators[ai]) animators[ai].deselect(); } });
    return;
  }
  if (selectedTags.length>=2) return;
  btn.classList.add('selected'); selectedTags.push(kw); animators[index].select();
  if (selectedTags.length===1) {
    document.querySelectorAll('.kw-btn:not(.selected)').forEach(b=>{ b.style.opacity='0.35'; });
  } else {
    /* Panel flash */
    const flash=document.createElement('div'); flash.className='panel-flash';
    document.getElementById('interactSpace').appendChild(flash);
    setTimeout(()=>flash.remove(),700);
    /* Fade others */
    document.querySelectorAll('.kw-btn:not(.selected)').forEach(b=>{ const ai=parseInt(b.dataset.index); if(!isNaN(ai)&&animators[ai]) animators[ai].fadeOut(); });
    /* Go */
    autoSubmitTimer = setTimeout(()=>submitSelection(), 300);
  }
}

/* ═══ API ═══ */
async function submitSelection() {
  const koTags=selectedTags.map(tag=>{ const ei=KEYWORDS.en.indexOf(tag); return ei>=0?KEYWORDS.ko[ei]:tag; });
  await callAPI(koTags, false);
}
async function submitRandom() { await callAPI([], true); }

async function callAPI(tags, isRandom) {
  /* Show loading in right panel */
  showScreen('loading');

  /* Stop ambient cycling during transition */
  stopAmbient();

  /* Run overlay animation + API call simultaneously */
  const overlayPromise = startOverlay();
  const apiPromise = fetch(API_URL, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({tags, is_random: isRandom, lang: currentLang})
  }).then(r => { if (!r.ok) throw new Error('err'); return r.json(); });

  try {
    /* Wait for BOTH to finish */
    const [_, data] = await Promise.all([overlayPromise, apiPromise]);
    currentResult = data;
    /* Reveal state2 and result simultaneously */
    revealState2();
    showResult(data);
  } catch {
    /* On error: reverse overlay, back to select */
    const overlay = document.getElementById('dredOverlay');
    overlay.classList.remove('darkening');
    void overlay.offsetWidth;
    overlay.classList.add('revealing');
    showScreen('select');
    startAmbient();
  }
}

function showResult(data) {
  const c=COPY[currentLang];
  document.getElementById('resultMeta').textContent    = c.meta;
  document.getElementById('resultArtist').textContent  = data.track.artist;
  document.getElementById('resultTitle').textContent   = data.track.title;
  document.getElementById('resultDredLine').textContent= data.dred_line;
  document.getElementById('spotifyWrap').innerHTML=
    `<iframe src="https://open.spotify.com/embed/track/${data.track.spotify_id}?utm_source=generator&theme=0"
      height="80" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"></iframe>`;
  showScreen('result');
}

function showScreen(name) {
  ['select','loading','result'].forEach(s=>
    document.getElementById(`screen-${s}`).classList.toggle('visible', s===name)
  );
}

function resetToSelect() {
  document.getElementById('spotifyWrap').innerHTML='';
  resetImages();
  renderKeywords(); updateCopy(); showScreen('select');
  startAmbient();
}

/* ═══ SHARE ═══ */
function openShare() {
  if (!currentResult) return;
  document.getElementById('sc-artist').textContent=currentResult.track.artist;
  document.getElementById('sc-title').textContent =currentResult.track.title;
  document.getElementById('sc-line').textContent  =currentResult.dred_line;
  document.getElementById('shareOverlay').classList.add('visible');
}
function closeShare() { document.getElementById('shareOverlay').classList.remove('visible'); }
document.getElementById('shareOverlay').addEventListener('click', function(e){ if(e.target===this) closeShare(); });

/* ═══ AMBIENT CYCLING ═══ */
const AMB_STATES = ['ambText','ambGlow','ambQuote'];

function startAmbient() {
  ambTimer = setTimeout(cycleAmbient, 10000);
}
function stopAmbient() {
  clearTimeout(ambTimer);
  AMB_STATES.forEach(s=>document.getElementById(s).classList.remove('active'));
}
function cycleAmbient() {
  AMB_STATES.forEach(s=>document.getElementById(s).classList.remove('active'));
  ambStateIndex = (ambStateIndex+1) % AMB_STATES.length;
  if (ambStateIndex===0) document.getElementById('bigText').textContent=pick(BIG_TEXTS);
  if (ambStateIndex===2) document.getElementById('quoteText').textContent=pick(DRED_QUOTES[currentLang]);
  document.getElementById(AMB_STATES[ambStateIndex]).classList.add('active');
  ambTimer = setTimeout(cycleAmbient, [8000,6000,10000][ambStateIndex]);
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

/* INIT */
renderKeywords();
updateCopy();
startAmbient();
</script>
