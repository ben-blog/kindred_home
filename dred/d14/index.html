<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>D14 · hour</title>
  <link rel="icon" type="image/svg+xml" href="dred_d14_favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=DM+Mono:wght@300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --text-ts:#fff; --text-msg:#909090; --text-ui:#444; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { width:100%; height:100%; background:#000; overflow:hidden; }

    #gl {
      position:fixed; inset:0; width:100%; height:100%;
      opacity:0; transition:opacity 2.5s ease-in-out; z-index:1;
    }
    #gl.visible { opacity:1; }

    /* 하단 텍스트 가독성 그라데이션 */
    .vignette {
      position:fixed; inset:0; z-index:2; pointer-events:none;
      background:
        linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 20%, rgba(0,0,0,0.08) 45%, transparent 65%),
        linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 12%);
    }

    .black-overlay {
      position:fixed; inset:0; background:#000;
      z-index:20; opacity:1; transition:opacity 0.8s ease-out; pointer-events:none;
    }
    .black-overlay.gone { opacity:0; }

    .meta-top {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between;
      padding:1.5rem 2rem;
      padding-top:max(1.5rem, env(safe-area-inset-top) + 0.5rem);
      z-index:15; opacity:0; transition:opacity 0.6s ease; pointer-events:none;
    }
    .meta-top.visible { opacity:1; pointer-events:auto; }
    .meta-top span, .meta-top a {
      font-family:'DM Mono',monospace; font-size:11px; font-weight:300;
      color:var(--text-ui); letter-spacing:0.08em; text-decoration:none;
    }
    .meta-top a:hover { color:#666; }

    .content {
      position:fixed; left:2rem;
      bottom:max(2.4rem, env(safe-area-inset-bottom) + 1.2rem);
      z-index:10; display:flex; flex-direction:column;
      align-items:flex-start; gap:0.5rem; pointer-events:none;
    }

    .timestamp-wrap {
      opacity:0; transform:translateY(4px);
      transition:opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .timestamp-wrap.visible { opacity:1; transform:translateY(0); }

    .timestamp {
      font-family:'Share Tech Mono','Courier New',monospace;
      font-size:clamp(3rem,8vw,5.5rem);
      color:var(--text-ts); letter-spacing:0.06em; line-height:1;
    }

    .message-wrap {
      text-align:left; max-width:min(480px,78vw);
      opacity:0; transition:opacity 0.3s ease;
    }
    .message-wrap.visible { opacity:1; }

    .message {
      font-family:'Cormorant Garamond',Georgia,serif;
      font-style:italic; font-size:clamp(1rem,2.2vw,1.4rem);
      color:var(--text-msg); line-height:1.65; letter-spacing:0.01em;
    }

    .cursor {
      display:inline-block; width:1.5px; height:1em;
      background:var(--text-msg); vertical-align:text-bottom; margin-left:1px;
      animation:blink 500ms step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

    .share-btn {
      position:fixed;
      bottom:max(1.8rem, env(safe-area-inset-bottom) + 0.8rem);
      right:2rem;
      font-family:'DM Mono',monospace; font-size:11px; font-weight:300;
      color:var(--text-ui); letter-spacing:0.1em;
      background:none; border:none; cursor:pointer;
      opacity:0; transition:opacity 0.6s ease, color 0.2s;
      pointer-events:none; z-index:15; min-width:2rem; text-align:right;
    }
    .share-btn.visible { opacity:1; pointer-events:auto; }
    .share-btn:hover { color:#888; }
    .share-btn:disabled { opacity:0.4; cursor:default; }
  </style>
</head>
<body>

<canvas id="gl"></canvas>
<div class="vignette"></div>
<div class="black-overlay" id="blackOverlay"></div>

<div class="meta-top" id="metaTop">
  <span>D14 · hour</span>
  <a href="/">kinxdred.com</a>
</div>

<div class="content">
  <div class="timestamp-wrap" id="tsWrap">
    <div class="timestamp" id="tsDisplay"></div>
  </div>
  <div class="message-wrap" id="msgWrap">
    <div class="message" id="msgDisplay"></div>
  </div>
</div>

<button class="share-btn" id="shareBtn"></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── 설정 ───────────────────────────────────────────────
const API_BASE = 'https://d2-api-production.up.railway.app';
const CDN = 'https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred';

const IMAGE_CONFIG = [
  { url:`${CDN}/dred_d1-2_rush_hour.webp`,   effect:0.0, transition:0.0 },
  { url:`${CDN}/dred_g4_highway_wall.webp`,   effect:1.0, transition:1.0 },
  { url:`${CDN}/dred_rooftop_sunset_v1.webp`, effect:2.0, transition:2.0 },
];

const IMAGE_ASPECT        = 0.75;
const HOLD_DURATION       = 25000;
const TRANSITION_DURATION = 5000;

// 공유 이미지 크기 (4:5 Instagram)
const SHARE_W = 1080, SHARE_H = 1350;

// ── D14 로직 ───────────────────────────────────────────
const lang    = navigator.language?.startsWith('ko') ? 'ko' : 'en';
const now     = new Date();
const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
document.documentElement.lang = lang;

const period = (h=>{
  if(h>=2&&h<5)return 0; if(h>=5&&h<8)return 1;
  if(h>=8&&h<12)return 2; if(h>=12&&h<14)return 3;
  if(h>=14&&h<18)return 4; if(h>=18&&h<21)return 5; return 6;
})(now.getHours());

function getVisitorId(){
  let id=localStorage.getItem('d14_visitor_id');
  if(!id){id='v_'+crypto.randomUUID().replace(/-/g,'').slice(0,16);localStorage.setItem('d14_visitor_id',id);}
  return id;
}
const visitorId=getVisitorId();
const visitKey=`d14_visits_${dateStr}`;
const visitNum=parseInt(localStorage.getItem(visitKey)||'0')+1;
localStorage.setItem(visitKey,String(visitNum));
const cacheKey=`d14_${visitorId}_${dateStr}_${period}`;
const getCached=()=>localStorage.getItem(cacheKey);
const setCache=msg=>localStorage.setItem(cacheKey,msg);

const FALLBACK={
  ko:["아무것도 끝나지 않은 채로 새벽이 왔어.","오늘이 어제처럼 될 것 같은 기분.","지금 뭔가 미루고 있어.","밥 먹는 동안 피하고 있는 게 있어.","가장 느린 빛이 드는 시간이야.","오늘 만난 사람들이 아직 몸에 남아있어.","오늘이 이미 정해진 것 같은 기분."],
  en:["Dawn arrived and nothing ended.","Already feels like yesterday.","Something being put off right now.","Avoiding something over lunch.","The slowest light of the day.","The people from today still linger.","The day already feels decided."]
};

async function fetchMessage(){
  const cached=getCached(); if(cached)return cached;
  try{
    const params=new URLSearchParams({lang,hour:now.getHours(),day:now.getDay(),month:now.getMonth()+1,isWeekend:(now.getDay()===0||now.getDay()===6),visitCount:visitNum});
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch(`${API_BASE}/api/d14/now?${params}`,{signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok)throw new Error();
    const data=await res.json();
    const msg=(data.message||'').replace(/\\n/g,'\n')||FALLBACK[lang][period];
    setCache(msg);return msg;
  }catch{
    const msg=FALLBACK[lang][period];setCache(msg);return msg;
  }
}

function typewrite(el,text,delay,onDone){
  let i=0;el.textContent='';
  const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);
  const iv=setInterval(()=>{
    if(i<text.length){const ch=text[i++];el.insertBefore(ch==='\n'?document.createElement('br'):document.createTextNode(ch),cur);}
    else{clearInterval(iv);setTimeout(()=>{cur.remove();if(onDone)onDone();},200);}
  },delay);
}

const $=id=>document.getElementById(id);
$('tsDisplay').textContent=timeStr;
$('shareBtn').textContent=lang==='ko'?'공유':'share';

// ── Three.js ────────────────────────────────────────────
const canvas=$('gl');
// preserveDrawingBuffer: 공유 이미지 캡처에 필요
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
const scene=new THREE.Scene();
const camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const clock=new THREE.Clock();

const vertexShader=`
varying vec2 vUv;
void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;

const fragmentShader=`
precision highp float;
uniform sampler2D uTex1,uTex2;
uniform float uProgress,uTime,uImageAspect,uPhase,uEffect,uTransition;
uniform vec2 uResolution;
varying vec2 vUv;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}return v;}

// B+C 전략: contain + 엣지 블리드
// 이미지 원본 구도 유지, 바깥 영역은 엣지 색상이 어둠으로 번짐
vec2 containUv(vec2 uv){
  float sa=uResolution.x/uResolution.y;
  if(sa>uImageAspect){
    // PC: 높이 맞춤, 좌우 블리드
    float imgW=uImageAspect/sa;
    return vec2((uv.x-0.5)/imgW+0.5, uv.y);
  } else {
    // 모바일: 너비 맞춤, 상하 블리드
    float imgH=(sa/uImageAspect);
    return vec2(uv.x, (uv.y-0.5)/imgH+0.5);
  }
}

float bleedFactor(vec2 imgUv){
  float dx=max(0.0,max(-imgUv.x,imgUv.x-1.0));
  float dy=max(0.0,max(-imgUv.y,imgUv.y-1.0));
  float dist=length(vec2(dx,dy));
  return exp(-dist*8.0)*0.45;
}

vec2 drift(vec2 uv){return uv+vec2(sin(uTime*0.07)*0.006,cos(uTime*0.05)*0.004);}

void main(){
  vec2 imgUv=containUv(vUv);
  bool inImage=imgUv.x>=0.0&&imgUv.x<=1.0&&imgUv.y>=0.0&&imgUv.y<=1.0;
  float bleed=inImage?1.0:bleedFactor(imgUv);
  vec2 driftedUv=clamp(drift(imgUv),0.001,0.999);
  vec2 imgUvC=clamp(imgUv,0.001,0.999);

  if(uPhase<0.5){
    // HOLDING
    vec4 c=texture2D(uTex1,inImage?driftedUv:imgUvC)*bleed;

    if(bleed>0.01){
      if(uEffect<0.5){
        // Rush hour: 도시 불빛 상승 (이미지 영역에만)
        float mask=smoothstep(0.65,0.28,imgUv.y)*bleed;
        for(int i=0;i<6;i++){
          float fi=float(i);
          float xp=fract(fi*0.17+0.06),yp=fract(uTime*(0.08+fi*0.035)+fi*0.22);
          float pt=exp(-abs(imgUv.x-xp)*60.0)*exp(-abs(imgUv.y-yp)*45.0);
          c.rgb+=vec3(1.0,0.82,0.32)*pt*mask*0.3;
        }
      } else if(uEffect<1.5){
        // Highway: 수평 streak
        for(int i=0;i<4;i++){
          float fi=float(i);
          float xp=fract(uTime*(0.38+fi*0.16)+fi*0.28),yp=0.40+fi*0.08,len=0.20;
          float s=smoothstep(xp-len,xp,imgUv.x)*smoothstep(xp+0.04,xp,imgUv.x)*exp(-abs(imgUv.y-yp)*30.0);
          c.rgb+=vec3(1.0,0.42,0.08)*s*0.32*bleed;
        }
      } else {
        // Rooftop: 하늘 pulse + 네온
        float sky=smoothstep(0.55,0.0,imgUv.y)*bleed;
        c.rgb+=vec3(0.06,0.01,0.18)*sky*(sin(uTime*1.1)*0.5+0.5)*0.10;
        float neon=smoothstep(0.88,1.0,imgUv.y)*bleed;
        c.rgb+=vec3(0.5,0.0,0.85)*neon*(sin(uTime*2.0+imgUv.x*9.0)*0.5+0.5)*0.22;
      }
    }
    gl_FragColor=c;

  } else {
    // TRANSITIONING
    vec2 d1=inImage?driftedUv:imgUvC;
    vec4 c1=texture2D(uTex1,d1)*bleed;
    vec4 c2=texture2D(uTex2,imgUvC)*bleed;

    if(uTransition<0.5){
      float n=noise(imgUv*3.5+vec2(uTime*0.07,0.0))*0.16;
      float edgeW=0.22,nMax=0.16;
      float waveY=(1.0+nMax+edgeW)-uProgress*(1.0+nMax+2.0*edgeW);
      float blend=smoothstep(waveY,waveY+edgeW,imgUv.y+n);
      float front=exp(-abs(imgUv.y+n-(waveY+edgeW*0.5))*10.0);
      c1.rgb+=vec3(1.0,0.82,0.32)*front*(1.0-blend)*0.42*bleed;
      gl_FragColor=mix(c1,c2,clamp(blend,0.0,1.0));

    } else if(uTransition<1.5){
      float diag=imgUv.x*0.62+(1.0-imgUv.y)*0.38;
      float n=noise(imgUv*4.0)*0.11;
      float edgeW=0.22,nMax=0.11;
      float thresh=uProgress*(1.0+nMax+2.0*edgeW)-(nMax+edgeW);
      float blend=smoothstep(diag+n-edgeW,diag+n+edgeW,thresh);
      float edge=exp(-abs(thresh-(diag+n))*7.0);
      c1.rgb+=vec3(1.0,0.45,0.08)*edge*(1.0-blend)*0.52*bleed;
      gl_FragColor=mix(c1,c2,clamp(blend,0.0,1.0));

    } else {
      float n=fbm(imgUv*2.0+vec2(uTime*0.02));
      float blend=smoothstep(n-0.15,n+0.15,uProgress);
      float sky=smoothstep(0.55,0.0,imgUv.y)*bleed;
      float dark=smoothstep(0.0,0.6,uProgress);
      c1.rgb*=(1.0-sky*dark*0.52);
      gl_FragColor=mix(c1,c2,clamp(blend,0.0,1.0));
    }
  }
}`;

function makeBlack(){
  const c=document.createElement('canvas');c.width=c.height=2;
  c.getContext('2d').fillRect(0,0,2,2);
  return new THREE.CanvasTexture(c);
}

const uniforms={
  uTex1:{value:makeBlack()},uTex2:{value:makeBlack()},
  uProgress:{value:0.0},uTime:{value:0.0},
  uResolution:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
  uImageAspect:{value:IMAGE_ASPECT},
  uPhase:{value:0.0},uEffect:{value:0.0},uTransition:{value:0.0},
};

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),
  new THREE.ShaderMaterial({uniforms,vertexShader,fragmentShader})));

// ── 텍스처 로딩 ───────────────────────────────────────
const loader=new THREE.TextureLoader();
loader.crossOrigin='anonymous';

function loadTextures(){
  return new Promise(resolve=>{
    const loaded=[];let count=0;
    IMAGE_CONFIG.forEach((cfg,i)=>{
      loader.load(cfg.url,tex=>{
        tex.minFilter=tex.magFilter=THREE.LinearFilter;
        loaded[i]=tex;
        if(++count===IMAGE_CONFIG.length)resolve(loaded);
      },undefined,()=>{
        loaded[i]=makeBlack();
        if(++count===IMAGE_CONFIG.length)resolve(loaded);
      });
    });
  });
}

// ── 상태 머신 ─────────────────────────────────────────
let textures=null;
let currentIdx=Math.floor(Math.random()*IMAGE_CONFIG.length);
let nextIdx=(currentIdx+1)%IMAGE_CONFIG.length;
let glPhase='holding';
let phaseStart=0;

function animateGL(){
  requestAnimationFrame(animateGL);
  uniforms.uTime.value=clock.getElapsedTime();
  if(!textures){renderer.render(scene,camera);return;}
  const elapsed=Date.now()-phaseStart;
  if(glPhase==='holding'){
    if(elapsed>HOLD_DURATION){
      nextIdx=(currentIdx+1)%IMAGE_CONFIG.length;
      uniforms.uTex2.value=textures[nextIdx];
      uniforms.uTransition.value=IMAGE_CONFIG[currentIdx].transition;
      uniforms.uPhase.value=1.0;
      glPhase='transitioning';phaseStart=Date.now();
    }
  } else {
    const p=Math.min(elapsed/TRANSITION_DURATION,1.0);
    const e=p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
    uniforms.uProgress.value=e;
    if(elapsed>TRANSITION_DURATION){
      currentIdx=nextIdx;
      uniforms.uTex1.value=textures[currentIdx];
      uniforms.uEffect.value=IMAGE_CONFIG[currentIdx].effect;
      uniforms.uProgress.value=0.0;uniforms.uPhase.value=0.0;
      glPhase='holding';phaseStart=Date.now();
    }
  }
  renderer.render(scene,camera);
}

// ── WebGL context loss ────────────────────────────────
canvas.addEventListener('webglcontextlost',e=>{e.preventDefault();});
canvas.addEventListener('webglcontextrestored',()=>{
  textures=null;
  loadTextures().then(loaded=>{
    textures=loaded;
    uniforms.uTex1.value=textures[currentIdx];
    uniforms.uTex2.value=textures[nextIdx];
    uniforms.uEffect.value=IMAGE_CONFIG[currentIdx].effect;
    uniforms.uPhase.value=glPhase==='transitioning'?1.0:0.0;
  });
});

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden)clock.getDelta();
});

// ── 공유 이미지 생성 ──────────────────────────────────
let currentMessage='';

async function generateShareImage(){
  await document.fonts.ready;

  // 현재 WebGL 프레임 캡처
  renderer.render(scene,camera); // 최신 프레임 강제 렌더
  const glDataUrl=canvas.toDataURL('image/png');

  // 4:5 캔버스 생성
  const sc=document.createElement('canvas');
  sc.width=SHARE_W; sc.height=SHARE_H;
  const ctx=sc.getContext('2d');

  // 배경 검정
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,SHARE_W,SHARE_H);

  // WebGL 이미지 로드 후 그리기
  await new Promise((resolve, reject)=>{
    const img=new Image();
    img.onload=()=>{
      // B+C 전략: contain + 블리드
      const screenAspect=SHARE_W/SHARE_H;
      let drawX,drawY,drawW,drawH;
      if(screenAspect>IMAGE_ASPECT){
        drawH=SHARE_H; drawW=SHARE_H*IMAGE_ASPECT;
        drawX=(SHARE_W-drawW)/2; drawY=0;
      } else {
        drawW=SHARE_W; drawH=SHARE_W/IMAGE_ASPECT;
        drawX=0; drawY=(SHARE_H-drawH)/2;
      }
      // 블리드 배경 (어두운 버전)
      ctx.globalAlpha=0.35;
      ctx.drawImage(img,0,0,SHARE_W,SHARE_H);
      ctx.globalAlpha=1.0;
      // 원본 비율 이미지
      ctx.drawImage(img,drawX,drawY,drawW,drawH);
      resolve();
    };
    img.onerror=()=>reject(new Error('canvas capture failed'));
    img.src=glDataUrl;
  });

  // 하단 그라데이션 오버레이
  const grad=ctx.createLinearGradient(0,SHARE_H*0.42,0,SHARE_H);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.45,'rgba(0,0,0,0.65)');
  grad.addColorStop(1,'rgba(0,0,0,0.94)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,SHARE_W,SHARE_H);

  // ── 텍스트 레이아웃 (아래서 위로) ─────────────────
  const pad=72;

  // D14 · hour (우하단)
  ctx.font='300 28px "DM Mono", monospace';
  ctx.fillStyle='rgba(68,68,68,0.85)';
  ctx.textAlign='right';
  ctx.fillText('D14 · hour',SHARE_W-pad,SHARE_H-pad);

  // 타임스탬프 — D14 라벨 위
  const tsSize=108;
  const tsBaseline=SHARE_H-pad-28-24; // 라벨 높이(28)+간격(24)
  ctx.font=`400 ${tsSize}px "Share Tech Mono", monospace`;
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.textAlign='left';
  ctx.fillText(timeStr,pad,tsBaseline);

  // 메시지 — 타임스탬프 위 (아래 줄부터 쌓아올림)
  ctx.font='italic 400 50px "Cormorant Garamond", Georgia, serif';
  ctx.fillStyle='rgba(144,144,144,0.9)';
  const lines=currentMessage.split('\n');
  const lineH=66;
  const msgBottom=tsBaseline-tsSize-28; // 타임스탬프 상단에서 28px 위
  lines.forEach((line,i)=>{
    // i=0: 첫째줄(상단), i=last: 마지막줄(하단)
    const y=msgBottom-(lines.length-1-i)*lineH;
    ctx.fillText(line,pad,y);
  });

  return new Promise(resolve=>{
    sc.toBlob(blob=>resolve(blob),'image/png');
  });
}

async function handleShare(){
  const btn=$('shareBtn');
  btn.disabled=true;
  btn.textContent='...';
  try{
    const blob=await generateShareImage();
    const file=new File([blob],`dred-d14-${timeStr.replace(':','')}.png`,{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file]});
    } else {
      // 폴백: 다운로드
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=file.name; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }
  } catch(e){
    if(e?.name!=='AbortError') console.warn('Share failed:',e);
  } finally{
    btn.disabled=false;
    btn.textContent=lang==='ko'?'공유':'share';
  }
}

// ── 메인 ─────────────────────────────────────────────
async function run(){
  const [message,loaded]=await Promise.all([
    fetchMessage(),loadTextures(),
    new Promise(r=>setTimeout(r,2800))
  ]);
  currentMessage=message;
  textures=loaded;
  uniforms.uTex1.value=textures[currentIdx];
  uniforms.uTex2.value=textures[nextIdx];
  uniforms.uEffect.value=IMAGE_CONFIG[currentIdx].effect;
  uniforms.uPhase.value=0.0;uniforms.uProgress.value=0.0;
  phaseStart=Date.now();
  canvas.classList.add('visible');
  $('msgWrap').classList.add('visible');
  typewrite($('msgDisplay'),message,65,()=>{
    $('shareBtn').classList.add('visible');
  });
}

// ── 진입 ─────────────────────────────────────────────
setTimeout(()=>{
  $('blackOverlay').classList.add('gone');
  setTimeout(()=>{
    $('metaTop').classList.add('visible');
    $('tsWrap').classList.add('visible');
  },400);
},800);

$('shareBtn').addEventListener('click',handleShare);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  uniforms.uResolution.value.set(window.innerWidth,window.innerHeight);
});

animateGL();
run();
</script>
