<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" fill="#080806" rx="5"/>

  <!-- constellation lines -->
  <line x1="7"  y1="8"  x2="13" y2="5"  stroke="#2e2e2e" stroke-width="1.1"/>
  <line x1="7"  y1="8"  x2="16" y2="16" stroke="#2e2e2e" stroke-width="1.1"/>
  <line x1="13" y1="5"  x2="16" y2="16" stroke="#2e2e2e" stroke-width="1.1"/>
  <line x1="16" y1="16" x2="25" y2="19" stroke="#2e2e2e" stroke-width="1.1"/>
  <line x1="16" y1="16" x2="21" y2="27" stroke="#2e2e2e" stroke-width="1.1"/>
  <line x1="25" y1="19" x2="21" y2="27" stroke="#2e2e2e" stroke-width="1.1"/>

  <!-- KIN nodes — yellow, top-left cluster -->
  <circle cx="7"  cy="8"  r="3.2" fill="#FFE500"/>
  <circle cx="13" cy="5"  r="2.0" fill="#FFE500" opacity=".65"/>

  <!-- center node — neutral bridge -->
  <circle cx="16" cy="16" r="1.6" fill="#666"/>

  <!-- DRED nodes — purple, bottom-right cluster -->
  <circle cx="25" cy="19" r="3.2" fill="#5B4FCF"/>
  <circle cx="21" cy="27" r="2.0" fill="#5B4FCF" opacity=".65"/>
</svg>
