<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="./k2_favicon.svg">
<title>난 어떤 덕후? — KIN의 만화·애니</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*{-webkit-tap-highlight-color:transparent}
body{
  width:100%;min-height:100dvh;
  background:var(--bg);
  font-family:'DM Mono',monospace;color:#fff;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.result-score,.result-work-name,.h-name,.quiz-counter{
  font-synthesis:none;font-optical-sizing:none;
  -webkit-font-smoothing:antialiased;
}
:root{
  --kin:#FFE500;
  --bg:#080806;
  /* ── 타입 스케일 (4단계) ── */
  --t-label:11px;   /* 배지·메타·아이브로 */
  --t-sm:13px;      /* 서브 텍스트·KIN 버블 */
  --t-base:15px;    /* 본문·선택지·버튼 */
  --t-md:17px;      /* 퀴즈 질문·결과 관찰 */
  /* ── 자간 (3단계) ── */
  --ls-tight:-.03em;  /* Syne 헤딩 */
  --ls-mono:.15em;    /* 대문자 mono 레이블 */
  --ls-wide:.22em;    /* 아이브로·최상위 레이블 */
}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:gr .3s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}50%{background-position:-40px 30px}}

/* ── 난이도 배경 오버레이 ── */
#diff-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:rgba(0,0,0,0);transition:background 0.8s ease;
}

/* ── 연속 정답 GLOW ── */
#streak-glow{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  box-shadow:inset 0 0 0 0 rgba(255,229,0,0);
  transition:box-shadow 0.5s ease;
}
#streak-glow.s3{box-shadow:inset 0 0 60px 8px rgba(255,229,0,.12)}
#streak-glow.s5{box-shadow:inset 0 0 100px 16px rgba(255,229,0,.22)}
#streak-glow.s7{box-shadow:inset 0 0 140px 24px rgba(255,229,0,.35)}

/* ── 파티클 ── */
.streak-particle{
  position:fixed;top:-20px;z-index:92;pointer-events:none;
  width:2px;height:clamp(20px,5vh,45px);
  background:var(--kin);opacity:0;
  animation:particle-fall .7s ease-in forwards;
}
@keyframes particle-fall{
  0%{opacity:1;transform:translateY(0) rotate(var(--r))}
  100%{opacity:0;transform:translateY(100px) rotate(var(--r))}
}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:18px 24px;padding-top:max(18px,env(safe-area-inset-top));
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(8,8,6,.95);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,229,0,.07);
}
.h-name{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:var(--t-base);color:var(--kin);
  letter-spacing:var(--ls-tight);
}
.h-back{
  font-size:var(--t-label);letter-spacing:var(--ls-mono);
  color:rgba(255,255,255,.55);text-transform:uppercase;
  cursor:pointer;transition:color .2s;text-decoration:none;
  padding:12px 4px;min-height:44px;display:flex;align-items:center;
}
#lang-toggle{display:flex;align-items:center;font-size:var(--t-label);letter-spacing:var(--ls-mono)}
.lt{padding:10px 12px;cursor:pointer;color:rgba(255,255,255,.45);transition:color .2s;user-select:none;border-radius:3px;min-height:44px;display:flex;align-items:center;}
.lt.active{color:var(--kin)}
.lt-sep{color:rgba(255,255,255,.2)}
.lt.disabled{opacity:.25;pointer-events:none}

/* ── PAGES ── */
.page{
  display:none;min-height:100dvh;
  padding:80px 24px 72px;
  padding-bottom:max(72px,calc(env(safe-area-inset-bottom)+72px));
  position:relative;z-index:1;
  max-width:600px;margin:0 auto;
}
.page.active{display:flex;flex-direction:column}

/* ═══════════════════════════════
   LANDING V4
═══════════════════════════════ */
#page-landing{
  max-width:none;padding:0;
  overflow:hidden;background:transparent;
}
.landing-eyebrow{display:none}
#page-result .landing-eyebrow{
  display:block;
  font-size:var(--t-label);letter-spacing:var(--ls-wide);
  text-transform:uppercase;color:rgba(255,229,0,.6);
  margin-bottom:10px;
}

/* 배경 요소 */
.manga-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.speedlines{display:none;} /* 속도선 제거 */
.manga-gate{
  position:absolute;right:0;bottom:0;
  width:min(55vw,480px);height:auto;max-height:90vh;
  object-fit:contain;object-position:right bottom;
  opacity:.35;
  mask-image:linear-gradient(to top,transparent 0%,black 8%,black 70%,transparent 100%);
  -webkit-mask-image:linear-gradient(to top,transparent 0%,black 8%,black 70%,transparent 100%);
}

/* 랜딩 레이아웃 */
.landing-v4{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  min-height:100dvh;
  padding-top:60px;
}
.landing-v4-kin{
  padding:28px 24px 8px;
  display:flex;flex-direction:column;
}
.landing-v4-modes{
  flex:1;padding:16px 24px;
  display:flex;flex-direction:column;gap:10px;
  justify-content:flex-start;
}
.landing-v4-meta{
  padding:12px 24px max(24px,env(safe-area-inset-bottom));
  display:flex;gap:16px;
}

/* PC */
@media(min-width:768px){
  .landing-v4{flex-direction:row;padding-top:0;}
  .landing-v4-kin{
    width:40%;min-height:100dvh;
    padding:100px 40px 40px;
    justify-content:center;
    border-right:1px solid rgba(255,229,0,.07);
  }
  .landing-v4-modes{
    width:60%;min-height:100dvh;
    padding:100px 48px 40px;
    justify-content:center;
    gap:12px;
    background:var(--bg); /* 오른쪽 패널 배경 명시적으로 덮기 */
    position:relative;z-index:2;
  }
  .landing-v4-meta{display:none}
  /* PC: manga-bg를 왼쪽 40%만 커버 */
  .manga-bg{width:40%;right:auto;}
  .manga-gate{
    width:min(75%,360px);
    opacity:.25;
    right:0;
  }

}

/* KIN 말풍선 */
.kin-bubble-landing{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;}
.kin-avatar-landing{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  object-fit:cover;
  border:1.5px solid rgba(255,229,0,.3);
  background:rgba(255,229,0,.05);
}
.kin-bubble-text{
  background:rgba(255,229,0,.05);
  border:1px solid rgba(255,229,0,.18);
  border-left:2.5px solid rgba(255,229,0,.55);
  border-radius:0 12px 12px 12px;
  padding:12px 16px;
  font-size:var(--t-sm);color:rgba(255,255,255,.88);line-height:1.7;
}

/* 모드 카드 */
.mode-card{
  border-radius:12px;padding:16px 18px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.mode-card-active{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,229,0,.32);
}
.mode-card-done{
  background:rgba(74,222,128,.04);
  border:1px solid rgba(74,222,128,.22);
}
.mode-card-locked{
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.07);
  opacity:.48;
}
.mode-label{
  font-size:var(--t-label);letter-spacing:var(--ls-mono);
  text-transform:uppercase;margin-bottom:4px;
}
.mode-title{font-size:var(--t-base);font-weight:700;margin-bottom:2px;}
.mode-sub{font-size:var(--t-label);color:rgba(255,255,255,.32);}

/* 모드 버튼 */
.btn-start{
  background:var(--kin);color:#000;
  font-family:'DM Mono',monospace;
  font-size:var(--t-label);letter-spacing:var(--ls-mono);font-weight:700;
  text-transform:uppercase;border:none;cursor:pointer;
  padding:10px 20px;border-radius:8px;flex-shrink:0;
  transition:opacity .15s,transform .15s;
  white-space:nowrap;
}
.btn-start:active{transform:scale(.97)}
.btn-start-arrow{display:none}
.btn-mode-locked{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.25);
  font-family:'DM Mono',monospace;
  font-size:var(--t-label);letter-spacing:var(--ls-mono);font-weight:700;
  text-transform:uppercase;border:none;cursor:default;
  padding:10px 16px;border-radius:8px;flex-shrink:0;
  white-space:nowrap;
}

/* 랜딩 메타 */
.today-count{font-size:var(--t-label);color:rgba(255,229,0,.65);letter-spacing:.06em}
.landing-meta-item{font-size:var(--t-label);color:rgba(255,255,255,.22);letter-spacing:var(--ls-mono);text-transform:uppercase}

/* 커버 마퀴 */
.cover-marquee{
  position:relative;width:100%;overflow:hidden;
  margin-top:32px; /* auto → 위로 올림 */
  mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
}
.cover-marquee-track{
  display:flex;gap:0;width:max-content; /* gap:0 — 끊김 방지 */
  animation:cover-scroll 16s linear infinite; /* 28s→16s 빠르게 */
}
@keyframes cover-scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}
.cover-img{
  width:112px;height:158px;border-radius:8px; /* 1.55배 크게 */
  object-fit:cover;flex-shrink:0;
  opacity:.65;
  margin-right:10px; /* gap 대신 margin으로 — -50% 정확히 맞춤 */
  transition:opacity .2s;
  border:1px solid rgba(255,255,255,.08);
}
.cover-img:hover{opacity:.95}


/* ── 퀴즈 배경 이미지 ── */
#quiz-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#quiz-bg img{
  width:100%;height:100%;
  object-fit:cover;object-position:center center;
  filter:blur(14px) brightness(.18);
  transform:scale(1.08);display:block;will-change:transform;
}
#page-quiz .quiz-progress,
#page-quiz .quiz-top,
#page-quiz .quiz-question,
#page-quiz .choices,
#page-quiz .kin-reaction,
#page-quiz .btn-next{position:relative;z-index:2}

/* ═══════════════════════════════
   QUIZ
═══════════════════════════════ */
#page-quiz{gap:0}

/* 진행 바 */
.quiz-progress{display:flex;gap:4px;margin-top:20px;margin-bottom:22px}
.prog-dot{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.1);
  transition:background .4s,transform .3s;
}
.prog-dot.done-easy   {background:var(--kin)}
.prog-dot.done-mid    {background:#60A5FA}
.prog-dot.done-hard   {background:#F87171}
.prog-dot.done-wrong  {background:rgba(248,113,113,.4)}
.prog-dot.current     {background:rgba(255,229,0,.5);transform:scaleY(1.8)}

/* 상단 메타 */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.quiz-top-left{display:flex;gap:10px;align-items:center}

.format-badge{
  font-size:var(--t-label);letter-spacing:var(--ls-mono);
  text-transform:uppercase;padding:6px 13px;border-radius:6px;
}
.format-badge.work      {background:rgba(255,229,0,.18);      color:#FFE500}
.format-badge.character {background:rgba(96,165,250,.18);     color:#93C5FD}
.format-badge.outlier   {background:rgba(196,181,253,.18);    color:#C4B5FD}
.format-badge.author    {background:rgba(253,186,116,.18);    color:#FDBA74}
.format-badge.relation  {background:rgba(52,211,153,.18);     color:#6EE7B7}

.diff-dots{display:flex;gap:5px;align-items:center}
.diff-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
.diff-dot.on-easy{background:#FFE500}
.diff-dot.on-mid {background:#60A5FA}
.diff-dot.on-hard{background:#F87171}

.quiz-counter{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(24px,6.5vw,32px);
  letter-spacing:var(--ls-tight);line-height:1;
  color:rgba(255,255,255,.5);
}

/* 질문 */
.quiz-question{
  font-size:clamp(var(--t-base),4vw,var(--t-md));
  line-height:1.75;color:#fff;
  margin-bottom:24px;min-height:68px;
  text-wrap:balance;
}

/* recall — 말풍선 */
.quiz-question.direction-recall{
  position:relative;
  padding:18px 20px;
  background:rgba(255,229,0,.05);
  border:1px solid rgba(255,229,0,.2);
  border-left:3px solid rgba(255,229,0,.65);
  border-radius:12px;
  min-height:auto;margin-bottom:28px;
}

/* explain — 정보 카드 */
.quiz-question.direction-explain{
  padding:16px 18px;
  background:rgba(96,165,250,.05);
  border-left:3px solid rgba(96,165,250,.5);
  border-radius:0 12px 12px 0;min-height:auto;
}

/* 등장 애니 */
.quiz-question.enter-fade {animation:q-fade .35s ease forwards}
.quiz-question.enter-up   {animation:q-up   .35s cubic-bezier(.16,1,.3,1) forwards}
.quiz-question.enter-side {animation:q-side .35s cubic-bezier(.16,1,.3,1) forwards}
@keyframes q-fade{from{opacity:0}to{opacity:1}}
@keyframes q-up  {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes q-side{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

/* 선택지 */
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{
  width:100%;min-height:56px;padding:16px 20px;
  text-align:left;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.85);
  font-family:'DM Mono',monospace;
  font-size:clamp(var(--t-sm),3.5vw,var(--t-base));line-height:1.5;
  cursor:pointer;user-select:none;
  transition:background .15s,border-color .15s,color .15s,transform .15s,opacity .3s;
  border-radius:10px;
}
@media(hover:hover){
  .btn-start:hover{opacity:.88}
  .h-back:hover{color:var(--kin)}
  .choice-btn:hover:not(:disabled){
    background:rgba(255,229,0,.1);
    border-color:rgba(255,229,0,.55);
    color:#fff;transform:translateX(5px);
  }
  .btn-next:hover{background:rgba(255,229,0,.08);border-color:#FFE500;color:#FFE500}
  .btn-secondary:hover{border-color:rgba(255,229,0,.45);color:#FFE500}
  .btn-primary:hover{opacity:.85}
}
.choice-btn.correct{
  background:rgba(74,222,128,.15);border:2px solid #4ADE80;color:#4ADE80;
  animation:bounce-up .35s cubic-bezier(.16,1,.3,1);
}
.choice-btn.wrong{
  background:rgba(248,113,113,.15);border:2px solid #F87171;color:#F87171;
  animation:shake .4s ease;
}
.choice-btn.faded{opacity:.18;cursor:default;}
.choice-btn.correct.attention{animation:correct-pulse .55s ease .1s;}
@keyframes bounce-up{
  0%{transform:translateY(0)} 35%{transform:translateY(-7px)} 100%{transform:translateY(0)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}
  35%{transform:translateX(7px)}55%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}90%{transform:translateX(-2px)}
}
@keyframes correct-pulse{
  0%{transform:translateX(0);box-shadow:0 0 0 0 rgba(74,222,128,.5)}
  20%{transform:translateX(-5px);box-shadow:0 0 0 6px rgba(74,222,128,.0)}
  40%{transform:translateX(5px)}60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}100%{transform:translateX(0)}
}
.choice-btn.stagger{opacity:0;animation:stagger-in .25s ease forwards;}
@keyframes stagger-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* KIN 반응 */
.kin-reaction{
  margin-top:18px;display:flex;gap:12px;align-items:flex-start;
  opacity:0;transition:opacity .3s;
}
.kin-reaction.show{opacity:1}
.kin-rxn-avatar{
  width:56px;height:56px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  border:1.5px solid rgba(255,229,0,.3);
  background:rgba(255,229,0,.05);
}
.kin-rxn-bubble{
  position:relative;flex:1;
  padding:12px 16px;
  background:rgba(255,229,0,.05);
  border:1px solid rgba(255,229,0,.25);
  border-radius:0 12px 12px 12px;
  font-size:var(--t-sm);color:#FFE500;line-height:1.75;
  min-height:56px;word-break:keep-all;
  display:flex;align-items:center;
}
.kin-rxn-bubble::before{
  content:'';position:absolute;left:-7px;top:18px;
  width:0;height:0;
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  border-right:7px solid rgba(255,229,0,.25);
}

.btn-next{
  margin-top:20px;align-self:flex-end;
  padding:13px 26px;min-height:44px;
  background:transparent;
  border:1px solid rgba(255,229,0,.45);
  color:#FFE500;
  font-family:'DM Mono',monospace;font-size:var(--t-label);
  letter-spacing:var(--ls-mono);text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  opacity:0;pointer-events:none;border-radius:10px;
}
.btn-next.show{opacity:1;pointer-events:all}

/* ═══════════════════════════════
   RESULT
═══════════════════════════════ */
#page-result{gap:20px}

.result-score-wrap{display:flex;align-items:baseline;gap:10px}
.result-score{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(68px,17vw,112px);
  color:var(--kin);letter-spacing:var(--ls-tight);line-height:1;
}
.result-score-denom{font-size:var(--t-base);color:rgba(255,255,255,.35);letter-spacing:.08em}

/* 작품 카드 */
.result-top-work{
  position:relative;overflow:hidden;
  min-height:240px;
  border:1px solid rgba(255,229,0,.2);border-radius:12px;
}
.result-work-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center 15%;
}
.result-work-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.12) 40%,rgba(0,0,0,.72) 100%);
}
.result-work-content{
  position:relative;z-index:1;
  padding:24px;display:flex;flex-direction:column;gap:8px;
}
.result-work-label{
  font-size:var(--t-label);letter-spacing:var(--ls-wide);
  color:rgba(255,229,0,.85);text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.result-work-name{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(22px,5.5vw,34px);color:#fff;
  letter-spacing:var(--ls-tight);
  text-shadow:0 2px 8px rgba(0,0,0,.9);text-wrap:balance;
}
.result-work-sub{
  font-size:var(--t-sm);color:rgba(255,255,255,.8);
  letter-spacing:.06em;text-shadow:0 1px 4px rgba(0,0,0,.8);
}

/* bg 카드 (작품 없을 때) */
.result-kin-wrap{
  position:relative;overflow:hidden;
  min-height:240px;
  border:1px solid rgba(255,229,0,.15);border-radius:12px;
}
.result-kin-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center center;
  filter:brightness(.5);transform:scale(1.05);
}
.result-kin-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%);
}

/* KIN 관찰 */
.result-observation{
  display:flex;gap:14px;align-items:flex-start;
  padding:20px;
  border:1px solid rgba(255,229,0,.22);
  background:rgba(255,229,0,.04);
  border-radius:12px;
}
.result-obs-avatar{
  width:60px;height:60px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  border:2px solid rgba(255,229,0,.35);
  background:rgba(255,229,0,.05);
}
.result-obs-content{flex:1}
.result-observation-label{
  font-size:var(--t-label);letter-spacing:var(--ls-wide);
  color:rgba(255,229,0,.55);text-transform:uppercase;margin-bottom:10px;
}
#result-observation-text{
  font-size:var(--t-md);line-height:1.8;
  color:rgba(255,255,255,.9);word-break:keep-all;
  text-wrap:balance;
}

/* 틀린 문제 */
#result-wrong-section{
  padding:20px;
  background:rgba(248,113,113,.03);
  border:1px solid rgba(248,113,113,.18);
  border-radius:12px;
}
.result-wrong-label{
  font-size:var(--t-label);letter-spacing:var(--ls-wide);
  color:rgba(248,113,113,.65);text-transform:uppercase;margin-bottom:12px;
}
.result-wrong-list{display:flex;flex-direction:column;gap:8px}
.wrong-item{
  padding:12px 16px;
  background:rgba(248,113,113,.04);
  border:1px solid rgba(248,113,113,.12);
  font-size:var(--t-sm);line-height:1.65;
  color:rgba(255,255,255,.68);border-radius:8px;
}
.wrong-item-answer{color:#4ADE80;font-size:var(--t-label);margin-top:5px}

.result-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;margin-bottom:48px}
.btn-secondary{
  padding:13px 22px;background:transparent;
  border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.6);
  font-family:'DM Mono',monospace;font-size:var(--t-label);
  letter-spacing:var(--ls-mono);text-transform:uppercase;
  cursor:pointer;transition:all .2s;border-radius:10px;
  text-decoration:none;display:inline-flex;align-items:center;min-height:46px;
}
.btn-primary{
  padding:13px 22px;background:var(--kin);color:#000;border:none;
  font-family:'DM Mono',monospace;font-size:var(--t-label);
  letter-spacing:var(--ls-mono);text-transform:uppercase;
  cursor:pointer;transition:opacity .2s;border-radius:10px;min-height:46px;
}

/* ── 공유 모달 ── */
#share-modal{
  position:fixed;inset:0;z-index:400;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);padding:24px;
}
#share-modal.open{display:flex}
#share-modal-img{
  max-width:min(360px,90vw);width:100%;border-radius:4px;
  box-shadow:0 0 40px rgba(255,229,0,.1);margin-bottom:18px;
}
#share-modal-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px;}
.sm-btn{
  flex:1;min-width:120px;padding:13px 16px;
  font-family:'DM Mono',monospace;font-size:var(--t-label);
  letter-spacing:var(--ls-mono);text-transform:uppercase;
  cursor:pointer;border-radius:10px;transition:opacity .2s;min-height:46px;
}
.sm-btn-primary{background:var(--kin);color:#000;border:none}
.sm-btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.65)}
#share-modal-close{
  margin-top:14px;font-family:'DM Mono',monospace;
  font-size:var(--t-label);letter-spacing:var(--ls-mono);
  color:rgba(255,255,255,.3);cursor:pointer;text-transform:uppercase;padding:8px;
}
#share-modal-loading{
  color:rgba(255,229,0,.55);font-size:var(--t-sm);letter-spacing:var(--ls-mono);
  animation:blink 1.2s ease infinite;
}

/* ── 공유 카드 ── */
#share-card{
  position:fixed;left:-9999px;top:-9999px;
  width:375px;background:var(--bg);
  font-family:'DM Mono',monospace;overflow:hidden;
}
.sc-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;border-bottom:1px solid rgba(255,229,0,.1);
}
.sc-header-title{font-size:10px;letter-spacing:.28em;color:rgba(255,229,0,.6);text-transform:uppercase}
.sc-header-work{font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.4);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-work-img-wrap{
  position:relative;width:100%;height:190px;overflow:hidden;
  background-size:cover;background-position:center top;
}
.sc-work-img-wrap img{display:none}
.sc-work-img-fade{
  position:absolute;bottom:0;left:0;right:0;height:90px;
  background:linear-gradient(to bottom,transparent,var(--bg));
}
.sc-kin-section{
  display:flex;gap:14px;align-items:flex-start;padding:18px 20px 10px;
}
.sc-kin-face{
  width:68px;height:68px;border-radius:50%;
  object-fit:cover;flex-shrink:0;border:2px solid rgba(255,229,0,.4);
}
.sc-bubble{
  position:relative;flex:1;padding:11px 15px;
  background:rgba(255,229,0,.07);border:1px solid rgba(255,229,0,.3);
  border-radius:0 8px 8px 8px;
  font-size:var(--t-sm);color:#FFE500;line-height:1.75;word-break:keep-all;
}
.sc-bubble::before{
  content:'';position:absolute;left:-7px;top:14px;
  width:0;height:0;
  border-top:6px solid transparent;border-bottom:6px solid transparent;
  border-right:7px solid rgba(255,229,0,.3);
}
.sc-score-section{display:flex;align-items:baseline;gap:8px;padding:6px 20px 0;}
.sc-score-num{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:80px;color:#FFE500;letter-spacing:var(--ls-tight);line-height:1;
  font-synthesis:none;
}
.sc-score-denom{font-size:var(--t-base);color:rgba(255,255,255,.35);letter-spacing:.08em}
.sc-bar-wrap{margin:10px 20px 0;height:3px;background:rgba(255,255,255,.1);border-radius:2px;}
.sc-bar{height:100%;background:#FFE500;border-radius:2px}
.sc-footer{padding:12px 20px 18px;font-size:var(--t-label);letter-spacing:var(--ls-wide);color:rgba(255,229,0,.35);}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .4s}
#loading span{font-size:var(--t-label);letter-spacing:.35em;color:rgba(255,229,0,.35);text-transform:uppercase;animation:blink 1.4s ease infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* ── ERROR ── */
#error-msg{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:11px 20px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);
  font-size:var(--t-sm);color:#F87171;letter-spacing:.08em;
  display:none;z-index:200;max-width:90vw;text-align:center;word-break:keep-all;
}

/* ── 모바일 최적화 ── */
@media(max-width:480px){
  .page{
    padding:72px 18px 48px;
    padding-bottom:max(48px,calc(env(safe-area-inset-bottom)+48px));
  }
  .quiz-question{margin-bottom:20px}
  .choice-btn{min-height:58px;padding:15px 16px}
  .kin-reaction{margin-top:14px}
  .kin-rxn-avatar{width:48px;height:48px}
  .kin-rxn-bubble{font-size:var(--t-sm);padding:10px 14px}
}
/* 모바일: manga-gate 숨김 / 마퀴 크기 조정 */
@media(max-width:767px){
  .manga-gate{display:none}
  .cover-marquee{margin-top:20px}
  .cover-img{width:78px;height:110px;border-radius:6px;margin-right:8px}
}

/* ── reduced motion ── */
@media(prefers-reduced-motion:reduce){
  #grain,.choice-btn,.quiz-question,#streak-glow,.streak-particle,
  .speedlines,.manga-gate,.btn-start-arrow,
  .cover-marquee-track,#quiz-bg img{
    animation:none!important;transition:none!important
  }
}
@keyframes flash-fade{0%{opacity:1}100%{opacity:0}}

  if(state.phase === 'result') applyResultLang();

LT_BTNS.forEach(el => {

const pickRxn = key => {
  const pool = lang==='ko' ? KIN_REACTIONS[key] : KIN_REACTIONS_EN[key];
  return pool[Math.floor(Math.random()*pool.length)];
};
function getRxn(isCorrect, difficulty) {
  return pickRxn(`${isCorrect?'correct':'wrong'}_${difficulty}`);
}
function getStreakRxn(n) {
  return pickRxn(n>=7?'streak_7':n>=5?'streak_5':'streak_3');
}

function detectPattern(answers) {
  const score = answers.filter(a=>a.is_correct).length;
  if(score===10) return 'perfect';
  if(score===0)  return 'zero';
  const byDiff = d => answers.filter(a=>a.difficulty===d);
  const rate   = d => { const g=byDiff(d); return g.length?g.filter(a=>a.is_correct).length/g.length:0; };
  const easyR=rate('easy'), midR=rate('mid'), hardR=rate('hard'), totalR=score/10;
  const byFmt = f => answers.filter(a=>a.format===f);
  const frate  = f => { const g=byFmt(f); return g.length?g.filter(a=>a.is_correct).length/g.length:0; };
  const sc = {
    hard_easy_gap:   hardR-easyR,
    major_only:      (easyR-hardR)*.6+(midR-hardR)*.4,
    outlier_strong:  frate('outlier')-totalR,
    author_strong:   frate('author')-totalR,
    relation_strong: frate('relation')-totalR,
    easy_only:       (easyR-midR)*.5+(easyR-hardR)*.5,
    all_high:        totalR>=.78?totalR:0,
    all_low:         totalR<=.32?(0.32-totalR):0,
  };
  // one_work
  const wc={};
  answers.forEach(a=>{
    const w=a.source_work||'?';
    if(!wc[w]) wc[w]={total:0,correct:0};
    wc[w].total++;
    if(a.is_correct) wc[w].correct++;
  });
  const mw=Object.values(wc).reduce((b,w)=>w.total>=3&&w.correct/w.total>(b.correct/Math.max(b.total,1))?w:b,{total:0,correct:0});
  const otherR=(score>0)?(score-mw.correct)/Math.max(10-mw.total,1):0;
  sc.one_work = mw.total>=3&&mw.correct/mw.total>=.9&&otherR<.4?0.8:0;
  const best = Object.entries(sc).filter(([,v])=>v>=0.2).sort(([,a],[,b])=>b-a)[0];
  return best?best[0]:'random';
}

function getObs(pattern) {
  const pool = OBS[lang][pattern]||OBS[lang].random;
  return pool[Math.floor(Math.random()*pool.length)];
}

// #3: crypto.randomUUID 폴리필 (iOS 15.3 이하 대응)
const genUUID = () => {
  if(crypto.randomUUID) return crypto.randomUUID();
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
};

// Supabase
// ═══════════════════════════════════════════
async function supaFetch(path, opts={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...opts,
    headers:{
      apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`,
      'Content-Type':'application/json', Prefer:'return=minimal',
      ...(opts.headers||{}),
    },
  });
  if(!res.ok) throw new Error(`Supabase ${res.status}`);
  const ct = res.headers.get('content-type')||'';
  if(ct.includes('json') && res.status!==204) return res.json();
  return null;
}

// #8: count=exact 쿼리용 헬퍼 (loadTodayCount, loadTotalCount, getSlotCount 공통)
async function supaCount(path) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers:{
      apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`,
      Prefer:'count=exact', Range:'0-0',
    },
  });
  if(!res.ok) throw new Error(`Supabase ${res.status}`);
  const cr = res.headers.get('content-range');
  return parseInt(cr?.split('/')[1]||'0', 10);
}

// fetchCoverUrl → fetchAniListCover 재사용 (중복 제거)

async function buildCoverMarquee() {
  const track = document.getElementById('cover-marquee-track');
  const marquee = document.getElementById('cover-marquee');
  if(!track || !marquee) return;

  const urls = [];
  for(const {id, title} of COVER_MAL_IDS) {
    const url = await fetchAniListCover(id);
    if(url) urls.push({url, title});
  }

  if(urls.length === 0) return;

  // 마퀴 효과를 위해 2배 복제
  const items = [...urls, ...urls];
  items.forEach(({url, title}) => {
    const img = document.createElement('img');
    img.className = 'cover-img';
    img.src = url;
    img.alt = title;
    img.loading = 'lazy';
    track.appendChild(img);
  });

  // 이미지 로드 후 애니 시작 — 로드 전 시작하면 max-content 계산 불안정
  const imgs = track.querySelectorAll('img');
  let loaded = 0;
  const startAnim = () => {
    loaded++;
    if(loaded >= Math.min(imgs.length, 6)) { // 최소 6장 로드 시 시작
      marquee.style.display = 'block';
    }
  };
  imgs.forEach(img => {
    if(img.complete) startAnim();
    else { img.onload = startAnim; img.onerror = startAnim; }
  });
  // 3초 타임아웃 — 로드 안 돼도 표시
  setTimeout(() => { marquee.style.display = 'block'; }, 3000);
}

// ═══════════════════════════════════════════
// 문제 로드 (슬롯별 count 배치 → offset 랜덤 병렬 fetch)
// ═══════════════════════════════════════════
async function getSlotCount(format, difficulty) {
  return supaCount(`quiz_items?format=eq.${format}&difficulty=eq.${difficulty}&is_active=eq.true&select=item_id`);
}

async function loadQuestions() {
  // 1. 모든 슬롯 count 병렬 획득
  const counts = await Promise.all(
    SLOTS.map(slot => getSlotCount(slot.format, slot.difficulty).catch(()=>0))
  );

  // 2. offset 기반 랜덤 fetch — source_work 중복 방지 포함
  // author format은 source_work가 작가명이므로 중복 체크 제외
  const seenWorks = new Set();
  const MAX_RETRY = 4; // 슬롯당 최대 재시도 횟수

  async function fetchSlot(slot, total) {
    if(total === 0) return null;
    for(let attempt = 0; attempt < MAX_RETRY; attempt++) {
      const offset = Math.floor(Math.random() * total);
      const item = await supaFetch(
        `quiz_items?format=eq.${slot.format}&difficulty=eq.${slot.difficulty}&is_active=eq.true&limit=1&offset=${offset}&order=item_id.asc`,
        {headers:{Prefer:'return=representation'}}
      ).then(res => Array.isArray(res) ? res[0] : res).catch(()=>null);

      if(!item) return null;

      // author format은 source_work 중복 체크 제외
      const work = item.source_work;
      if(slot.format === 'author' || !work || !seenWorks.has(work)) {
        if(work && slot.format !== 'author') seenWorks.add(work);
        return item;
      }
      // 중복이면 재시도
    }
    // MAX_RETRY 초과 시 마지막 결과 그대로 반환 (없는 것보단 나음)
    const offset = Math.floor(Math.random() * total);
    return supaFetch(
      `quiz_items?format=eq.${slot.format}&difficulty=eq.${slot.difficulty}&is_active=eq.true&limit=1&offset=${offset}&order=item_id.asc`,
      {headers:{Prefer:'return=representation'}}
    ).then(res => Array.isArray(res) ? res[0] : res).catch(()=>null);
  }

  // 슬롯을 순차 처리 (seenWorks 누적을 위해 병렬 불가)
  const results = [];
  for(let i = 0; i < SLOTS.length; i++) {
    const item = await fetchSlot(SLOTS[i], counts[i]);
    results.push(item);
  }

  return results.filter(Boolean).map(item=>{
    const correctKo = item.choices[0];
    const correctEn = item.choices_en?.[0] || item.answer_en;
    const shuffledKo = [...item.choices].sort(()=>Math.random()-.5);
    const shuffledEn = item.choices_en ? [...item.choices_en].sort(()=>Math.random()-.5) : null;
    return {...item, displayChoicesKo:shuffledKo, displayChoicesEn:shuffledEn, correctAnswerKo:correctKo, correctAnswerEn:correctEn};
  });
}

function renderProgress() {
  const wrap = DOM.quizProgress;
  if(wrap.children.length === 0) {
    SLOTS.forEach(()=>{
      const d = document.createElement('div');
      d.className = 'prog-dot';
      wrap.appendChild(d);
    });
  }
  const kids = wrap.children;
  for(let i=0; i<kids.length; i++) {
    const slot = SLOTS[i];

    if(i < state.currentIndex) {
      const ans = state.answers[i];
      cls += ans?.is_correct ? ` done-${slot.difficulty}` : ' done-wrong';
    } else if(i === state.currentIndex) cls += ' current';
    kids[i].className = cls;
  }
}

// ═══════════════════════════════════════════
// 연속 정답 이펙트
// ═══════════════════════════════════════════
function updateStreakEffect(streak) {
  clearStreakEffect();
  if(streak>=7)      { DOM.streakGlow.classList.add('s7'); spawnParticles(7); flashScreen(); }
  else if(streak>=5) { DOM.streakGlow.classList.add('s5'); spawnParticles(4); }
  else if(streak>=3) { DOM.streakGlow.classList.add('s3'); }
}

function clearStreakEffect() {
  DOM.streakGlow.classList.remove('s3','s5','s7');
}

function spawnParticles(n) {
  for(let i=0;i<n;i++){
    const p = document.createElement('div');
    p.className='streak-particle';
    p.style.left = (10+Math.random()*80)+'%';
    p.style.setProperty('--r', (Math.random()*30-15)+'deg');
    p.style.animationDelay = (Math.random()*0.2)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1000);
  }
}

function flashScreen() {
  const fl = document.createElement('div');
  Object.assign(fl.style,{
    position:'fixed',inset:'0',zIndex:'95',
    background:'rgba(255,229,0,.08)',pointerEvents:'none',
    animation:'flash-fade .4s ease forwards',
  });
  document.body.appendChild(fl);
  setTimeout(()=>fl.remove(),500);
}

// KIN 반응 아바타 이미지 선택
// ═══════════════════════════════════════════
function getKinRxnImg(isCorrect, difficulty, isStreak) {
  if(isStreak) return KIN_IMGS.excited;
  if(isCorrect) {
    return difficulty==='hard' ? KIN_IMGS.excited
         : difficulty==='mid'  ? KIN_IMGS.happy
         :                       KIN_IMGS.thinking;
  } else {
    return difficulty==='easy' ? KIN_IMGS.sad
         : difficulty==='mid'  ? KIN_IMGS.serious
         :                       KIN_IMGS.thinking;
  }
}

// ═══════════════════════════════════════════
// 타이핑 이펙트
// ═══════════════════════════════════════════
function typeText(el, text, speed=28) {
  el.textContent='';
  // 말풍선 구조: 부모 .kin-reaction에 show 클래스
  const parent = el.closest('.kin-reaction');
  if(parent) parent.classList.add('show');
  else el.classList.add('show');
  let i=0;
  const tick=()=>{ if(i<text.length){el.textContent+=text[i++];setTimeout(tick,speed);} };
  tick();
}

// ═══════════════════════════════════════════
// 문제 렌더
// ═══════════════════════════════════════════
function renderQuestion() {
  const q = state.questions[state.currentIndex];
  if(!q) return;
  state.answered = false;

  const diff = q.difficulty;
  setDiffOverlay(diff);
  setQuizBg();

  // format badge
  DOM.qBadge.className = `format-badge ${q.format}`;
  DOM.qBadge.textContent = (lang==='ko'?FORMAT_LABELS.ko:FORMAT_LABELS.en)[q.format]||q.format;

  // diff dots — 초기 1회 생성 후 className만 업데이트
  const levels = {easy:1, mid:2, hard:3};
  if(DOM.qDiffDots.children.length === 0) {
    for(let i=0;i<3;i++) DOM.qDiffDots.appendChild(document.createElement('div'));
  }
  const dotKids = DOM.qDiffDots.children;
  for(let i=0;i<3;i++) dotKids[i].className = 'diff-dot'+(i<levels[diff]?` on-${diff}`:'');

  // counter
  DOM.qCounter.innerHTML = `<span style="color:rgba(255,255,255,.85)">${state.currentIndex+1}</span><span style="font-size:.55em;letter-spacing:.02em;color:rgba(255,255,255,.35);margin-left:2px"> / ${state.questions.length}</span>`;

  // question — 난이도별 등장 방식
  DOM.qQuestion.className='quiz-question';
  if (q.direction === 'recall')  DOM.qQuestion.classList.add('direction-recall');
  else if (q.direction === 'explain') DOM.qQuestion.classList.add('direction-explain');
  const enterClass = diff==='easy'?'enter-fade':diff==='mid'?'enter-up':'enter-side';
  DOM.qQuestion.textContent = lang==='ko' ? q.question : (q.question_en||q.question);
  void DOM.qQuestion.offsetWidth;
  DOM.qQuestion.classList.add(enterClass);

  // choices
  DOM.qChoices.innerHTML='';
  const choices = lang==='ko' ? q.displayChoicesKo : (q.displayChoicesEn||q.displayChoicesKo);
  choices.forEach((choice,idx)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    if(diff==='hard'){
      btn.classList.add('stagger');
      btn.style.animationDelay=(idx*0.08)+'s';
    }
    btn.textContent=choice;
    btn.addEventListener('click',()=>selectAnswer(choice));
    DOM.qChoices.appendChild(btn);
  });

  // KIN 반응 초기화
  DOM.kinBubble.textContent='';
  DOM.kinAvatar.src='';
  DOM.kinReaction.classList.remove('show');

  // 다음 버튼
  DOM.btnNext.classList.remove('show');
  DOM.btnNext.textContent = t('다음 →','Next →');
}

// ═══════════════════════════════════════════
// 답변 선택
// ═══════════════════════════════════════════
function selectAnswer(selected) {
  if(state.answered) return;
  state.answered=true;

  const q = state.questions[state.currentIndex];
  const correct = lang==='ko' ? q.correctAnswerKo : (q.correctAnswerEn||q.correctAnswerKo);
  const isCorrect = selected===correct;

  if(isCorrect) { state.score++; state.streak++; }
  else          { state.streak=0; clearStreakEffect(); }

  haptic(isCorrect?'correct':'wrong');

  // 선택지 색상
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent===correct) btn.classList.add('correct');
    else if(btn.textContent===selected&&!isCorrect) btn.classList.add('wrong');
    else btn.classList.add('faded');
  });

  // 오답 선택 시 정답 버튼 주목 떨림
  if(!isCorrect) {
    setTimeout(()=>{
      DOM.qChoices.querySelectorAll('.choice-btn.correct')
        .forEach(b=>b.classList.add('attention'));
    }, 180);
  }

  // 답변 기록
  state.answers.push({
    item_id: q.item_id, format: q.format, difficulty: q.difficulty,
    source_work: q.source_work, source_work_en: q.source_work_en, is_correct: isCorrect,
    selected, correct_answer: correct,
  });

  // 연속 정답 이펙트
  let rxnText;
  if(isCorrect && state.streak>=3) {
    updateStreakEffect(state.streak);
    rxnText = getStreakRxn(state.streak);
  } else {
    rxnText = getRxn(isCorrect, q.difficulty);
  }

  const isStreakReaction = isCorrect && state.streak>=3;
  DOM.kinAvatar.src = getKinRxnImg(isCorrect, q.difficulty, isStreakReaction);
  typeText(DOM.kinBubble, rxnText, 25);

  // 다음 버튼
  const isLast = state.currentIndex===state.questions.length-1;
  DOM.btnNext.textContent = isLast ? t('결과 보기 →','See Result →') : t('다음 →','Next →');
  setTimeout(()=>DOM.btnNext.classList.add('show'), 350);
}

// ═══════════════════════════════════════════
// 다음 문제
// ═══════════════════════════════════════════
DOM.btnNext.addEventListener('click', goNext);
function goNext() {
  state.currentIndex++;
  if(state.currentIndex < state.questions.length) {
    renderProgress(); renderQuestion();
  } else {
    clearStreakEffect();
    setDiffOverlay('easy');
    showResult();
  }
}

// ═══════════════════════════════════════════
// 스와이프로 다음 (모바일)
// ═══════════════════════════════════════════
let touchStartY=0, touchStartX=0; // #12: X좌표 추가
document.addEventListener('touchstart', e=>{
  touchStartY=e.touches[0].clientY;
  touchStartX=e.touches[0].clientX; // #12
},{passive:true});
document.addEventListener('touchend', e=>{
  if(state.phase!=='quiz' || !state.answered) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dx = e.changedTouches[0].clientX - touchStartX; // #12
  if(dy < -60 && Math.abs(dx) < 40) goNext(); // #12: 수직 스와이프만 허용
},{passive:true});

// ═══════════════════════════════════════════
// 결과 화면
// ═══════════════════════════════════════════
async function showResult() {
  showPage('page-result');
  unlockLang();

  document.getElementById('result-score').textContent = state.score;

  // 패턴 + 관찰 멘트 — state에 캐시 (공유 시 재사용)
  state.resultPattern = detectPattern(state.answers);
  state.resultObs     = getObs(state.resultPattern);
  document.getElementById('result-observation-text').textContent = state.resultObs;

  const obsMood = state.score>=9?'excited':state.score>=7?'happy':state.score>=5?'thinking':state.score>=3?'serious':'sad';
  state.resultMood = obsMood;

  // 가장 잘 아는 작품 계산 (2문제+ 중 정답률 높은 순)
  const workScore={};
  state.answers.forEach(a=>{
    const w=a.source_work||'?';
    if(!workScore[w]) workScore[w]={total:0,correct:0,mal_id:null};
    workScore[w].total++;
    if(a.is_correct) workScore[w].correct++;
    const q=state.questions.find(q=>q.item_id===a.item_id);
    if(q?.mal_id) workScore[w].mal_id=q.mal_id;
  });

  const topEntry = Object.entries(workScore)
    .filter(([,v])=>v.total>=2)
    .sort(([,a],[,b])=>{
      const rd=(b.correct/b.total)-(a.correct/a.total);
      return rd!==0?rd:b.total-a.total;
    })[0];

  if(topEntry) {
    const [workName, wData] = topEntry;
    state.topWork = { name: workName, ...wData };
    document.getElementById('result-work-card').style.display='block';
    document.getElementById('result-kin-card').style.display='none';
    const displayName = lang==='en'
      ? (state.answers.find(a=>a.source_work===workName)?.source_work_en || workName)
      : workName;
    document.getElementById('result-work-name').textContent = displayName;
    document.getElementById('result-work-sub').textContent =
      t(`${wData.total}문제 중 ${wData.correct}개 정답`, `${wData.correct} / ${wData.total} correct`);
    if(wData.mal_id) {
      try {
        const res = await fetch(`${JIKAN}/anime/${wData.mal_id}`);
        const data = await res.json();
        const imgUrl = data.data?.images?.jpg?.large_image_url;
        if(imgUrl) document.getElementById('result-work-bg').style.backgroundImage=`url(${imgUrl})`;
      } catch{}
    }
  } else {
    state.topWork = null;
    document.getElementById('result-work-card').style.display='none';
    document.getElementById('result-kin-card').style.display='block';
    const bgIdx = Math.floor(Math.random() * 10) + 1;
    document.getElementById('result-kin-bg').style.backgroundImage = `url(./assets/bg/bg${bgIdx}.png)`;
  }

  document.getElementById('result-obs-avatar').src = KIN_IMGS[obsMood];

  // 틀린 문제
  const wrong = state.answers.filter(a=>!a.is_correct);
  const ws = document.getElementById('result-wrong-section');
  const wl = document.getElementById('result-wrong-list');
  wl.innerHTML='';
  if(wrong.length>0){
    ws.style.display='block';
    wrong.forEach(a=>{
      const item=state.questions.find(q=>q.item_id===a.item_id);
      if(!item) return;
      const qText = lang==='ko'?item.question:(item.question_en||item.question);
      const div=document.createElement('div');
      div.className='wrong-item';
      const qDiv=document.createElement('div');
      qDiv.textContent=qText.slice(0,55)+(qText.length>55?'…':'');
      const aDiv=document.createElement('div');
      aDiv.className='wrong-item-answer';
      aDiv.textContent=`→ ${a.correct_answer}`;
      div.appendChild(qDiv);
      div.appendChild(aDiv);
      wl.appendChild(div);
    });
  } else ws.style.display='none';

  saveSession(state.resultPattern);
}

// ═══════════════════════════════════════════
// 세션 저장
// ═══════════════════════════════════════════
async function saveSession(pattern) {
  try {
    const diffMix = state.answers.reduce((acc,a)=>{
      acc[a.difficulty]=(acc[a.difficulty]||0)+1; return acc;
    },{easy:0,mid:0,hard:0});
    await supaFetch('quiz_sessions',{
      method:'POST',
      body:JSON.stringify({
        session_key:state.sessionKey, score:state.score, total:10,
        result_type:pattern, lang,
        answers:state.answers,
        difficulty_mix: diffMix,
        format_mix:Object.fromEntries(
          ['work','character','outlier','author','relation'].map(f=>[
            f, state.answers.filter(a=>a.format===f).length
          ])
        ),
      }),
    });
  } catch{}

  // 퀴즈 완료 기록 (랜딩 상태 업데이트용)
  localStorage.setItem('k2_quiz_done', '1');

  // KIN 에이전트 이벤트 (fire-and-forget)
  fetch(`${API_URL}/api/kin/event`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      service:'k2_manga',
      event_type:'quiz_completed',
      payload:{ count:1, lang, result_pattern:pattern },
    }),
  }).catch(()=>{});
}

// ═══════════════════════════════════════════
// AniList 커버 이미지
// ═══════════════════════════════════════════
async function fetchAniListCover(malId) {
  const query = `query($id:Int,$t:MediaType){Media(idMal:$id,type:$t){coverImage{large}}}`;
  for (const type of ['ANIME','MANGA']) {
    try {
      const res = await fetch('https://graphql.anilist.co', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query, variables:{id:malId, t:type}}),
      });
      const url = (await res.json())?.data?.Media?.coverImage?.large;
      if(url) return url;
    } catch{}
  }
  return null;
}

function loadImgCORS(img, src) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(reject, 4000); // #13: 6s→4s
    img.crossOrigin = 'anonymous';
    img.onload  = () => { clearTimeout(t); resolve(); };
    img.onerror = () => { clearTimeout(t); reject(); };
    img.src = src;
  });
}

// ═══════════════════════════════════════════
// 공유 — 이미지 카드 생성 + 모달
// ═══════════════════════════════════════════
let shareBlob = null;
let shareBlobUrl = null; // createObjectURL 재사용 (메모리 누수 방지)

async function generateShareImage() {
  if (!window.html2canvas) throw new Error('html2canvas not loaded'); // #1: guard
  const obs  = state.resultObs || getObs(state.resultPattern || 'random');
  const mood = state.resultMood || 'thinking';

  // KIN 얼굴 + 말풍선 + 점수
  document.getElementById('sc-kin-face').src  = KIN_IMGS[mood];
  document.getElementById('sc-bubble').textContent = `"${obs}"`;
  document.getElementById('sc-score-num').textContent = state.score;
  document.getElementById('sc-bar').style.width = `${state.score * 10}%`;

  // 작품 이미지 처리
  const imgWrap  = document.getElementById('sc-work-img-wrap');
  const headerWork = document.getElementById('sc-header-work');
  const malId    = state.topWork?.mal_id;
  const workName = state.topWork?.name || '';

  headerWork.textContent = workName;
  imgWrap.style.display  = 'none';

  if(malId) {
    try {
      const coverUrl = await fetchAniListCover(malId);
      if(coverUrl) {
        imgWrap.style.backgroundImage = `url(${coverUrl})`;
        imgWrap.style.display = 'block';
      }
    } catch{}
  }

  // KIN 얼굴 이미지 로드 대기
  await loadImgCORS(document.getElementById('sc-kin-face'), KIN_IMGS[mood]).catch(()=>{});

  const canvas = await html2canvas(document.getElementById('share-card'), {
    backgroundColor:'#080806',
    scale:2,
    useCORS:true,
    logging:false,
  });
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

document.getElementById('btn-share').addEventListener('click', async () => {
  const modal = document.getElementById('share-modal');
  const loading = document.getElementById('share-modal-loading');
  const imgEl = document.getElementById('share-modal-img');
  const btns = document.getElementById('share-modal-btns');

  modal.classList.add('open');
  loading.style.display = 'block';
  imgEl.style.display = 'none';
  btns.style.display = 'none';

  try {
    shareBlob = await generateShareImage();
    if(shareBlobUrl) URL.revokeObjectURL(shareBlobUrl); // 이전 URL 해제
    shareBlobUrl = URL.createObjectURL(shareBlob);
    imgEl.src = shareBlobUrl;
    imgEl.style.display = 'block';
    btns.style.display = 'flex';
  } catch {
    modal.classList.remove('open');
    // fallback: 텍스트 복사
    const obs = state.resultObs || getObs(state.resultPattern || 'random');
    const text = t(
      `KIN의 만화퀴즈 ${state.score}/10\n"${obs}"\nkinxdred.com/kin/k2`,
      `KIN's Manga Quiz ${state.score}/10\n"${obs}"\nkinxdred.com/kin/k2`
    );
    try { await navigator.clipboard.writeText(text); } catch {}
  } finally {
    loading.style.display = 'none';
  }
});

// 저장하기
document.getElementById('btn-share-save').addEventListener('click', () => {
  if(!shareBlobUrl) return;
  const a = document.createElement('a');
  a.href = shareBlobUrl;
  a.download = `kin-quiz-${state.score}.png`;
  a.click();
});

// 공유하기 (네이티브)
document.getElementById('btn-share-native').addEventListener('click', async () => {
  if(!shareBlob) return;
  const file = new File([shareBlob], 'kin-quiz.png', { type: 'image/png' });
  try {
    if(navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'KIN의 만화퀴즈',
        text: `${state.score}/10 — kinxdred.com/kin/k2`,
      });
    } else {
      await navigator.share({ title:'KIN의 만화퀴즈', url:'https://kinxdred.com/kin/k2' });
    }
  } catch {}
});

// 모달 닫기
document.getElementById('share-modal-close').addEventListener('click', () => {
  document.getElementById('share-modal').classList.remove('open');
});

// 다시 하기

document.getElementById('btn-retry').addEventListener('click',()=>{
  Object.assign(state,{
    questions:[],currentIndex:0,answers:[],
    score:0,streak:0,sessionKey:genUUID(),answered:false,
    resultPattern:null,resultObs:null,topWork:null,resultMood:null,
  });
  startQuiz(); // startQuiz 내부에서 lockLang 호출
});

// ═══════════════════════════════════════════
// 퀴즈 시작
// ═══════════════════════════════════════════
let quizLoading = false;

async function startQuiz() {
  if(quizLoading) return; // 중복 실행 방지
  quizLoading = true;
  lockLang();
  showPage('page-quiz');
  document.getElementById('q-question').textContent = t('불러오는 중...','Loading...');
  document.getElementById('q-choices').innerHTML='';

  try {
    state.questions = await loadQuestions();
    if(state.questions.length < 5) throw new Error('not enough');
  } catch {
    showError(t('문제를 불러오지 못했어.','Could not load questions.'));
    unlockLang(); showPage('page-landing'); quizLoading = false; return;
  }

  quizLoading = false;
  state.currentIndex=0; state.answers=[]; state.score=0; state.streak=0; state.answered=false;
  clearStreakEffect(); setDiffOverlay('easy');
  DOM.quizProgress.innerHTML='';
  renderProgress(); renderQuestion();
}

function showError(msg) {
  const el=document.getElementById('error-msg');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; },3000);
}

document.getElementById('btn-start').addEventListener('click', startQuiz);

// ═══════════════════════════════════════════
// 결과 화면 정적 텍스트 언어 적용
// ═══════════════════════════════════════════
function applyResultLang() {
  const isEn = lang === 'en';
  const el = id => document.getElementById(id);
  if(el('result-eyebrow'))    el('result-eyebrow').textContent    = isEn ? "KIN's Verdict"   : 'KIN의 판정';
  if(el('result-wrong-label'))el('result-wrong-label').textContent= isEn ? 'Missed'           : '틀린 문제';
  if(el('btn-share'))         el('btn-share').textContent         = isEn ? 'Share'            : '공유하기';
  if(el('btn-retry'))         el('btn-retry').textContent         = isEn ? 'Try Again'        : '다시 하기';
  if(el('btn-gallery'))       el('btn-gallery').textContent       = isEn ? '← Gallery'        : '← 갤러리';
  const workLabel = document.querySelector('.result-work-label');
  if(workLabel) workLabel.textContent = isEn ? 'You know this one' : '가장 잘 아는 작품';
  // work-sub 재계산
  const sub = el('result-work-sub');
  if(sub && state.topWork) {
    const d = state.topWork;
    sub.textContent = isEn ? `${d.correct} / ${d.total} correct` : `${d.total}문제 중 ${d.correct}개 정답`;
  }
  // 작품명 언어 전환
  const workName = el('result-work-name');
  if(workName && state.topWork) {
    workName.textContent = isEn
      ? (state.answers.find(a=>a.source_work===state.topWork.name)?.source_work_en || state.topWork.name)
      : state.topWork.name;
  }
  // obs text 언어 전환
  const obsText = el('result-observation-text');
  if(obsText && state.resultPattern) {
    state.resultObs = getObs(state.resultPattern);
    obsText.textContent = state.resultObs;
  }
  // 틀린 문제 목록 재렌더
  const wl = el('result-wrong-list');
  if(wl && state.answers.length) {
    wl.innerHTML = '';
    state.answers.filter(a=>!a.is_correct).forEach(a=>{
      const item = state.questions.find(q=>q.item_id===a.item_id);
      if(!item) return;
      const qText = isEn ? (item.question_en||item.question) : item.question;
      const div = document.createElement('div');
      div.className = 'wrong-item';
      const qDiv = document.createElement('div');
      qDiv.textContent = qText.slice(0,55)+(qText.length>55?'…':'');
      const aDiv = document.createElement('div');
      aDiv.className = 'wrong-item-answer';
      // 현재 lang에 맞는 정답 표시
      const qItem = state.questions.find(q=>q.item_id===a.item_id);
      const ans = isEn ? (qItem?.correctAnswerEn || a.correct_answer) : (qItem?.correctAnswerKo || a.correct_answer);
      aDiv.textContent = `→ ${ans}`;
      div.appendChild(qDiv); div.appendChild(aDiv);
      wl.appendChild(div);
    });
  }
}
// ═══════════════════════════════════════════
// 랜딩 텍스트 언어 적용
// ═══════════════════════════════════════════
function applyLandingLang() {
  const lp = document.getElementById('page-landing');
  if(!lp) return;
  const qs = sel => lp.querySelector(sel);
  const isEn = lang === 'en';

  // 버튼 텍스트
  const startBtn = document.getElementById('btn-start');
  if(startBtn) startBtn.querySelector('.btn-start-text').textContent = isEn ? 'Start' : '시작';
  // 헤더 타이틀 (랜딩에서도 명시적 업데이트)
  const hTitleL = document.getElementById('h-title');
  if(hTitleL) hTitleL.textContent = isEn ? "What kind of fan?" : '난 어떤 덕후?';

  // 모드 레이블
  const quizLabel = lp.querySelector('#mode-quiz-label');
  const quizTitle = lp.querySelector('#mode-quiz-title');
  const quizSub   = lp.querySelector('#mode-quiz-sub');
  if(quizLabel) quizLabel.textContent = isEn ? 'Quiz' : '퀴즈';
  if(quizTitle) quizTitle.textContent = isEn ? '10 questions · KIN judges' : '10문제 · KIN 판정';
  if(quizSub)   quizSub.textContent   = isEn ? 'setting · character · relation · author' : '설정 · 캐릭터 · 관계 · 작가';

  // KIN 버블 — 완료 여부에 따라
  updateLandingState();

  // 월드컵 카드 텍스트
  const lockedCards = lp.querySelectorAll('.mode-card-locked');
  if(lockedCards[0]) {
    const l = lockedCards[0];
    l.querySelector('.mode-label').textContent = isEn ? 'Character Worldcup' : '캐릭터 월드컵';
    l.querySelector('.mode-title').textContent = isEn ? 'Pick your favorite character' : '최애 캐릭터 가려내기';
    l.querySelector('.mode-sub').textContent   = isEn ? '1:1 · tournament' : '1:1 대결 · 토너먼트';
  }
  if(lockedCards[1]) {
    const l = lockedCards[1];
    l.querySelector('.mode-label').textContent = isEn ? 'Work Worldcup' : '작품 월드컵';
    l.querySelector('.mode-title').textContent = isEn ? 'Pick your favorite work' : '최애 작품 가려내기';
    l.querySelector('.mode-sub').textContent   = isEn ? '1:1 · tournament' : '1:1 대결 · 토너먼트';
  }
  lp.querySelectorAll('.btn-mode-locked').forEach(btn => {
    btn.textContent = isEn ? 'Coming soon' : '준비 중';
  });

  // 메타 아이템
  const metaItems = lp.querySelectorAll('.landing-meta-item');
  if(metaItems[1]) metaItems[1].textContent = isEn ? 'KIN judges' : 'KIN 판정';

  // 헤더 타이틀
  const hName = document.querySelector('.h-name');
  if(hName) hName.textContent = isEn ? 'Manga Quiz' : '만화퀴즈';

  // manga-gate 이미지
  const mg = document.getElementById('manga-gate');
  if(mg) mg.src = isEn ? './assets/manga_gate1.png' : './assets/manga_gate2.png';
}

function updateLandingState() {
  const quizDone  = !!localStorage.getItem('k2_quiz_done');
  const bubble    = document.getElementById('landing-kin-bubble');
  const modeQuiz  = document.getElementById('mode-quiz');
  const avatar    = document.getElementById('landing-kin-avatar');
  const isEn      = lang === 'en';

  if(quizDone) {
    if(bubble) bubble.textContent = isEn
      ? "Quiz alone wasn't enough."
      : "퀴즈만으론 다 못 읽었어.";
    if(modeQuiz) {
      modeQuiz.className = 'mode-card mode-card-done';
      const label = modeQuiz.querySelector('.mode-label');
      const btn   = modeQuiz.querySelector('.btn-start');
      if(label) { label.textContent = isEn ? 'Quiz · Done' : '퀴즈 · 완료'; label.style.color='rgba(74,222,128,.7)'; }
      if(btn)   { btn.textContent = isEn ? 'Again' : '다시'; }
    }
    if(avatar) avatar.src = KIN_IMGS.happy;
  } else {
    if(bubble) bubble.textContent = isEn ? "What kind of fan are you." : "넌 어떤 덕후야.";
    if(modeQuiz) modeQuiz.className = 'mode-card mode-card-active';
    if(avatar) avatar.src = KIN_IMGS.thinking;
  }
}
(async()=>{
  setLang(lang);
  applyLandingLang();
  const $loading=document.getElementById('loading');
  await Promise.all([loadTotalCount(), loadTodayCount()]);
  buildCoverMarquee(); // fire-and-forget — 실패해도 무관
  $loading.style.opacity='0';
  setTimeout(()=>{ $loading.style.display='none'; },400);
})();
</script>
