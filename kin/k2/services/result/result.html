<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/kin/k2/k2_favicon.svg">
<title>KIN의 판정 — KIN의 만화·애니</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/kin/k2/lib/design-tokens.css">
<link rel="stylesheet" href="/kin/k2/lib/common.css">
<link rel="stylesheet" href="/kin/k2/services/result/result.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <a class="h-back" href="/kin/">← KIN</a>
  <div class="h-name" id="h-title">난 어떤 덕후?</div>
  <div id="lang-toggle">
    <span class="lt active" data-lang="ko">KO</span>
    <span class="lt-sep"> / </span>
    <span class="lt" data-lang="en">EN</span>
  </div>
</header>

<div id="loading"><span>loading</span></div>
<div id="error-msg"></div>

<!-- 결과 본문 -->
<main class="result-page" id="result-main">
  <div class="result-top">
    <div class="landing-eyebrow" id="result-eyebrow">KIN의 판정</div>
    <div class="result-score-wrap">
      <div class="result-score" id="result-score">0</div>
      <div class="result-score-denom">/ 10</div>
    </div>
    <div class="result-label" id="result-label"></div>
  </div>

  <!-- 작품 이미지 카드 -->
  <div class="result-top-work" id="result-work-card" style="display:none">
    <div class="result-work-bg" id="result-work-bg"></div>
    <div class="result-work-content">
      <div class="result-work-label">가장 잘 아는 작품</div>
      <div class="result-work-name" id="result-work-name"></div>
      <div class="result-work-sub" id="result-work-sub"></div>
    </div>
  </div>

  <!-- bg 카드 (작품 없을 때) -->
  <div class="result-kin-wrap" id="result-kin-card" style="display:none">
    <div class="result-kin-bg" id="result-kin-bg"></div>
    <div class="result-kin-overlay"></div>
  </div>

  <!-- KIN 관찰 -->
  <div class="result-observation">
    <img class="result-obs-avatar" id="result-obs-avatar" src="" alt="KIN">
    <div class="result-obs-content">
      <div class="result-observation-label">KIN</div>
      <div id="result-observation-text"></div>
    </div>
  </div>

  <!-- 틀린 문제 -->
  <div id="result-wrong-section" style="display:none">
    <div class="result-wrong-label" id="result-wrong-label">틀린 문제</div>
    <div class="result-wrong-list" id="result-wrong-list"></div>
  </div>

  <div class="result-replay-hint" id="result-replay-hint"></div>

  <div class="result-btns">
    <button class="btn-primary"   id="btn-share">공유하기</button>
    <button class="btn-secondary" id="btn-retry">다시 하기</button>
    <a      class="btn-secondary" href="/kin/k2/" id="btn-gallery">← 갤러리</a>
  </div>
</main>

<!-- 공유 모달 -->
<div id="share-modal">
  <span id="share-modal-loading">generating...</span>
  <img id="share-modal-img" src="" alt="" style="display:none">
  <div id="share-modal-btns" style="display:none">
    <button class="sm-btn sm-btn-primary"   id="btn-share-save">저장하기</button>
    <button class="sm-btn sm-btn-secondary" id="btn-share-native">공유하기</button>
  </div>
  <div id="share-modal-close">닫기</div>
</div>

<!-- 공유 카드 (캔버스 렌더용) -->
<div id="share-card">
  <div class="sc-top">
    <div class="sc-cover-bg" id="sc-cover-bg"></div>
    <div class="sc-top-overlay"></div>
    <img class="sc-kin-large" id="sc-kin-face" src="" alt="KIN" crossorigin="anonymous">
    <div class="sc-top-content">
      <div class="sc-eyebrow" id="sc-header-title">KIN의 판정</div>
      <div class="sc-label-large" id="sc-label"></div>
      <div class="sc-score-row">
        <span class="sc-score-num" id="sc-score-num">0</span>
        <span class="sc-score-denom">/ 10</span>
      </div>
    </div>
  </div>
  <div class="sc-bottom">
    <div class="sc-comment" id="sc-bubble"></div>
    <div class="sc-bar-row">
      <div class="sc-bar-wrap"><div class="sc-bar" id="sc-bar"></div></div>
      <span class="sc-url">kinxdred.com/kin/k2</span>
    </div>
  </div>
</div>

<script type="module" src="/kin/k2/services/result/result.js"></script>
</body>
</html>
