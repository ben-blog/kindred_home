<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경 없음 (투명) -->

  <!-- 만화 말풍선 — KIN 옐로우 -->
  <rect x="2" y="2" width="26" height="20" rx="3" ry="3"
        fill="#FFE500" stroke="#080806" stroke-width="1.5"/>

  <!-- 말풍선 꼬리 (아래쪽 왼편) -->
  <polygon points="6,22 10,22 6,29"
           fill="#FFE500" stroke="#080806" stroke-width="1.5"
           stroke-linejoin="round"/>

  <!-- 물음표 — 굵고 검게 -->
  <text x="15" y="17"
        font-family="'Syne', 'Arial Black', sans-serif"
        font-weight="800"
        font-size="15"
        text-anchor="middle"
        fill="#080806"
        letter-spacing="-0.5">?</text>

  <!-- 만화 효과선 — 우상단 코너에 작게 -->
  <line x1="22" y1="2" x2="25" y2="0.5" stroke="#080806" stroke-width="1" opacity="0.4"/>
  <line x1="25" y1="4" x2="28" y2="2"   stroke="#080806" stroke-width="1" opacity="0.4"/>
  <line x1="26" y1="7" x2="30" y2="6"   stroke="#080806" stroke-width="1" opacity="0.4"/>
</svg>
