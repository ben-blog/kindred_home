<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIN — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080806;overflow:hidden;font-family:'DM Mono',monospace;cursor:none}
@media(pointer:coarse){html,body{cursor:auto}}
:root{--kin:#FFE500;--bg:#080806}

#cur{position:fixed;z-index:9999;width:8px;height:8px;border-radius:50%;
  background:var(--kin);pointer-events:none;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .2s,height .2s}
#cur.big{width:24px;height:24px}

#grain{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:gr .3s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}50%{background-position:-40px 30px}}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 55% at 20% 80%,rgba(140,100,0,.10),transparent),
    radial-gradient(ellipse 45% 45% at 80% 20%,rgba(255,200,0,.05),transparent)}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 24px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(rgba(8,8,6,.9),transparent)}
.h-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--kin)}
.h-back{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.2);text-transform:uppercase;cursor:pointer;transition:color .2s}
.h-back:hover{color:var(--kin)}

/* ── LANG TOGGLE ── */
#lang-toggle{display:flex;align-items:center;font-size:8px;letter-spacing:.2em;}
.lt{padding:4px 8px;cursor:pointer;color:rgba(255,255,255,.2);transition:color .2s;user-select:none;}
.lt.active{color:var(--kin);}
.lt-sep{color:rgba(255,255,255,.1)}

/* ── GALLERY GRID ── */
#gallery{
  position:fixed;inset:0;top:56px;z-index:2;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-auto-rows:1fr;
  gap:3px;padding:3px;
  overflow-y:auto;
}
@media(max-width:680px){
  #gallery{grid-template-columns:repeat(2,1fr);}
}

.thumb{
  position:relative;overflow:hidden;cursor:pointer;
  aspect-ratio:3/4;
  opacity:0;transform:scale(.94);
  background:#111;
  transition:filter .2s,transform .2s;
}
.thumb.in{opacity:1;transform:scale(1);transition:opacity .35s ease,transform .35s cubic-bezier(.16,1,.3,1),filter .2s}
.thumb:hover{filter:brightness(1.25);transform:scale(1.02)!important}
.thumb::after{
  content:'';position:absolute;inset:0;
  box-shadow:inset 0 0 0 1px rgba(255,229,0,.12);
  pointer-events:none;z-index:3;transition:box-shadow .2s;
}
.thumb:hover::after{box-shadow:inset 0 0 0 1.5px rgba(255,229,0,.6)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}

.thumb-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 10px 8px;
  background:linear-gradient(transparent,rgba(0,0,0,.72));
  font-size:7px;letter-spacing:.18em;
  color:rgba(255,229,0,.5);text-transform:lowercase;
  pointer-events:none;z-index:2;
}

/* action indicator on thumbnail */
.thumb-action{
  position:absolute;top:9px;right:9px;z-index:4;
  width:7px;height:7px;border-radius:50%;
  background:var(--kin);
  animation:aPulse 2.2s ease infinite;
  pointer-events:none;
}
@keyframes aPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:var(--bg);}
#loading span{font-size:9px;letter-spacing:.4em;color:rgba(255,229,0,.3);text-transform:uppercase;animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* ══════════════════════════════
   VIEWER
══════════════════════════════ */
#viewer{position:fixed;inset:0;z-index:200;display:none;}

#crack-wrap{position:absolute;inset:0;z-index:1;pointer-events:none}
.cp{position:absolute;background:var(--bg);transition:transform .5s cubic-bezier(.87,0,.13,1);}
.cp.tl{top:0;left:0;width:50%;height:50%;border-right:2px solid rgba(255,229,0,.25);border-bottom:2px solid rgba(255,229,0,.25);}
.cp.tr{top:0;right:0;width:50%;height:50%;border-left:2px solid rgba(255,229,0,.25);border-bottom:2px solid rgba(255,229,0,.25);}
.cp.bl{bottom:0;left:0;width:50%;height:50%;border-right:2px solid rgba(255,229,0,.25);border-top:2px solid rgba(255,229,0,.25);}
.cp.br{bottom:0;right:0;width:50%;height:50%;border-left:2px solid rgba(255,229,0,.25);border-top:2px solid rgba(255,229,0,.25);}

#viewer.open .cp.tl{transform:translate(-30%,-30%)}
#viewer.open .cp.tr{transform:translate( 30%,-30%)}
#viewer.open .cp.bl{transform:translate(-30%, 30%)}
#viewer.open .cp.br{transform:translate( 30%, 30%)}

@media(max-width:680px){
  #viewer.open .cp.tl{transform:translate(-18%,-18%)}
  #viewer.open .cp.tr{transform:translate( 18%,-18%)}
  #viewer.open .cp.bl{transform:translate(-18%, 18%)}
  #viewer.open .cp.br{transform:translate( 18%, 18%)}
}

#backdrop{
  position:absolute;inset:0;z-index:0;
  background:rgba(4,4,3,.88);
  opacity:0;pointer-events:none;
  transition:opacity .35s ease .15s;
}
#viewer.open #backdrop{opacity:1;pointer-events:all}

#sfx{
  position:absolute;z-index:3;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(2.5) rotate(-15deg);
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(48px,12vw,140px);
  color:var(--kin);letter-spacing:-.03em;
  text-shadow:0 0 50px rgba(255,229,0,.35), 3px 3px 0 rgba(0,0,0,.95);
  pointer-events:none;opacity:0;transition:none;
}
#sfx.slam{animation:sfxPop .55s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes sfxPop{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(2.5) rotate(-15deg)}
  25% {opacity:1;transform:translate(-50%,-50%) scale(0.95) rotate(-15deg)}
  60% {opacity:1;transform:translate(-50%,-50%) scale(1.0) rotate(-15deg)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(-15deg)}
}

/* ── DETAIL ── */
#detail{
  position:absolute;z-index:4;
  top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;gap:clamp(20px,4vw,56px);align-items:flex-start;
  width:90%;max-width:900px;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease .3s;
}
#viewer.open #detail{opacity:1;pointer-events:all}

#detail-img{
  flex:0 0 auto;
  width:clamp(160px,28vw,320px);
  aspect-ratio:3/4;
  overflow:hidden;
  border:1px solid rgba(255,229,0,.18);
}
#detail-img img{width:100%;height:100%;object-fit:cover;display:block;}

#detail-text{flex:1 1 auto;overflow-y:auto;max-height:80vh;padding-right:8px;}
#detail-eyebrow{font-size:8px;letter-spacing:.32em;color:rgba(255,229,0,.3);text-transform:uppercase;margin-bottom:10px;}
#detail-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(24px,4vw,52px);
  color:var(--kin);letter-spacing:-.02em;line-height:1;margin-bottom:12px;
}
#detail-technique{font-size:8px;letter-spacing:.16em;line-height:1.7;color:rgba(255,255,255,.18);margin-bottom:16px;}
#detail-desc{font-size:11px;line-height:1.85;color:rgba(255,255,255,.38);margin-bottom:16px;}

.perspective-block{margin-bottom:12px;}
.perspective-label{font-size:7px;letter-spacing:.28em;color:rgba(255,229,0,.25);text-transform:uppercase;margin-bottom:4px;}
.perspective-text{font-size:11px;line-height:1.75;color:rgba(255,255,255,.28);}

#detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;}
.tag{
  font-size:7px;letter-spacing:.18em;text-transform:uppercase;
  padding:3px 9px;border:1px solid rgba(255,229,0,.15);
  color:rgba(255,229,0,.32);
}

/* action: ghost (default) vs filled (has action) */
#detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.action-btn{
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  padding:9px 16px;border:1.5px solid var(--kin);
  background:var(--kin);color:#000;
  cursor:pointer;text-decoration:none;display:inline-block;
  font-family:'DM Mono',monospace;font-weight:400;
  transition:background .2s,color .2s,transform .15s;
  animation:actPulse 2.8s ease infinite;
}
.action-btn:hover{background:transparent;color:var(--kin);transform:translateY(-2px);}
@keyframes actPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,229,0,.0)}
  50%{box-shadow:0 0 0 6px rgba(255,229,0,.12)}
}

#detail-close{
  display:inline-block;font-size:8px;letter-spacing:.28em;
  color:rgba(255,255,255,.18);text-transform:uppercase;cursor:pointer;
  transition:color .2s;margin-top:18px;
}
#detail-close:hover{color:var(--kin)}

#detail-nav{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:24px;z-index:5;
}
.dn{font-size:9px;letter-spacing:.28em;color:rgba(255,255,255,.18);
  cursor:pointer;transition:color .2s;padding:10px;user-select:none}
.dn:hover{color:var(--kin)}
#detail-counter{font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.14);display:flex;align-items:center}

@media(max-width:680px){
  #detail{flex-direction:column;gap:12px;padding:16px;top:48%;width:96%;max-width:none;}
  #detail-img{width:100%;aspect-ratio:3/4;max-height:38vh;}
  #detail-technique{display:none}
  #detail-desc{display:none}
  .perspective-block{display:none}
  #detail-title{font-size:clamp(20px,6vw,32px)}
  #detail-nav{bottom:14px}
  #sfx{font-size:clamp(36px,14vw,80px)}
}
</style>
</head>
<body>
<div id="loading"><span>loading</span></div>
<div id="grain"></div>
<div id="cur"></div>

<div id="header">
  <div class="h-name">KIN</div>
  <div id="lang-toggle">
    <span class="lt" id="lt-ko">KO</span>
    <span class="lt-sep">·</span>
    <span class="lt" id="lt-en">EN</span>
  </div>
  <div class="h-back">← back</div>
</div>

<div id="gallery"></div>

<div id="viewer">
  <div id="backdrop"></div>
  <div id="crack-wrap">
    <div class="cp tl"></div><div class="cp tr"></div>
    <div class="cp bl"></div><div class="cp br"></div>
  </div>
  <div id="sfx"></div>
  <div id="detail">
    <div id="detail-img"><img id="detail-img-el" src="" alt=""></div>
    <div id="detail-text">
      <div id="detail-eyebrow"></div>
      <div id="detail-title"></div>
      <div id="detail-technique"></div>
      <div id="detail-desc"></div>
      <div class="perspective-block">
        <div class="perspective-label">KIN</div>
        <div class="perspective-text" id="detail-kin"></div>
      </div>
      <div class="perspective-block">
        <div class="perspective-label">DRED</div>
        <div class="perspective-text" id="detail-dred"></div>
      </div>
      <div id="detail-tags"></div>
      <div id="detail-actions"></div>
      <div id="detail-close">close ×</div>
    </div>
  </div>
  <div id="detail-nav">
    <div class="dn" id="dn-prev">←</div>
    <div class="dn" id="detail-counter"></div>
    <div class="dn" id="dn-next">→</div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const SUPA_URL = 'https://aurbgjnbfatcqgovwagp.supabase.co';
const SUPA_KEY = 'sb_publishable_Eg-9eLFO2wAe0NiJBJWqcA_t8MSg1t_';
const IMG_BASE = `${SUPA_URL}/storage/v1/object/public/assets/kin/`;
const SFXS = ['HA!','HEY','WOW','!!!','HMM','YO','haha','...','?!','zzz','YES'];

/* ── STATE ── */
const IS_TOUCH = window.matchMedia('(pointer:coarse)').matches;
let lang = navigator.language.startsWith('ko') ? 'ko' : 'en';
let items = [];
let current = -1;

/* ── HELPERS ── */
const hasActions = item => (item.actions?.[lang]?.length || 0) > 0;

/* ── CURSOR ── */
const $cur = document.getElementById('cur');
if (!IS_TOUCH) {
  document.addEventListener('mousemove', e => {
    $cur.style.left = e.clientX + 'px';
    $cur.style.top  = e.clientY + 'px';
  });
} else {
  $cur.style.display = 'none';
}

/* ── LANG TOGGLE ── */
const $ltKo = document.getElementById('lt-ko');
const $ltEn = document.getElementById('lt-en');

function setLang(l) {
  lang = l;
  $ltKo.classList.toggle('active', l === 'ko');
  $ltEn.classList.toggle('active', l === 'en');
  if (items.length) renderGallery();
  if (current >= 0) fillDetail(current); // async — tags update when ready
}
$ltKo.addEventListener('click', () => setLang('ko'));
$ltEn.addEventListener('click', () => setLang('en'));
setLang(lang);

/* ── FETCH ── */
async function fetchItems() {
  const res = await fetch(
    `${SUPA_URL}/rest/v1/gallery_items?character=eq.kin&is_active=eq.true&order=order_num.asc`,
    { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
  );
  if (!res.ok) throw new Error('fetch failed');
  return res.json();
}

async function fetchTags(itemId) {
  const res = await fetch(
    `${SUPA_URL}/rest/v1/gallery_item_tags?item_id=eq.${itemId}&select=tags(name_ko,name_en)`,
    { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
  );
  if (!res.ok) return [];
  const data = await res.json();
  return data.map(d => d.tags).filter(Boolean);
}

/* ── GALLERY ── */
const $gallery = document.getElementById('gallery');
const thumbEls = [];

function renderGallery() {
  $gallery.innerHTML = '';
  thumbEls.length = 0;
  items.forEach((item, i) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    const title = item[`title_${lang}`] || item.title_ko || '';
    const hasAct = (item.actions?.[lang]?.length || 0) > 0;
    t.innerHTML = `
      <img src="${IMG_BASE}${item.filename}" alt="${title}" loading="lazy">
      <div class="thumb-label">${title}</div>
      ${hasAct ? '<div class="thumb-action"></div>' : ''}`;
    t.addEventListener('click', () => openViewer(i));
    if (!IS_TOUCH) {
      t.addEventListener('mouseenter', () => $cur.classList.add('big'));
      t.addEventListener('mouseleave', () => $cur.classList.remove('big'));
    }
    $gallery.appendChild(t);
    thumbEls.push(t);
    setTimeout(() => t.classList.add('in'), 60 + i * 45);
  });
}

/* ── VIEWER ── */
const $viewer   = document.getElementById('viewer');
const $sfx      = document.getElementById('sfx');
const $backdrop = document.getElementById('backdrop');

async function fillDetail(i) {
  const item = items[i];
  const t = lang;
  document.getElementById('detail-eyebrow').textContent   = `KIN · ${String(i+1).padStart(2,'0')} / ${items.length}`;
  document.getElementById('detail-title').textContent     = item[`title_${t}`] || '';
  document.getElementById('detail-technique').textContent = item[`technique_${t}`] || '';
  document.getElementById('detail-desc').textContent      = item[`description_${t}`] || '';
  document.getElementById('detail-kin').textContent       = item[`kin_perspective_${t}`] || '';
  document.getElementById('detail-dred').textContent      = item[`dred_perspective_${t}`] || '';
  document.getElementById('detail-counter').textContent   = `${String(i+1).padStart(2,'0')} / ${items.length}`;

  const $img = document.getElementById('detail-img-el');
  $img.src = `${IMG_BASE}${item.filename}`;
  $img.alt = item[`title_${t}`] || '';

  // 액션 버튼
  const $acts = document.getElementById('detail-actions');
  $acts.innerHTML = '';
  const actions = item.actions?.[t] || [];
  actions.forEach(a => {
    const btn = document.createElement('a');
    btn.className = 'action-btn';
    btn.textContent = a.label;
    btn.href = a.url || '#';
    btn.target = '_blank';
    $acts.appendChild(btn);
  });

  // 태그 (비동기 — 나머지 콘텐츠 먼저 보이고 태그 나중에 채움)
  const $tags = document.getElementById('detail-tags');
  $tags.innerHTML = '';
  fetchTags(item.id).then(tags => {
    tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = tag[`name_${t}`] || tag.name_ko;
      $tags.appendChild(span);
    });
  });
}

async function openViewer(i) {
  current = i;

  // SFX + 뷰어 먼저 열고
  $sfx.textContent = SFXS[i % SFXS.length];
  $sfx.classList.remove('slam');
  void $sfx.offsetWidth;
  $sfx.classList.add('slam');

  $viewer.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => $viewer.classList.add('open')));

  // 콘텐츠 채우기 (animation과 병렬)
  await fillDetail(i);
}

function closeViewer() {
  $viewer.classList.remove('open');
  setTimeout(() => { $viewer.style.display = 'none'; current = -1; }, 500);
}

function nav(dir) {
  if (current < 0) return;
  openViewer((current + dir + items.length) % items.length);
}

document.getElementById('detail-close').addEventListener('click', closeViewer);
$backdrop.addEventListener('click', closeViewer);
document.getElementById('dn-prev').addEventListener('click', () => nav(-1));
document.getElementById('dn-next').addEventListener('click', () => nav(1));

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeViewer();
  if ($viewer.classList.contains('open')) {
    if (e.key === 'ArrowRight') nav(1);
    if (e.key === 'ArrowLeft')  nav(-1);
  }
});

// 뷰어 열려있을 때 스와이프로 이미지 전환
let tx0 = 0;
document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!$viewer.classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
});

/* ── BACK ── */
const $back = document.querySelector('.h-back');
const $backOverlay = document.createElement('div');
Object.assign($backOverlay.style, {
  position:'fixed',inset:'0',background:'#000',opacity:'0',
  pointerEvents:'none',zIndex:'9000',transition:'opacity 0.4s ease'
});
document.body.appendChild($backOverlay);
$back.addEventListener('click', () => {
  $backOverlay.style.pointerEvents = 'all';
  $backOverlay.style.opacity = '1';
  setTimeout(() => { window.location.href = '../main.html'; }, 400);
});

/* ── INIT ── */
const $loading = document.getElementById('loading');
fetchItems()
  .then(data => {
    items = data;
    renderGallery();
    $loading.style.opacity = '0';
    setTimeout(() => { $loading.style.display = 'none'; }, 400);
  })
  .catch(() => { $loading.querySelector('span').textContent = 'error'; });
</script>
</body>
</html>
