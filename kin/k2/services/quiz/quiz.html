<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/kin/k2/k2_favicon.svg">
<title>퀴즈 — KIN의 만화·애니</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/kin/k2/lib/design-tokens.css">
<link rel="stylesheet" href="/kin/k2/lib/common.css">
<link rel="stylesheet" href="/kin/k2/services/quiz/quiz.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>
<body>

<div id="grain"></div>
<div id="diff-overlay"></div>
<div id="streak-glow"></div>
<div id="quiz-bg" style="display:none"><img id="quiz-bg-img" src="" alt=""></div>

<!-- HEADER -->
<header id="header">
  <a class="h-back" href="/kin/">← KIN</a>
  <div class="h-name" id="h-title">난 어떤 덕후?</div>
  <div id="lang-toggle">
    <span class="lt active" data-lang="ko">KO</span>
    <span class="lt-sep"> / </span>
    <span class="lt" data-lang="en">EN</span>
  </div>
</header>

<div id="loading"><span>loading</span></div>
<div id="error-msg"></div>

<!-- 퀴즈 본문 -->
<main class="quiz-page" id="quiz-main">
  <div class="quiz-progress" id="quiz-progress"></div>
  <div class="quiz-top">
    <div class="quiz-top-left">
      <span class="format-badge" id="q-format-badge">설정</span>
      <div class="diff-dots" id="q-diff-dots">
        <div class="diff-dot"></div>
        <div class="diff-dot"></div>
        <div class="diff-dot"></div>
      </div>
    </div>
    <span class="quiz-counter" id="q-counter">1 / 10</span>
  </div>
  <div class="quiz-question" id="q-question"></div>
  <div class="choices" id="q-choices"></div>
  <div class="kin-reaction" id="kin-reaction">
    <img class="kin-rxn-avatar" id="kin-rxn-avatar" src="" alt="KIN">
    <div class="kin-rxn-bubble" id="kin-rxn-bubble"></div>
  </div>
  <button class="btn-next" id="btn-next">다음 →</button>
  <div class="swipe-hint" id="swipe-hint">↑ 스와이프</div>
</main>

<script type="module" src="/kin/k2/services/quiz/quiz.js"></script>
</body>
</html>
