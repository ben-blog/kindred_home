<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2 — DRED</title>
  <link rel="icon" type="image/svg+xml" href="/dred/d2/dred_favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Gowun+Batang:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    :root {
      --black: #000;
      --purple: #5B4FCF;
      --white: #EDEDED;
      --font-main: 'Syne', sans-serif;
      --font-kw: 'Courier Prime', 'Gowun Batang', serif;
      --font-mono: 'DM Mono', monospace;
      --overlay-dur: 0.7s; /* Keep in sync with OVERLAY_DURATION in JS */
    }

    html, body {
      height: 100%; background: var(--black);
      color: var(--white); font-family: var(--font-main); overflow: hidden;
    }

    /* CURSOR — hidden on mobile via media query */
    .cursor-dot {
      position: fixed; width: 5px; height: 5px;
      background: rgba(237,237,237,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.1s, height 0.1s, background 0.1s;
    }
    .cursor-dot.on-btn { width: 28px; height: 28px; background: transparent; border: 1px solid rgba(91,79,207,0.65); }
    .cursor-dot.on-random { width: 3px; height: 3px; background: rgba(91,79,207,0.5); }

    /* GRAIN */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9997; opacity: 0.5;
    }

    /* ─── LAYOUT ─── */
    .layout { display: flex; height: 100vh; width: 100vw; }

    /* ═══ LEFT: DRED SPACE ═══ */
    .dred-space {
      width: 60%; height: 100%;
      position: relative; overflow: hidden;
      border-right: 1px solid #0f0f0f; flex-shrink: 0;
    }

    /* Image layers: z-index 1 & 2 */
    .dred-img-layer {
      position: absolute; inset: 0;
      transition: opacity 0.5s ease;
    }
    .dred-img-layer img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      filter: grayscale(15%);
    }
    #dredImg1 { opacity: 1; z-index: 1; }
    #dredImg1 img { opacity: 0.72; }
    #dredImg2 { opacity: 0; z-index: 2; }
    #dredImg2 img { opacity: 0.85; }

    /* Mobile gradient: z-index 3 (above images, below overlay) — hidden on PC */
    .dred-img-gradient {
      display: none;
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0)   0%,
        rgba(0,0,0,0)   25%,
        rgba(0,0,0,0.5) 55%,
        rgba(0,0,0,0.72) 100%
      );
    }

    /* Transition overlay: z-index 4 */
    .dred-overlay {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      pointer-events: none; z-index: 4;
      transition: opacity var(--overlay-dur) ease-in;
    }
    .dred-overlay.darkening { opacity: 1; }
    .dred-overlay.revealing { opacity: 0; transition: opacity 0.6s ease-out; }

    /* Ambient: z-index 5 */
    .dred-ambient {
      position: absolute; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 1.4s ease; pointer-events: none;
    }
    .dred-ambient.active { opacity: 1; }

    .dred-big-text {
      font-family: var(--font-main);
      font-size: clamp(7rem,15vw,15rem); font-weight: 800;
      color: var(--white); letter-spacing: -0.05em; opacity: 0.04; user-select: none;
    }
    .dred-state-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 35% 65%, rgba(91,79,207,0.14) 0%, transparent 68%);
      display: flex; align-items: center; justify-content: center;
    }
    .dred-glow-dot {
      width: 2px; height: 2px; background: var(--purple); border-radius: 50%;
      box-shadow: 0 0 80px 40px rgba(91,79,207,0.22), 0 0 160px 100px rgba(91,79,207,0.07);
      animation: glow-pulse 5s ease-in-out infinite;
    }
    @keyframes glow-pulse { 0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.85;transform:scale(2);} }

    .dred-state-quote {
      position: absolute; inset: 0; padding: 3rem;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-end;
    }
    .dred-quote-label {
      font-family: var(--font-mono); font-size: 0.58rem;
      color: var(--purple); letter-spacing: 0.22em;
      text-transform: uppercase; margin-bottom: 0.9rem;
    }
    .dred-quote-text {
      font-family: var(--font-mono); font-size: clamp(0.78rem,1vw,0.95rem);
      font-weight: 300; color: #3a3a3a; line-height: 1.8; max-width: 320px;
    }

    /* Purple accent line */
    .dred-space::before {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 1px; height: 26%;
      background: linear-gradient(to top, var(--purple), transparent); z-index: 10;
    }

    /* ═══ RIGHT: INTERACT ═══ */
    .interact-space {
      width: 40%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    /* Top bar */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 2rem; z-index: 20;
    }
    .d2-label {
      font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.22em; color: var(--purple); text-transform: uppercase;
    }
    .lang-toggle { display: flex; border: 1px solid #181818; }
    .lang-btn {
      background: none; border: none; padding: 0.28rem 0.6rem;
      font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.1em; color: #3a3a3a; transition: all 0.15s;
    }
    .d2-back {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em;
      color: rgba(237,237,237,.50); text-transform: uppercase;
      text-decoration: none; transition: color 0.3s, text-shadow 0.3s;
      padding: 8px 4px;
    }
    .d2-back:hover { color: var(--purple); text-shadow: 0 0 12px rgba(91,79,207,.3); }
    .lang-btn.active { background: var(--purple); color: var(--white); }

    /* Screens */
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
    .screen.visible { display: flex; }

    /* SELECT */
    #screen-select { padding-top: 4rem; }
    .scatter-area { position: relative; flex: 1; overflow: hidden; }

    /* Keywords */
    .kw-btn {
      position: absolute;
      background: none; border: none;
      font-family: var(--font-kw); font-weight: 700; font-size: 0.9rem;
      letter-spacing: -0.01em; white-space: nowrap;
      line-height: 1; padding: 0.15rem 0;
      color: var(--white);
      transform-origin: center center; will-change: transform;
      transition: opacity 0.22s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .kw-btn.selected { color: var(--purple) !important; }
    .kw-btn.fading {
      opacity: 0 !important; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease !important;
    }

    /* Random */
    .random-area { position: absolute; bottom: 1.8rem; left: 2rem; }
    .random-btn {
      background: none; border: none;
      font-family: var(--font-mono); font-size: 0.6rem;
      color: #333; letter-spacing: 0.08em;
      transition: color 0.2s; padding: 0.4rem 0;
      -webkit-tap-highlight-color: transparent;
    }
    .random-btn:hover { color: #404040; }

    /* Panel flash on 2nd select */
    .panel-flash {
      position: absolute; inset: 0;
      background: rgba(91,79,207,0.06);
      pointer-events: none; z-index: 30;
      animation: panel-flash-out 0.6s ease forwards;
    }
    @keyframes panel-flash-out { 0%{opacity:1;}100%{opacity:0;} }

    /* LOADING */
    #screen-loading { align-items: center; justify-content: center; }
    .loading-text {
      font-family: var(--font-main);
      font-size: clamp(1.8rem,4vw,3.2rem);
      font-weight: 800; letter-spacing: -0.04em; color: var(--white);
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:1;}50%{opacity:0.1;} }

    /* RESULT */
    #screen-result { padding: 4.5rem 2rem 1.8rem; justify-content: space-between; overflow-y: auto; }
    .result-top { flex: 1; }
    .result-meta {
      font-family: var(--font-mono); font-size: 0.56rem;
      letter-spacing: 0.22em; color: var(--purple);
      text-transform: uppercase; margin-bottom: 2rem;
    }
    .result-artist {
      font-family: var(--font-mono); font-size: 0.68rem;
      font-weight: 300; color: #3a3a3a; letter-spacing: 0.05em; margin-bottom: 0.25rem;
    }
    .result-title {
      font-family: var(--font-main);
      font-size: clamp(1.8rem,4.2vw,3.8rem);
      font-weight: 800; letter-spacing: -0.04em;
      line-height: 1.05; color: var(--white); margin-bottom: 1.6rem;
    }
    .result-dred-line {
      font-family: var(--font-mono); font-size: clamp(0.9rem,1.3vw,1.05rem);
      font-weight: 300; font-style: italic;
      color: #909090; line-height: 1.75;
      border-left: 1px solid var(--purple);
      padding-left: 1rem; margin-bottom: 1.8rem; max-width: 310px;
    }
    .spotify-wrap { margin-bottom: 1.5rem; }
    .spotify-wrap iframe { border-radius: 2px; width: 100%; }
    .result-actions {
      display: flex; gap: 2rem;
      justify-content: flex-end; align-items: center; flex-shrink: 0;
    }
    .action-btn {
      background: none; border: none;
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #3a3a3a; transition: color 0.15s; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:hover { color: var(--white); }
    .action-btn.primary { color: var(--purple); }
    .action-btn.primary:hover { color: var(--white); }

    /* SHARE */
    .share-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
      z-index: 200; flex-direction: column; gap: 1rem;
    }
    .share-overlay.visible { display: flex; }

    /* 카드: 3:4 비율, state2 이미지 배경 */
    .share-card {
      width: 300px; height: 400px;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .sc-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }
    /* 그라데이션 오버레이 — 상단/하단 텍스트 가독성 확보 */
    .sc-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.72) 0%,
        rgba(0,0,0,0.18) 35%,
        rgba(0,0,0,0.18) 55%,
        rgba(0,0,0,0.85) 100%
      );
    }
    .sc-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 1.4rem;
    }
    /* 상단 영역 */
    .sc-top {
      font-family: var(--font-mono); font-size: 0.52rem;
      letter-spacing: 0.22em; color: var(--purple);
      text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .sc-keywords { display: flex; flex-direction: column; gap: 0.18rem; }
    .sc-kw {
      font-family: var(--font-kw); font-size: 0.78rem; font-weight: 700;
      color: rgba(237,237,237,0.75); letter-spacing: 0.01em;
    }
    /* 하단 영역 */
    .sc-bottom { display: flex; flex-direction: column; gap: 0; }
    .sc-artist {
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 300;
      color: rgba(237,237,237,0.55); margin-bottom: 0.22rem; letter-spacing: 0.05em;
    }
    .sc-title {
      font-family: var(--font-main); font-size: 1.45rem; font-weight: 800;
      letter-spacing: -0.04em; line-height: 1.1;
      color: #fff; margin-bottom: 0.65rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
    .sc-line {
      font-family: var(--font-mono); font-size: 0.62rem; font-style: italic;
      color: rgba(237,237,237,0.7); line-height: 1.65;
      border-left: 1px solid var(--purple); padding-left: 0.7rem;
      margin-bottom: 1rem;
    }
    .sc-footer {
      font-family: var(--font-mono); font-size: 0.45rem;
      letter-spacing: 0.15em; color: rgba(237,237,237,0.28);
      text-transform: uppercase;
    }

    /* 공유/저장 버튼 */
    .share-close {
      position: absolute; top: -1.8rem; right: 0;
      background: none; border: none; color: #2a2a2a;
      font-size: 1.2rem; padding: 0.5rem; transition: color 0.15s;
    }
    .share-close:hover, .share-close:active { color: var(--white); }
    .share-save-btn {
      font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      background: none; border: 1px solid rgba(91,79,207,0.5);
      color: var(--purple); padding: 0.6rem 1.8rem;
      transition: all 0.15s; width: 300px; text-align: center;
    }
    .share-save-btn:hover:not(:disabled) { background: var(--purple); color: var(--white); }
    .share-save-btn:disabled { opacity: 0.35; }

    /* ═══ MOBILE ═══ */
    @media (max-width: 767px) {
      .cursor-dot { display: none; }
      *, *::before, *::after { cursor: auto !important; }

      /* DRED as full background */
      .dred-space { position: fixed; inset: 0; width: 100%; border-right: none; z-index: 0; }
      #dredImg1 img, #dredImg2 img { opacity: 0.55; }
      .dred-img-gradient { display: block; } /* Show gradient on mobile */

      /* Interact fills screen */
      .interact-space { position: fixed; inset: 0; width: 100%; z-index: 10; background: transparent; }
      .kw-btn { font-size: 1.1rem !important; }
      .random-btn { font-size: 0.72rem; }
      .random-area { bottom: 2rem; left: 1.5rem; }

      /* Result: slide up from 50% mark */
      #screen-result {
        position: absolute !important;
        top: 50%; left: 0; right: 0; bottom: 0;
        height: auto !important;
        background: rgba(0,0,0,0.93);
        backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
        border-top: 1px solid #1a1a1a; border-radius: 12px 12px 0 0;
        padding: 1.5rem 1.5rem 2rem;
        justify-content: flex-start !important;
        transform: translateY(100%);
        transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
        overflow-y: auto; z-index: 30;
      }
      #screen-result.visible { display: flex; transform: translateY(0); }
      #screen-result .result-actions { margin-top: auto; padding-top: 1rem; }
      .result-title { font-size: 1.75rem; margin-bottom: 1rem; }
      .result-dred-line { font-size: 0.88rem; margin-bottom: 1.2rem; }

      /* Loading: transparent so overlay shows through */
      #screen-loading { position: absolute; inset: 0; z-index: 30; background: transparent; }
    }
  </style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<div class="layout">

  <!-- LEFT: DRED -->
  <div class="dred-space">
    <div class="dred-img-layer" id="dredImg1">
      <img src="https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_d2_state1.webp" alt="">
    </div>
    <div class="dred-img-layer" id="dredImg2">
      <img src="https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_d2_state2.webp"
           crossorigin="anonymous" alt="">
    </div>
    <div class="dred-img-gradient"></div>
    <div class="dred-overlay" id="dredOverlay"></div>
    <div class="dred-ambient" id="ambText">
      <div class="dred-big-text" id="bigText">.</div>
    </div>
    <div class="dred-ambient" id="ambGlow">
      <div class="dred-state-glow">
        <div class="dred-glow-dot"></div>
      </div>
    </div>
    <div class="dred-ambient" id="ambQuote">
      <div class="dred-state-quote">
        <div class="dred-quote-label">DRED</div>
        <div class="dred-quote-text" id="quoteText"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: INTERACT -->
  <div class="interact-space" id="interactSpace">
    <div class="top-bar">
      <span class="d2-label">D2</span>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">KO</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <a href="../../main.html" class="d2-back">← back</a>
    </div>

    <div class="screen visible" id="screen-select">
      <div class="scatter-area" id="scatterArea"></div>
      <div class="random-area">
        <button class="random-btn" id="randomBtn" onclick="submitRandom()"></button>
      </div>
    </div>

    <div class="screen" id="screen-loading">
      <div class="loading-text" id="loadingText">잠깐 기다려..</div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-top">
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-artist" id="resultArtist"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-dred-line" id="resultDredLine"></div>
        <div class="spotify-wrap" id="spotifyWrap"></div>
      </div>
      <div class="result-actions">
        <a href="../" class="action-btn" style="text-decoration:none;">← gallery</a>
        <button class="action-btn" onclick="resetToSelect()" id="btnAgain"></button>
        <button class="action-btn primary" onclick="openShare()" id="btnShare"></button>
      </div>
    </div>
  </div>
</div>

<div class="share-overlay" id="shareOverlay">
  <div style="position:relative">
    <div class="share-card" id="shareCard">
      <div class="sc-bg" id="scBg"></div>
      <div class="sc-overlay"></div>
      <div class="sc-content">
        <div>
          <div class="sc-top">D2 · DRED</div>
          <div class="sc-keywords" id="sc-keywords"></div>
        </div>
        <div class="sc-bottom">
          <div class="sc-artist" id="sc-artist"></div>
          <div class="sc-title" id="sc-title"></div>
          <div class="sc-line" id="sc-line"></div>
          <div class="sc-footer">kinxdred.com/dred/d2</div>
        </div>
      </div>
    </div>
    <button class="share-close" onclick="closeShare()">×</button>
  </div>
  <button class="share-save-btn" id="shareSaveBtn" onclick="saveShareImage()"></button>
</div>

<script>
/* ─── DATA ─── */
const KEYWORDS = {
  ko: ['퇴근하는 길','새벽인데','밥은 혼자','잠이 안 와','그냥 걷고 싶어','어딘가 가는 중','그냥 지쳤어','멍때리는 중','뭔가 놓친 것 같아','할 말이 있는데','결정을 못 하겠어','괜찮다고 했는데','끝난 것 같은데','이유 없이 별로','설레면 안 되는데'],
  en: ['on the way home',"it's 3am",'eating alone',"can't sleep",'just walking','going somewhere','just tired','zoning out','feels like i missed something','i have something to say',"can't decide",'said i was fine',"feels like it's over",'off for no reason',"shouldn't be excited"]
};
const COPY = {
  ko: { random:'— 그냥 줘', again:'다시', share:'공유', save:'이미지 저장', generating:'생성 중...', meta:'DRED의 선곡', loading:'잠깐 기다려..' },
  en: { random:'— just give it', again:'again', share:'share', save:'save image', generating:'generating...', meta:"DRED's pick", loading:'hold on..' }
};
const DRED_QUOTES = {
  ko: ['알고 있어.','봐.','그래서.','네가 고른 거야.','이미 답 알잖아.','상관없어.'],
  en: ['already knew.','watching.','so.','your pick.','you already know.',"doesn't matter."]
};
const BIG_TEXTS = ['.','..','D','R','E','D','..'];
const API_URL   = 'https://d2-api-production.up.railway.app/api/d2/now';
const STATE2_URL = 'https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_d2_state2.webp';
const OVERLAY_DURATION = 700; /* ms — keep in sync with --overlay-dur in CSS */

/* ─── STATE ─── */
let currentLang = localStorage.getItem('kxd_lang') || 'ko';
let selectedTags = [];
let currentTags  = []; /* 공유 카드용 — API 호출 시점의 태그 스냅샷 */
let currentResult = null;
let autoSubmitTimer = null;
let ambStateIndex = 0;
let ambTimer = null;
const isMobile = window.innerWidth < 768;

/* ─── CURSOR (PC only) ─── */
if (!isMobile) {
  const cursorDot = document.getElementById('cursorDot');
  document.addEventListener('mousemove', e => {
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    const t = e.target.closest('.kw-btn') || e.target;
    cursorDot.classList.remove('on-btn','on-random');
    if (t.classList.contains('kw-btn')) cursorDot.classList.add('on-btn');
    else if (t.classList.contains('random-btn')) cursorDot.classList.add('on-random');
  });
}

/* ─── KEYWORD ANIMATOR ─── */
class KWAnimator {
  constructor(el) {
    this.el = el; this.floatAnim = null; this.hoverAnim = null; this.phase = 'float';
    this.startFloat();
    if (!isMobile) {
      el.addEventListener('mouseenter', () => this.onHover());
      el.addEventListener('mouseleave', () => this.onLeave());
    }
  }

  startFloat() {
    const dur = 8000 + Math.random() * 5000;
    const del = -Math.random() * dur;
    const amp = isMobile ? 16 : 22;
    const dx1 = (Math.random()-.5)*amp, dy1 = (Math.random()-.5)*amp*.75;
    const dx2 = (Math.random()-.5)*amp, dy2 = (Math.random()-.5)*amp*.75;
    this.floatAnim = this.el.animate([
      {transform:`translate(0px,0px) scale(0.93)`},
      {transform:`translate(${dx1}px,${dy1}px) scale(1.07)`},
      {transform:`translate(${dx2}px,${dy2*.5}px) scale(0.96)`},
      {transform:`translate(${dx1*.3}px,${dy2}px) scale(1.09)`},
      {transform:`translate(0px,0px) scale(0.93)`},
    ], {duration:dur, delay:del, iterations:Infinity, easing:'ease-in-out'});
  }

  destroy() {
    if (this.floatAnim) { this.floatAnim.cancel(); this.floatAnim = null; }
    if (this.hoverAnim) { this.hoverAnim.cancel(); this.hoverAnim = null; }
  }

  getScale() {
    const m = new DOMMatrix(window.getComputedStyle(this.el).transform);
    return Math.sqrt(m.a*m.a + m.b*m.b) || 1;
  }

  cancelHover() {
    if (this.hoverAnim) { this.hoverAnim.cancel(); this.hoverAnim = null; }
  }

  onHover() {
    if (this.phase === 'selected') return;
    this.phase = 'approaching';
    if (this.floatAnim) this.floatAnim.pause();
    const s0 = this.getScale();
    this.cancelHover();
    this.hoverAnim = this.el.animate(
      [{transform:`scale(${s0})`},{transform:'scale(1.4)'}],
      {duration:1000, easing:'ease-out', fill:'forwards'}
    );
    this.hoverAnim.onfinish = () => {
      if (this.phase !== 'approaching') return;
      this.phase = 'oscillating';
      this.cancelHover();
      this.hoverAnim = this.el.animate(
        [{transform:'scale(1.4)'},{transform:'scale(1.2)'},{transform:'scale(1.4)'}],
        {duration:1400, easing:'ease-in-out', iterations:Infinity}
      );
    };
  }

  onLeave() {
    if (this.phase === 'selected') return;
    this.phase = 'leaving';
    const s0 = this.getScale();
    this.cancelHover();
    const under = Math.max(s0 * .82, .88);
    this.hoverAnim = this.el.animate(
      [{transform:`scale(${s0})`},{transform:`scale(${under})`},{transform:'scale(1.05)'},{transform:'scale(0.97)'},{transform:'scale(1.0)'}],
      {duration:480, easing:'ease-out', fill:'forwards'}
    );
    this.hoverAnim.onfinish = () => {
      if (this.phase !== 'leaving') return;
      this.cancelHover();
      this.el.style.transform = '';
      this.phase = 'float';
      if (this.floatAnim) this.floatAnim.play();
    };
  }

  select() {
    this.phase = 'selected';
    const s0 = this.getScale();
    this.cancelHover();
    if (this.floatAnim) this.floatAnim.pause();
    this.hoverAnim = this.el.animate(
      [{transform:`scale(${s0})`},{transform:'scale(1.28)',offset:.3},{transform:'scale(1.2)'}],
      {duration:360, easing:'ease-out', fill:'forwards'}
    );
  }

  deselect() {
    if (this.phase === 'selected') {
      this.cancelHover();
      this.el.style.transform = '';
    }
    this.phase = 'float';
    if (this.floatAnim) this.floatAnim.play();
  }

  fadeOut() {
    this.phase = 'selected';
    this.cancelHover();
    if (this.floatAnim) this.floatAnim.pause();
    this.el.classList.add('fading');
  }
}

/* ─── IMAGE TRANSITION ─── */
function startOverlay() {
  return new Promise(resolve => {
    const overlay = document.getElementById('dredOverlay');
    overlay.classList.remove('revealing');
    void overlay.offsetWidth; /* force reflow to restart transition */
    overlay.classList.add('darkening');
    setTimeout(resolve, OVERLAY_DURATION);
  });
}

function revealState2() {
  document.getElementById('dredImg1').style.opacity = '0';
  document.getElementById('dredImg2').style.opacity = '1';
  const overlay = document.getElementById('dredOverlay');
  overlay.classList.remove('darkening');
  void overlay.offsetWidth;
  overlay.classList.add('revealing');
}

function resetImages() {
  document.getElementById('dredImg1').style.opacity = '1';
  document.getElementById('dredImg2').style.opacity = '0';
  const overlay = document.getElementById('dredOverlay');
  overlay.classList.remove('darkening', 'revealing');
  /* Clear inline opacity so CSS takes over */
  overlay.style.opacity = '';
}

/* ─── LANG ─── */
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('kxd_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  renderKeywords();
  updateCopy();
}

function updateCopy() {
  const c = COPY[currentLang];
  document.getElementById('randomBtn').textContent   = c.random;
  document.getElementById('btnAgain').textContent    = c.again;
  document.getElementById('btnShare').textContent    = c.share;
  document.getElementById('shareSaveBtn').textContent = c.save;
  document.getElementById('loadingText').textContent = c.loading;
  const qt = document.getElementById('quoteText');
  if (qt.textContent) qt.textContent = pick(DRED_QUOTES[currentLang]);
}

/* ─── PLACEMENT ─── */
function placeKeywords(buttons, area) {
  const rect = area.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  /* Zone: x 5%–95%, y 30%–(95% minus random btn buffer on mobile) */
  const xPad = W * .05;
  const yTop  = H * (isMobile ? .35 : .30); /* mobile +5% buffer for float animation */
  const yMax  = H - H*.05 - (isMobile ? 70 : 0); /* 70px buffer for random btn */
  const xMax  = W - xPad;
  const GAP   = isMobile ? 20 : 14;
  const placed = [];

  buttons.forEach(btn => {
    const bw = btn.offsetWidth, bh = btn.offsetHeight;
    let best = null;
    for (let t = 0; t < 400; t++) {
      const l  = xPad + Math.random() * Math.max(1, xMax - xPad - bw);
      const tp = yTop + Math.random() * Math.max(1, yMax - yTop - bh);
      const r  = l + bw + GAP, b = tp + bh + GAP;
      if (!placed.some(p => l < p.r && r > p.l && tp < p.b && b > p.t)) {
        best = {l, t:tp, r, b}; break;
      }
    }
    /* Fallback: place without collision check */
    if (!best) {
      const l  = xPad + Math.random() * Math.max(1, xMax - xPad - bw);
      const tp = yTop + Math.random() * Math.max(1, yMax - yTop - bh);
      best = {l, t:tp, r:l+bw+GAP, b:tp+bh+GAP};
    }
    placed.push(best);
    btn.style.left = best.l + 'px';
    btn.style.top  = best.t + 'px';
  });
}

/* ─── RENDER KEYWORDS ─── */
let animators = [];

function renderKeywords() {
  clearTimeout(autoSubmitTimer);
  /* FIX: destroy all existing animators before clearing DOM */
  animators.forEach(a => a.destroy());
  animators = [];
  selectedTags = [];

  const area = document.getElementById('scatterArea');
  area.innerHTML = '';

  const buttons = KEYWORDS[currentLang].map((kw, i) => {
    const btn = mkBtn(kw, i);
    btn.style.visibility = 'hidden';
    btn.style.left = '0'; btn.style.top = '0';
    area.appendChild(btn);
    return btn;
  });

  /* Two rAF: first to flush DOM, second to measure after layout */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    placeKeywords(buttons, area);
    buttons.forEach((btn, i) => {
      btn.style.visibility = 'visible';
      animators.push(new KWAnimator(btn));
    });
  }));
}

function mkBtn(kw, i) {
  const btn = document.createElement('button');
  btn.className = 'kw-btn';
  btn.dataset.index = String(i);
  btn.textContent = kw;
  btn.onclick = () => toggle(btn, i);
  return btn;
}

/* ─── TOGGLE ─── */
function toggle(btn, index) {
  clearTimeout(autoSubmitTimer);
  const kw    = KEYWORDS[currentLang][index];
  const isSel = btn.classList.contains('selected');

  if (isSel) {
    /* Deselect: restore everything */
    btn.classList.remove('selected');
    selectedTags = selectedTags.filter(t => t !== kw);
    animators[index]?.deselect();
    document.querySelectorAll('.kw-btn').forEach(b => {
      b.classList.remove('fading');
      b.style.opacity = '';
      if (!b.classList.contains('selected')) {
        const ai = parseInt(b.dataset.index);
        if (!isNaN(ai) && animators[ai]) animators[ai].deselect();
      }
    });
    return;
  }

  if (selectedTags.length >= 2) return;

  btn.classList.add('selected');
  selectedTags.push(kw);
  animators[index]?.select();

  if (selectedTags.length === 1) {
    /* First selection: dim unselected */
    document.querySelectorAll('.kw-btn:not(.selected)').forEach(b => {
      b.style.opacity = '0.35';
    });
  } else {
    /* Second selection: flash + fade + submit */
    const flash = document.createElement('div');
    flash.className = 'panel-flash';
    document.getElementById('interactSpace').appendChild(flash);
    setTimeout(() => flash.remove(), 700);

    document.querySelectorAll('.kw-btn:not(.selected)').forEach(b => {
      const ai = parseInt(b.dataset.index);
      if (!isNaN(ai) && animators[ai]) animators[ai].fadeOut();
    });

    autoSubmitTimer = setTimeout(submitSelection, 300);
  }
}

/* ─── API ─── */
async function submitSelection() {
  const koTags = selectedTags.map(tag => {
    const ei = KEYWORDS.en.indexOf(tag);
    return ei >= 0 ? KEYWORDS.ko[ei] : tag;
  });
  await callAPI(koTags, false);
}

async function submitRandom() { await callAPI([], true); }

async function callAPI(tags, isRandom) {
  showScreen('loading');
  stopAmbient();
  /* 공유 카드에 쓸 태그 스냅샷 저장 (랜덤이면 빈 배열) */
  currentTags = isRandom ? [] : [...selectedTags];

  const overlayPromise = startOverlay();
  const apiPromise = fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tags, is_random: isRandom, lang: currentLang })
  }).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });

  try {
    const [, data] = await Promise.all([overlayPromise, apiPromise]);
    currentResult = data;
    revealState2();
    showResult(data);
  } catch (err) {
    console.error('D2 API error:', err);
    /* Reverse overlay and restore select screen */
    const overlay = document.getElementById('dredOverlay');
    overlay.classList.remove('darkening');
    void overlay.offsetWidth;
    overlay.classList.add('revealing');
    /* FIX: reset keyword state on error */
    renderKeywords();
    updateCopy();
    showScreen('select');
    startAmbient();
  }
}

/* ─── RESULT ─── */
function showResult(data) {
  const c = COPY[currentLang];
  document.getElementById('resultMeta').textContent    = c.meta;
  document.getElementById('resultArtist').textContent  = data.track.artist;
  document.getElementById('resultTitle').textContent   = data.track.title;
  document.getElementById('resultDredLine').textContent = data.dred_line;
  document.getElementById('spotifyWrap').innerHTML =
    `<iframe src="https://open.spotify.com/embed/track/${data.track.spotify_id}?utm_source=generator&theme=0"
      height="80" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"></iframe>`;
  showScreen('result');
}

function showScreen(name) {
  ['select','loading','result'].forEach(s =>
    document.getElementById(`screen-${s}`).classList.toggle('visible', s === name)
  );
}

function resetToSelect() {
  document.getElementById('spotifyWrap').innerHTML = '';
  resetImages();
  renderKeywords();
  updateCopy();
  showScreen('select');
  startAmbient();
}

/* ─── SHARE ─── */
let shareBlobPromise = null;

function openShare() {
  if (!currentResult) return;
  const c = COPY[currentLang];

  /* 배경 이미지 설정 */
  document.getElementById('scBg').style.backgroundImage = `url('${STATE2_URL}')`;

  /* 키워드 채우기 */
  const kwEl = document.getElementById('sc-keywords');
  kwEl.innerHTML = currentTags.length
    ? currentTags.map(t => `<div class="sc-kw">${t}</div>`).join('')
    : '';

  document.getElementById('sc-artist').textContent = currentResult.track.artist;
  document.getElementById('sc-title').textContent  = currentResult.track.title;
  document.getElementById('sc-line').textContent   = currentResult.dred_line;

  /* 저장 버튼 초기화 */
  const btn = document.getElementById('shareSaveBtn');
  btn.textContent = c.save;
  btn.disabled    = false;

  document.getElementById('shareOverlay').classList.add('visible');

  /* Fix 1: 오버레이 렌더 완료 후 이미지 사전 생성
     — save 클릭 시 blob이 이미 준비돼 navigator.share()를 user gesture 직후 호출 가능 */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    shareBlobPromise = generateShareBlob().catch(err => {
      console.warn('[D2] pre-generate failed:', err);
      return null;
    });
  }));
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('visible');
  shareBlobPromise = null; /* Fix 6: stale blob 방지 */
}

document.getElementById('shareOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeShare();
});

/* 이미지 생성 로직 분리 — openShare 시 사전 생성, saveShareImage 시 대기 */
async function generateShareBlob() {
  const SCALE     = 4;
  const CARD_W    = 300;
  const CARD_H    = 400;
  const OUT_W     = CARD_W * SCALE;  // 1200px
  const OUT_H     = CARD_H * SCALE;  // 1600px
  const MAX_BG_PX = 1800; /* iOS 안전 한도 */

  await document.fonts.ready;

  /* 배경 이미지 로드 + 다운샘플 */
  const bgCanvas = await loadAndResizeBg(STATE2_URL, MAX_BG_PX);

  /* 최종 캔버스 생성 */
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width  = OUT_W;
  finalCanvas.height = OUT_H;
  const ctx = finalCanvas.getContext('2d');

  /* 배경: cover + center-top */
  drawCoverTop(ctx, bgCanvas, OUT_W, OUT_H);

  /* 그라데이션 오버레이 (CSS sc-overlay와 동일) */
  const grad = ctx.createLinearGradient(0, 0, 0, OUT_H);
  grad.addColorStop(0,    'rgba(0,0,0,0.72)');
  grad.addColorStop(0.35, 'rgba(0,0,0,0.18)');
  grad.addColorStop(0.55, 'rgba(0,0,0,0.18)');
  grad.addColorStop(1.0,  'rgba(0,0,0,0.85)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, OUT_W, OUT_H);

  /* Fix 5: onclone으로 DOM 무수정 — 실제 카드 화면 깜빡임 없음 */
  const textCanvas = await html2canvas(document.getElementById('shareCard'), {
    useCORS:         true,
    scale:           SCALE,
    backgroundColor: null,
    logging:         false,
    onclone: (cloneDoc) => {
      const $bg      = cloneDoc.getElementById('scBg');
      const $overlay = cloneDoc.querySelector('#shareCard .sc-overlay');
      const $card    = cloneDoc.getElementById('shareCard');
      if ($bg)      $bg.style.display      = 'none';
      if ($overlay) $overlay.style.display = 'none';
      if ($card)    $card.style.background = 'transparent';
    },
  });

  /* 텍스트 레이어 합성 */
  ctx.drawImage(textCanvas, 0, 0, OUT_W, OUT_H);

  /* Fix 4: timeout으로 toBlob hang 방지 */
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error('toBlob timeout')), 10000);
    finalCanvas.toBlob(b => {
      clearTimeout(t);
      b ? resolve(b) : reject(new Error('toBlob returned null'));
    }, 'image/png');
  });
}

async function saveShareImage() {
  const c   = COPY[currentLang];
  const btn = document.getElementById('shareSaveBtn');
  btn.textContent = c.generating;
  btn.disabled    = true;

  try {
    /* Fix 1: 사전 생성된 blob 대기 — 이미 완료됐으면 즉시 반환
       shareBlobPromise가 null이면(예: 사전 생성 실패) 지금 생성 */
    const blob = await (shareBlobPromise || generateShareBlob());
    if (!blob) throw new Error('image generation failed');

    const IS_MOBILE = window.matchMedia('(max-width:767px)').matches;

    if (IS_MOBILE && navigator.share) {
      const file = new File([blob], 'dred-d2.png', { type: 'image/png' });
      try {
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          /* Fix 1: blob 준비 완료 상태에서 호출 → user gesture 컨텍스트 유지 */
          await navigator.share({ files: [file], title: 'D2 · DRED' });
        } else {
          triggerDownload(blob);
        }
      } catch (err) {
        if (err.name !== 'AbortError') triggerDownload(blob);
      }
    } else {
      triggerDownload(blob);
    }

    btn.textContent = c.save;
    btn.disabled    = false;

  } catch (err) {
    console.error('[D2] share image error:', err);
    btn.textContent = c.save;
    btn.disabled    = false;
  }
}

/* Fix 3: blob URL 사용 — data URL보다 메모리 효율적, iOS 호환성 향상 */
function triggerDownload(blob) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.download = 'dred-d2.png';
  a.href     = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* Fix 4: 이미지 로드 + 다운샘플 — 15초 timeout으로 hang 방지 */
function loadAndResizeBg(url, maxPx) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const t = setTimeout(() => {
      img.src = '';
      reject(new Error('[D2] bg image load timeout'));
    }, 15000);
    img.onload = () => {
      clearTimeout(t);
      const { naturalWidth: w, naturalHeight: h } = img;
      const ratio     = Math.min(1, maxPx / Math.max(w, h));
      const rw        = Math.round(w * ratio);
      const rh        = Math.round(h * ratio);
      const offscreen = document.createElement('canvas');
      offscreen.width  = rw;
      offscreen.height = rh;
      offscreen.getContext('2d').drawImage(img, 0, 0, rw, rh);
      resolve(offscreen);
    };
    img.onerror = () => {
      clearTimeout(t);
      reject(new Error('[D2] bg image load failed'));
    };
    img.src = url;
  });
}

/* canvas에 src를 cover 비율 + center-top으로 그림 */
function drawCoverTop(ctx, src, cw, ch) {
  const sw    = src.width;
  const sh    = src.height;
  const scale = Math.max(cw / sw, ch / sh);
  const dw    = sw * scale;
  const dh    = sh * scale;
  const dx    = (cw - dw) / 2;  /* 가로 중앙 */
  const dy    = 0;               /* 세로 상단 고정 */
  ctx.drawImage(src, dx, dy, dw, dh);
}

/* ─── AMBIENT CYCLING ─── */
const AMB_IDS = ['ambText', 'ambGlow', 'ambQuote'];
const AMB_DELAYS = [8000, 6000, 10000]; /* ms per state */

function startAmbient() {
  clearTimeout(ambTimer);
  ambTimer = setTimeout(cycleAmbient, 10000);
}

function stopAmbient() {
  clearTimeout(ambTimer);
  ambTimer = null;
  AMB_IDS.forEach(id => document.getElementById(id).classList.remove('active'));
}

function cycleAmbient() {
  AMB_IDS.forEach(id => document.getElementById(id).classList.remove('active'));
  ambStateIndex = (ambStateIndex + 1) % AMB_IDS.length;
  if (ambStateIndex === 0) document.getElementById('bigText').textContent = pick(BIG_TEXTS);
  if (ambStateIndex === 2) document.getElementById('quoteText').textContent = pick(DRED_QUOTES[currentLang]);
  document.getElementById(AMB_IDS[ambStateIndex]).classList.add('active');
  ambTimer = setTimeout(cycleAmbient, AMB_DELAYS[ambStateIndex]);
}

/* ─── UTIL ─── */
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ─── INIT ─── */
renderKeywords();
updateCopy();
/* 초기 언어 버튼 상태 설정 */
document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
startAmbient();
