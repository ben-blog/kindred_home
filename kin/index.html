<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIN — Panel Crack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080806;overflow:hidden;font-family:'DM Mono',monospace;cursor:none}
@media(pointer:coarse){html,body{cursor:auto}}
:root{--kin:#FFE500;--bg:#080806}

#cur{position:fixed;z-index:9999;width:8px;height:8px;border-radius:50%;
  background:var(--kin);pointer-events:none;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .2s,height .2s}
#cur.big{width:24px;height:24px}

#grain{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:gr .3s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}50%{background-position:-40px 30px}}

/* ambient */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 55% at 20% 80%,rgba(140,100,0,.10),transparent),
    radial-gradient(ellipse 45% 45% at 80% 20%,rgba(255,200,0,.05),transparent)}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 24px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(rgba(8,8,6,.8),transparent)}
.h-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--kin)}
.h-back{font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.2);text-transform:uppercase;cursor:pointer;transition:color .2s}
.h-back:hover{color:var(--kin)}

/* ── CONTACT SHEET ── */
#gallery{
  position:fixed;inset:0;top:56px;z-index:2;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:3px;padding:3px;
}

@media(max-width:680px){
  #gallery{
    grid-template-columns:repeat(2,1fr);
    grid-template-rows:repeat(5,1fr);
  }
}

.thumb{
  position:relative;overflow:hidden;cursor:pointer;
  transition:filter .2s,transform .2s;
  opacity:0;transform:scale(.94);
}
.thumb.in{opacity:1;transform:scale(1);transition:opacity .35s ease,transform .35s cubic-bezier(.16,1,.3,1),filter .2s}
.thumb:hover{filter:brightness(1.25);transform:scale(1.02)!important}
.thumb::after{
  content:'';position:absolute;inset:0;
  box-shadow:inset 0 0 0 1px rgba(255,229,0,.12);
  pointer-events:none;z-index:3;transition:box-shadow .2s;
}
.thumb:hover::after{box-shadow:inset 0 0 0 1.5px rgba(255,229,0,.6)}

.thumb-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
}
.thumb-n{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(22px,3.5vw,54px);
  color:rgba(255,229,0,.55);letter-spacing:-.04em;pointer-events:none;
}
.thumb-cap{
  font-size:7px;letter-spacing:.18em;color:rgba(255,229,0,.28);
  text-transform:lowercase;pointer-events:none;
}

/* ══════════════════════════════
   VIEWER
══════════════════════════════ */
#viewer{
  position:fixed;inset:0;z-index:200;
  display:none;
}

/* ── 4 crack pieces — each covers a quadrant ── */
#crack-wrap{position:absolute;inset:0;z-index:1;pointer-events:none}
.cp{
  position:absolute;
  background:var(--bg);
  transition:transform .5s cubic-bezier(.87,0,.13,1);
  /* yellow border on inner edges = crack lines */
}
/* top-left */
.cp.tl{top:0;left:0;width:50%;height:50%;
  border-right:2px solid rgba(255,229,0,.25);
  border-bottom:2px solid rgba(255,229,0,.25);}
/* top-right */
.cp.tr{top:0;right:0;width:50%;height:50%;
  border-left:2px solid rgba(255,229,0,.25);
  border-bottom:2px solid rgba(255,229,0,.25);}
/* bottom-left */
.cp.bl{bottom:0;left:0;width:50%;height:50%;
  border-right:2px solid rgba(255,229,0,.25);
  border-top:2px solid rgba(255,229,0,.25);}
/* bottom-right */
.cp.br{bottom:0;right:0;width:50%;height:50%;
  border-left:2px solid rgba(255,229,0,.25);
  border-top:2px solid rgba(255,229,0,.25);}

/* open state — fly out dramatically */
#viewer.open .cp.tl{transform:translate(-30%,-30%)}
#viewer.open .cp.tr{transform:translate( 30%,-30%)}
#viewer.open .cp.bl{transform:translate(-30%, 30%)}
#viewer.open .cp.br{transform:translate( 30%, 30%)}

@media(max-width:680px){
  #viewer.open .cp.tl{transform:translate(-18%,-18%)}
  #viewer.open .cp.tr{transform:translate( 18%,-18%)}
  #viewer.open .cp.bl{transform:translate(-18%, 18%)}
  #viewer.open .cp.br{transform:translate( 18%, 18%)}
}

/* ── dark backdrop shown after crack ── */
#backdrop{
  position:absolute;inset:0;z-index:0;
  background:rgba(4,4,3,.85);
  opacity:0;pointer-events:none;
  transition:opacity .35s ease .15s;
}
#viewer.open #backdrop{opacity:1;pointer-events:all}

/* ── SFX burst ── */
#sfx{
  position:absolute;z-index:3;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(2.5) rotate(-15deg);
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(48px,12vw,140px);
  color:var(--kin);letter-spacing:-.03em;
  text-shadow:0 0 50px rgba(255,229,0,.35), 3px 3px 0 rgba(0,0,0,.95);
  pointer-events:none;
  opacity:0;
  transition:none;
}
/* SFX slams in then fades */
#sfx.slam{
  animation:sfxPop .55s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes sfxPop{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(2.5) rotate(-15deg)}
  25% {opacity:1;transform:translate(-50%,-50%) scale(0.95) rotate(-15deg)}
  60% {opacity:1;transform:translate(-50%,-50%) scale(1.0) rotate(-15deg)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) rotate(-15deg)}
}

/* ── DETAIL CARD ── */
#detail{
  position:absolute;z-index:4;
  top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;gap:clamp(20px,4vw,56px);align-items:center;
  width:90%;max-width:820px;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease .3s;
}
#viewer.open #detail{opacity:1;pointer-events:all}

#detail-img{
  flex:0 0 auto;
  width:clamp(180px,30vw,360px);
  height:clamp(230px,40vw,460px);
  overflow:hidden;
  border:1px solid rgba(255,229,0,.18);
}
#detail-img-inner{width:100%;height:100%}

#detail-text{flex:1 1 auto}
#detail-eyebrow{
  font-size:8px;letter-spacing:.32em;color:rgba(255,229,0,.3);
  text-transform:uppercase;margin-bottom:14px;
}
#detail-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(28px,5vw,60px);
  color:var(--kin);letter-spacing:-.02em;line-height:1;margin-bottom:16px;
}
#detail-desc{
  font-size:12px;line-height:1.85;color:rgba(255,255,255,.38);
  max-width:320px;margin-bottom:24px;
}
#detail-close{
  display:inline-block;font-size:8px;letter-spacing:.28em;
  color:rgba(255,255,255,.22);text-transform:uppercase;cursor:pointer;transition:color .2s;
}
#detail-close:hover{color:var(--kin)}

/* nav arrows */
#detail-nav{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:24px;z-index:5;
}
.dn{font-size:9px;letter-spacing:.28em;color:rgba(255,255,255,.18);
  cursor:pointer;transition:color .2s;padding:10px;user-select:none}
.dn:hover{color:var(--kin)}
#detail-counter{font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.15);
  display:flex;align-items:center}

@media(max-width:680px){
  #detail{
    flex-direction:column;
    gap:14px;
    padding:0 16px;
    top:52%;
    width:92%;
    max-width:none;
  }
  #detail-img{
    width:100%;
    height:clamp(160px,42vw,240px);
    flex:0 0 auto;
  }
  #detail-desc{display:none}
  #detail-title{font-size:clamp(22px,6vw,36px)}
  #detail-eyebrow{margin-bottom:8px}
  #detail-nav{bottom:16px}
  #sfx{font-size:clamp(36px,14vw,80px)}
}
</style>
</head>
<body>
<div id="grain"></div>
<div id="cur"></div>
<div id="header">
  <div class="h-name">KIN</div>
  <div class="h-back">← back</div>
</div>

<div id="gallery"></div>

<div id="viewer">
  <div id="backdrop"></div>
  <div id="crack-wrap">
    <div class="cp tl"></div>
    <div class="cp tr"></div>
    <div class="cp bl"></div>
    <div class="cp br"></div>
  </div>
  <div id="sfx"></div>
  <div id="detail">
    <div id="detail-img"><div id="detail-img-inner"></div></div>
    <div id="detail-text">
      <div id="detail-eyebrow"></div>
      <div id="detail-title"></div>
      <div id="detail-desc"></div>
      <div id="detail-close">close ×</div>
    </div>
  </div>
  <div id="detail-nav">
    <div class="dn" id="dn-prev">←</div>
    <div class="dn" id="detail-counter"></div>
    <div class="dn" id="dn-next">→</div>
  </div>
</div>

<script>
const IS_TOUCH=window.matchMedia('(pointer:coarse)').matches;
const $cur=document.getElementById('cur');

const ITEMS=10;
// Brighter colors
const COLORS=[
  '#3a3600','#002230','#300a0a','#0a2e0a','#28200a',
  '#0a1828','#281c00','#0a2038','#2e0808','#0a2418',
];
const CAPTIONS=['so what.','late night.','reading the room.','default.','thinking.','cool.','happy.','serious.','shocked.','liedown.'];
const DESCS=[
  'KIN이 아무것도 아닌 것처럼 보이는 순간. 근데 다 보고 있어.',
  '새벽 두 시. 아무 계획 없이 깨어있는 사람들이 KIN이랑 제일 잘 맞아.',
  '들어가기 전에 이미 다 파악했어. 그게 KIN의 방식이야.',
  '아무 감정 없는 것처럼 보이지만 — 이게 KIN의 베이스라인이야.',
  '안경 위에 손을 올리는 버릇. 뭔가 계산 중이라는 신호야.',
  '팔짱 끼고 기대있어. 눈빛에 장난기 섞임.',
  '웃을 때 얼굴 전체가 같이 움직여. 눈이 먼저 웃고 입이 따라와.',
  '팔짱 + 눈살. 폭발 안 해. 근데 이때 하는 말은 기억해둬야 해.',
  '눈 크게 뜨고 손이 얼굴로 간다. 전신으로 반응함.',
  '바닥에 누워 두 팔 벌린 거. KIN의 완전한 평온 상태야.',
];
const SFXS=['HA!','HEY','WOW','...','HMM','YO','haha','!!!','?!','zzz'];

const $gallery=document.getElementById('gallery');
const $viewer=document.getElementById('viewer');
const $sfx=document.getElementById('sfx');
const thumbs=[];
let current=-1;

// Build thumbnails
for(let i=0;i<ITEMS;i++){
  const t=document.createElement('div');
  t.className='thumb';
  t.innerHTML=`
    <div class="thumb-ph" style="background:${COLORS[i]}">
      <div class="thumb-n">${String(i+1).padStart(2,'0')}</div>
      <div class="thumb-cap">${CAPTIONS[i]}</div>
    </div>`;
  t.addEventListener('click',()=>open(i));
  $gallery.appendChild(t);
  thumbs.push(t);
  setTimeout(()=>t.classList.add('in'),60+i*45);

  if(!IS_TOUCH){
    t.addEventListener('mouseenter',()=>$cur.classList.add('big'));
    t.addEventListener('mouseleave',()=>$cur.classList.remove('big'));
  }
}

function open(i){
  current=i;

  // Fill detail
  document.getElementById('detail-img-inner').innerHTML=`
    <div style="width:100%;height:100%;background:${COLORS[i]};display:flex;align-items:center;justify-content:center">
      <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(60px,14vw,160px);color:rgba(255,229,0,.08);letter-spacing:-.05em">${String(i+1).padStart(2,'0')}</span>
    </div>`;
  document.getElementById('detail-eyebrow').textContent=`KIN · ${String(i+1).padStart(2,'0')} / ${ITEMS}`;
  document.getElementById('detail-title').textContent=CAPTIONS[i];
  document.getElementById('detail-desc').textContent=DESCS[i];
  document.getElementById('detail-counter').textContent=`${String(i+1).padStart(2,'0')} / ${ITEMS}`;

  // SFX slam
  $sfx.textContent=SFXS[i];
  $sfx.classList.remove('slam');
  void $sfx.offsetWidth; // reflow
  $sfx.classList.add('slam');

  // Show viewer — crack pieces fly out
  $viewer.style.display='block';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ $viewer.classList.add('open'); });
  });
}

function close(){
  $viewer.classList.remove('open');
  setTimeout(()=>{ $viewer.style.display='none'; current=-1; }, 500);
}

function nav(dir){
  if(current<0)return;
  open((current+dir+ITEMS)%ITEMS);
}

document.getElementById('detail-close').addEventListener('click',close);
document.getElementById('backdrop').addEventListener('click',close);
document.getElementById('dn-prev').addEventListener('click',()=>nav(-1));
document.getElementById('dn-next').addEventListener('click',()=>nav(1));

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')close();
  if($viewer.classList.contains('open')){
    if(e.key==='ArrowRight')nav(1);
    if(e.key==='ArrowLeft') nav(-1);
  }
});

// Touch swipe
let tx0=0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!$viewer.classList.contains('open'))return;
  const dx=e.changedTouches[0].clientX-tx0;
  if(Math.abs(dx)>50) nav(dx<0?1:-1);
});

if(!IS_TOUCH){
  document.addEventListener('mousemove',e=>{
    $cur.style.left=e.clientX+'px';
    $cur.style.top=e.clientY+'px';
  });
}

/* ── BACK → main.html ── */
const $back = document.querySelector('.h-back');
const $backOverlay = document.createElement('div');
Object.assign($backOverlay.style,{
  position:'fixed',inset:'0',background:'#000',opacity:'0',
  pointerEvents:'none',zIndex:'9000',transition:'opacity 0.4s ease'
});
document.body.appendChild($backOverlay);

$back.addEventListener('click', () => {
  $backOverlay.style.pointerEvents = 'all';
  $backOverlay.style.opacity = '1';
  setTimeout(() => { window.location.href = '../main.html'; }, 400);
});
</script>
</body>
</html>
