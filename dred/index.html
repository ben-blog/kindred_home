<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRED — Gallery · Film Strip</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'DM Mono',monospace;cursor:none}
@media(pointer:coarse){html,body{cursor:auto}}

:root{
  --kin:#5B4FCF;
  --black:#000;
  --white:#f5f2ec;
  --muted:rgba(91,79,207,.18);
}

/* ── CURSOR ── */
#cur{position:fixed;z-index:999;width:8px;height:8px;border-radius:50%;
  background:var(--kin);pointer-events:none;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .2s,height .2s}
#cur.drag{width:20px;height:20px}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:gr .3s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}33%{background-position:-40px 30px}66%{background-position:30px -40px}}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 32px;
}
.h-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;
  color:var(--kin);letter-spacing:-.01em}
.h-back{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.25);
  text-transform:uppercase;cursor:pointer;transition:color .2s}
.h-back:hover{color:var(--kin)}
.h-count{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.2)}

/* ── STRIP CONTAINER ── */
#strip-wrap{
  position:fixed;inset:0;display:flex;align-items:center;
  user-select:none;-webkit-user-select:none;
}
#strip{
  display:flex;align-items:center;gap:20px;
  padding:0 calc(50vw - 200px);
  will-change:transform;
}

/* ── FRAME ── */
.frame{
  flex:0 0 auto;
  width:320px;height:420px;
  position:relative;overflow:hidden;
  cursor:grab;
  transition:filter .12s linear, opacity .12s linear;
}
.frame:active{cursor:grabbing}
.frame img{
  width:100%;height:100%;object-fit:cover;
  display:block;pointer-events:none;
  transition:transform .6s cubic-bezier(.16,1,.3,1);
}
.frame:hover img{transform:scale(1.04)}

/* placeholder */
.frame-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.frame-num{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:80px;color:rgba(91,79,207,.08);letter-spacing:-.04em;
  position:absolute;bottom:12px;right:16px;line-height:1;
}
.frame-label{
  font-size:8px;letter-spacing:.3em;color:rgba(91,79,207,.3);
  text-transform:uppercase;position:absolute;top:18px;left:18px;
}

/* velocity blur applied via JS */
.frame.blurred{
  opacity:.55;
}

/* ── ACTIVE FRAME OVERLAY ── */
.frame-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.7) 100%);
  opacity:0;transition:opacity .4s ease;
  display:flex;align-items:flex-end;padding:20px;
}
.frame:hover .frame-overlay{opacity:1}
.frame-caption{
  font-size:9px;letter-spacing:.22em;color:rgba(91,79,207,.7);
  text-transform:uppercase;line-height:1.8;
}

/* ── SPEED HINT ── */
#hint{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.4em;color:rgba(255,255,255,.18);
  text-transform:uppercase;pointer-events:none;
  transition:opacity .5s;
}

/* ── FOCUS DOT ── */
#focus-dot{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;z-index:50;pointer-events:none;
}
.fdot{width:4px;height:4px;border-radius:50%;background:rgba(91,79,207,.2);transition:all .3s}
.fdot.active{background:var(--kin);transform:scale(1.4)}

/* ── BORDER LINES ── */
#lines{position:fixed;inset:0;pointer-events:none;z-index:5}
#lines::before,#lines::after{
  content:'';position:absolute;left:50%;transform:translateX(-50%);
  width:1px;background:rgba(91,79,207,.06);
}
#lines::before{top:0;height:100%}
</style>
</head>
<body>
<div id="grain"></div>
<div id="cur"></div>
<div id="lines"></div>

<div id="header">
  <div class="h-name">DRED</div>
  <div class="h-count" id="count-el">01 / 10</div>
  <div class="h-back">← back</div>
</div>

<div id="strip-wrap">
  <div id="strip"></div>
</div>

<div id="hint">drag to explore</div>
<div id="focus-dot"></div>

<script>
const IS_TOUCH = window.matchMedia('(pointer:coarse)').matches;
const ITEMS = 10;

// Placeholder colors — replace src with real images
const COLORS = [
  '#1a1a0f','#0f0f1a','#1a0f0f','#0f1a0f','#1a150f',
  '#0f1518','#181208','#080f18','#180808','#0a1808',
];
const CAPTIONS = [
  'so what.','late night.','reading the room.','default.','thinking.',
  'cool.','happy.','serious.','shocked.','liedown.',
];

/* ── BUILD STRIP ── */
const $strip = document.getElementById('strip');
const $dots  = document.getElementById('focus-dot');

for (let i=0; i<ITEMS; i++) {
  const fr = document.createElement('div');
  fr.className = 'frame';
  fr.dataset.index = i;

  // Placeholder — swap with: fr.innerHTML = `<img src="./kin_${i+1}.webp">`
  fr.innerHTML = `
    <div class="frame-ph" style="background:${COLORS[i]}">
      <div class="frame-label">DRED · ${String(i+1).padStart(2,'0')}</div>
      <div class="frame-num">${String(i+1).padStart(2,'0')}</div>
    </div>
    <div class="frame-overlay">
      <div class="frame-caption">${CAPTIONS[i]}</div>
    </div>
  `;
  $strip.appendChild(fr);

  const dot = document.createElement('div');
  dot.className = 'fdot' + (i===0?' active':'');
  $dots.appendChild(dot);
}

/* ── DRAG / SCROLL ── */
const $cur    = document.getElementById('cur');
const $hint   = document.getElementById('hint');
const $count  = document.getElementById('count-el');
const frames  = document.querySelectorAll('.frame');
const dots    = document.querySelectorAll('.fdot');

let offset = 0, targetOffset = 0;
let isDragging = false, dragStartX = 0, dragStartOffset = 0;
let velocity = 0, lastX = 0, lastT = 0;
let raf = null, currentIdx = 0;
let hintHidden = false;

const FRAME_W   = 320;
const FRAME_GAP = 20;
const STEP      = FRAME_W + FRAME_GAP;
const MIN_OFF   = 0;
const MAX_OFF   = -(ITEMS - 1) * STEP;

function clamp(v,a,b){ return Math.min(b,Math.max(a,v)); }

function snapTo(idx) {
  idx = clamp(idx, 0, ITEMS-1);
  targetOffset = -idx * STEP;
}

function getActiveIdx() {
  return clamp(Math.round(-offset / STEP), 0, ITEMS-1);
}

function applyVelocityBlur(vel) {
  const absV = Math.abs(vel);
  const blurPx = clamp(absV * 0.18, 0, 14);
  const opacity = clamp(1 - absV * 0.004, 0.3, 1);
  frames.forEach(fr => {
    fr.style.filter = blurPx > 0.5
      ? `blur(${blurPx.toFixed(1)}px)`
      : '';
    fr.style.opacity = opacity.toFixed(3);
  });
}

function updateUI(idx) {
  if (idx === currentIdx) return;
  currentIdx = idx;
  $count.textContent = `${String(idx+1).padStart(2,'0')} / ${ITEMS}`;
  dots.forEach((d,i) => d.classList.toggle('active', i===idx));
}

function loop() {
  // Spring toward target
  const diff = targetOffset - offset;
  offset += diff * 0.09;
  velocity = diff * 0.09;

  $strip.style.transform = `translateX(${offset.toFixed(2)}px)`;
  applyVelocityBlur(velocity);
  updateUI(getActiveIdx());

  raf = requestAnimationFrame(loop);
}
loop();

// Hide hint on first interaction
function hideHint() {
  if (hintHidden) return;
  hintHidden = true;
  $hint.style.opacity = '0';
}

/* ── MOUSE DRAG ── */
if (!IS_TOUCH) {
  const $wrap = document.getElementById('strip-wrap');

  $wrap.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartOffset = offset;
    lastX = e.clientX;
    lastT = performance.now();
    $cur.classList.add('drag');
    hideHint();
  });

  window.addEventListener('mousemove', e => {
    $cur.style.left = e.clientX+'px';
    $cur.style.top  = e.clientY+'px';
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    const now = performance.now();
    velocity = (e.clientX - lastX) / (now - lastT + 1) * 16;
    lastX = e.clientX; lastT = now;
    targetOffset = clamp(dragStartOffset + dx, MAX_OFF, MIN_OFF);
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    $cur.classList.remove('drag');
    // Snap: if velocity strong, go next/prev
    if (Math.abs(velocity) > 3) {
      const dir = velocity < 0 ? 1 : -1;
      snapTo(getActiveIdx() + dir);
    } else {
      snapTo(getActiveIdx());
    }
  });

  // Wheel
  $wrap.addEventListener('wheel', e => {
    e.preventDefault();
    hideHint();
    const dir = e.deltaX !== 0 ? Math.sign(e.deltaX) : Math.sign(e.deltaY);
    snapTo(getActiveIdx() + dir);
  }, {passive:false});
}

/* ── TOUCH ── */
if (IS_TOUCH) {
  const $wrap = document.getElementById('strip-wrap');
  let touchStartX = 0, touchStartOffset = 0, touchLastX = 0, touchLastT = 0, touchVel = 0;

  $wrap.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartOffset = offset;
    touchLastX = touchStartX;
    touchLastT = performance.now();
    touchVel = 0;
    hideHint();
  }, {passive:true});

  $wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    const dx = e.touches[0].clientX - touchStartX;
    const now = performance.now();
    touchVel = (e.touches[0].clientX - touchLastX) / (now - touchLastT + 1) * 16;
    touchLastX = e.touches[0].clientX;
    touchLastT = now;
    targetOffset = clamp(touchStartOffset + dx, MAX_OFF, MIN_OFF);
  }, {passive:false});

  $wrap.addEventListener('touchend', () => {
    if (Math.abs(touchVel) > 3) {
      const dir = touchVel < 0 ? 1 : -1;
      snapTo(getActiveIdx() + dir);
    } else {
      snapTo(getActiveIdx());
    }
  });
}

// Click frames directly
frames.forEach((fr, i) => {
  fr.addEventListener('click', () => snapTo(i));
});

/* ── BACK → main.html ── */
const $back = document.querySelector('.h-back');
const $backOverlay = document.createElement('div');
Object.assign($backOverlay.style,{
  position:'fixed',inset:'0',background:'#000',opacity:'0',
  pointerEvents:'none',zIndex:'9000',transition:'opacity 0.4s ease'
});
document.body.appendChild($backOverlay);

$back.addEventListener('click', () => {
  $backOverlay.style.pointerEvents = 'all';
  $backOverlay.style.opacity = '1';
  setTimeout(() => { window.location.href = '../main.html'; }, 400);
});
</script>
</body>
</html>
