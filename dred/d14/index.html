<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D14 · hour</title>
  <link rel="icon" type="image/svg+xml" href="dred_d14_favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=DM+Mono:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --dred: #5B4FCF;
      --bg: #000;
      --text-ts: #ffffff;
      --text-msg: #909090;
      --text-ui: #444444;
      --dred-img-opacity: 0.70;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

    .dred-img {
      position: fixed; inset: 0; width: 100%; height: 100%;
      opacity: 0; transition: opacity 2.5s ease-in-out; z-index: 1;
      background:
        radial-gradient(ellipse 55% 80% at 50% 110%, rgba(30,20,60,0.85) 0%, transparent 70%),
        radial-gradient(ellipse 30% 50% at 50% 85%, rgba(20,15,45,0.9) 0%, transparent 60%),
        linear-gradient(180deg, #050508 0%, #0a080f 40%, #060410 100%);
    }
    .dred-img::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px; opacity: 0.6; pointer-events: none;
    }
    .dred-img.visible { opacity: var(--dred-img-opacity); }

    .dred-gradient {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: linear-gradient(180deg, transparent 0%, transparent 30%, rgba(0,0,0,0.75) 70%, rgba(0,0,0,0.92) 100%);
      opacity: 0; transition: opacity 1s ease;
    }
    .dred-gradient.visible { opacity: 1; }

    .black-overlay {
      position: fixed; inset: 0; background: #000;
      z-index: 20; opacity: 1; transition: opacity 0.8s ease-out; pointer-events: none;
    }
    .black-overlay.gone { opacity: 0; }

    .content {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }

    .meta-top {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 1.5rem 2rem; z-index: 15;
      opacity: 0; transition: opacity 0.6s ease; pointer-events: none;
    }
    .meta-top.visible { opacity: 1; pointer-events: all; }
    .meta-top span, .meta-top a {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300;
      color: var(--text-ui); letter-spacing: 0.08em; text-transform: lowercase; text-decoration: none;
    }
    .meta-top a:hover { color: #666; }

    .timestamp-wrap {
      text-align: center; margin-bottom: 2.8rem;
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .timestamp-wrap.visible { opacity: 1; transform: translateY(0); }

    .timestamp {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: clamp(4.5rem, 15vw, 9rem);
      color: var(--text-ts); letter-spacing: 0.06em; line-height: 1;
      text-shadow: 0 0 80px rgba(255,255,255,0.06), 0 0 2px rgba(255,255,255,0.15);
    }

    .message-wrap {
      text-align: center; max-width: min(600px, 88vw);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .message-wrap.visible { opacity: 1; }

    .message {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; font-weight: 400;
      font-size: clamp(1.15rem, 2.6vw, 1.65rem);
      color: var(--text-msg); line-height: 1.65; letter-spacing: 0.01em;
    }

    .cursor {
      display: inline-block; width: 1.5px; height: 1em;
      background: var(--text-msg); vertical-align: text-bottom; margin-left: 1px;
      animation: blink 500ms step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .period-debug {
      position: fixed; bottom: 1.8rem; left: 2rem;
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: #1e1e1e; z-index: 15; letter-spacing: 0.06em;
    }

    .share-btn {
      position: fixed; bottom: 1.8rem; right: 2rem;
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300;
      color: var(--text-ui); letter-spacing: 0.1em;
      background: none; border: none; cursor: pointer;
      opacity: 0; transition: opacity 0.6s ease, color 0.2s;
      pointer-events: none; z-index: 15;
    }
    .share-btn.visible { opacity: 1; pointer-events: all; }
    .share-btn:hover { color: #888; }

    .share-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 50; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .share-overlay.visible { opacity: 1; pointer-events: all; }

    .share-card {
      width: 300px; height: 300px; background: #000;
      border: 1px solid #1a1a1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.4rem; padding: 2.5rem 2rem; text-align: center; position: relative;
    }
    .share-card-label {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300;
      color: #2a2a2a; letter-spacing: 0.12em;
      position: absolute; top: 1.2rem; left: 50%; transform: translateX(-50%); white-space: nowrap;
    }
    .share-card-ts {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.8rem; color: #fff; letter-spacing: 0.06em;
    }
    .share-card-msg {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1rem; color: var(--text-msg); line-height: 1.6;
    }
    .share-card-url {
      font-family: 'DM Mono', monospace; font-size: 9px; color: #222;
      letter-spacing: 0.08em;
      position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%); white-space: nowrap;
    }
    .share-card-hint {
      position: absolute; bottom: -2.2rem; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 10px; color: #2a2a2a; white-space: nowrap;
    }
    .share-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      font-family: 'DM Mono', monospace; font-size: 11px; color: #2a2a2a;
      cursor: pointer; background: none; border: none; z-index: 51;
    }
    .share-close:hover { color: #666; }

    @media (pointer: coarse) {
      .timestamp { font-size: clamp(3.5rem, 20vw, 6rem); }
      .message { font-size: clamp(1.05rem, 4.5vw, 1.3rem); }
      .timestamp-wrap { margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <div class="black-overlay" id="blackOverlay"></div>
  <div class="dred-img" id="dredImg"></div>
  <div class="dred-gradient" id="dredGradient"></div>

  <div class="meta-top" id="metaTop">
    <span>D14 · hour</span>
    <a href="/">kinxdred.com</a>
  </div>

  <div class="content">
    <div class="timestamp-wrap" id="tsWrap">
      <div class="timestamp" id="tsDisplay"></div>
    </div>
    <div class="message-wrap" id="msgWrap">
      <div class="message" id="msgDisplay"></div>
    </div>
  </div>

  <div class="period-debug" id="periodDebug"></div>
  <button class="share-btn" id="shareBtn"></button>

  <div class="share-overlay" id="shareOverlay">
    <div class="share-card">
      <span class="share-card-label">D14 · hour</span>
      <div class="share-card-ts" id="cardTs"></div>
      <div class="share-card-msg" id="cardMsg"></div>
      <span class="share-card-url">kinxdred.com/dred/d14</span>
      <span class="share-card-hint" id="cardHint"></span>
    </div>
    <button class="share-close" id="shareClose">✕</button>
  </div>

  <script>
    // 1. 언어
    const lang = navigator.language?.startsWith('ko') ? 'ko' : 'en';

    // 2. 시각 freeze
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const timeStr = `${hh}:${mm}`;
    const hourNum = now.getHours();
    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

    // 3. 시간대 (7개)
    const PERIOD_NAMES = {
      ko: ['새벽','이른아침','오전','점심','오후','저녁','밤'],
      en: ['dawn','early morning','morning','lunch','afternoon','evening','night']
    };
    function getPeriod(h) {
      if (h >= 2 && h < 5)  return 0;
      if (h >= 5 && h < 8)  return 1;
      if (h >= 8 && h < 12) return 2;
      if (h >= 12 && h < 14) return 3;
      if (h >= 14 && h < 18) return 4;
      if (h >= 18 && h < 21) return 5;
      return 6;
    }
    const period = getPeriod(hourNum);

    // 4. visitor_id + 방문 횟수
    function getVisitorId() {
      let id = localStorage.getItem('d14_visitor_id');
      if (!id) {
        id = 'v_' + crypto.randomUUID().replace(/-/g,'').slice(0,16);
        localStorage.setItem('d14_visitor_id', id);
      }
      return id;
    }
    const visitorId = getVisitorId();

    // 방문 횟수 (오늘 기준)
    const visitKey = `d14_visits_${dateStr}`;
    const visitNum = parseInt(localStorage.getItem(visitKey) || '0') + 1;
    localStorage.setItem(visitKey, String(visitNum));

    // 5. 캐시 (visitor + 날짜 + 시간대)
    const cacheKey = `d14_${visitorId}_${dateStr}_${period}`;
    const getCached = () => localStorage.getItem(cacheKey);
    const setCache = msg => localStorage.setItem(cacheKey, msg);

    // 6. fallback 메시지
    const fallback = {
      ko: [
        ["넌 불면증이 아니야. 내일을 피하고 있어.", "이 시간까지 깨어있었어. 뭐가 그렇게 무서워.", "새벽 두 시야. 아직 끝내지 못한 게 있는 거야."],
        ["어제를 잠으로 끝내기 싫었던 거야.", "하루가 시작되기 전에 이미 지쳐있지.", "일찍 일어난 게 아니야."],
        ["시작하는 척하고 있어.", "지금 뭘 미루고 있어.", "오전이야. 아직 괜찮다고 생각하지."],
        ["밥 먹는 동안 뭘 피하고 있어.", "혼자 밥 먹고 있어. 선택이야, 아니면 그냥 그렇게 된 거야.", "점심이 두렵진 않아. 점심 이후가 두려운 거야."],
        ["가장 느린 시간이야. 넌 지금 뭘 기다리고 있어.", "오늘이 어떻게 될지 이미 알고 있잖아.", "계획은 있었어. 지금은 없어."],
        ["퇴근했어. 근데 어디로 가고 있어.", "하루가 끝났는데 뭔가 남은 느낌이지.", "저녁과 밤 사이 어딘가에 있어."],
        ["오늘 하려고 했던 것 중에 안 한 게 뭐야.", "자야 하는데 아직이야.", "오늘도 다 못 했지."]
      ],
      en: [
        ["You're not an insomniac. You're avoiding tomorrow.", "Still awake at this hour. What are you afraid of.", "Almost 3am. What are you waiting for."],
        ["You didn't want yesterday to end.", "Already tired before the day starts.", "You're up early. That doesn't mean you're ready."],
        ["You're pretending to start.", "What are you putting off right now.", "It's morning. You still think it's fine."],
        ["What are you avoiding while you eat.", "Eating alone. Was that a choice or did it just happen.", "It's not lunch you're dreading. It's after."],
        ["The slowest part of the day. What are you waiting for.", "You already know how today will go.", "There was a plan. There isn't anymore."],
        ["You left work. But where are you going.", "The day ended and something feels unfinished.", "Somewhere between evening and night."],
        ["What did you plan to do today that you didn't.", "You should sleep. You won't yet.", "Another day you didn't finish."]
      ]
    };

    function getFallback() {
      const msgs = fallback[lang][period];
      const seed = parseInt(visitorId.slice(-2), 16) % msgs.length;
      return msgs[seed];
    }

    // 7. 메시지 fetch (캐시 우선 → 실제 API → fallback)
    const API_BASE = 'https://d2-api-production.up.railway.app';

    async function fetchMessage() {
      // 캐시 확인
      const cached = getCached();
      if (cached) return cached;

      try {
        const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
        const params = new URLSearchParams({
          lang,
          hour: now.getHours(),
          day: now.getDay(),
          month: now.getMonth() + 1,
          isWeekend,
          visitCount: visitNum
        });

        const res = await fetch(`${API_BASE}/api/d14/now?${params}`, {
          signal: AbortSignal.timeout(8000)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const msg = data.message;
        setCache(msg);
        return msg;

      } catch (err) {
        console.warn('[D14] API 실패, fallback 사용:', err.message);
        const msg = getFallback();
        setCache(msg);
        return msg;
      }
    }

    // 8. 타이프라이터
    function typewrite(el, text, delay, onDone) {
      let i = 0; el.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);
      const iv = setInterval(() => {
        if (i < text.length) {
          const ch = text[i++];
          if (ch === '\n') {
            el.insertBefore(document.createElement('br'), cursor);
          } else {
            el.insertBefore(document.createTextNode(ch), cursor);
          }
        } else {
          clearInterval(iv);
          setTimeout(() => { cursor.remove(); if (onDone) onDone(); }, 200);
        }
      }, delay);
    }

    // 9. DOM
    const $ = id => document.getElementById(id);
    $('tsDisplay').textContent = timeStr;
    $('cardTs').textContent = timeStr;
    $('shareBtn').textContent = lang === 'ko' ? '공유' : 'share';
    $('cardHint').textContent = lang === 'ko' ? '스크린샷으로 저장하세요' : 'screenshot to save';
    $('periodDebug').textContent = `${PERIOD_NAMES[lang][period]} · period ${period}`;

    // 10. 상태 머신
    async function run() {
      const msgPromise = fetchMessage();
      const minTs = new Promise(r => setTimeout(r, 2800));

      setTimeout(() => {
        $('blackOverlay').classList.add('gone');
        setTimeout(() => $('tsWrap').classList.add('visible'), 400);
      }, 800);

      const [message] = await Promise.all([msgPromise, minTs]);

      $('msgWrap').classList.add('visible');
      typewrite($('msgDisplay'), message, 65, () => {
        $('cardMsg').innerHTML = message.replace(/\n/g, '<br>');
        setTimeout(() => {
          $('dredImg').classList.add('visible');
          if (window.matchMedia('(pointer:coarse)').matches)
            $('dredGradient').classList.add('visible');
          setTimeout(() => {
            $('metaTop').classList.add('visible');
            $('shareBtn').classList.add('visible');
          }, 2000);
        }, 800);
      });
    }

    // 11. 공유
    $('shareBtn').addEventListener('click', () => $('shareOverlay').classList.add('visible'));
    $('shareClose').addEventListener('click', () => $('shareOverlay').classList.remove('visible'));
    $('shareOverlay').addEventListener('click', e => {
      if (e.target === $('shareOverlay')) $('shareOverlay').classList.remove('visible');
    });

    run();
  </script>
</body>
</html>
