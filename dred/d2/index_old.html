<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2 — DRED</title>
  <link rel="icon" type="image/svg+xml" href="dred_favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --purple: #5B4FCF;
      --purple-dim: rgba(91,79,207,0.12);
      --purple-mid: rgba(91,79,207,0.35);
      --white: #EDEDED;
      --grey: #666666;
      --grey-dim: #222222;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font-main);
      overflow: hidden;
    }

    /* ─── GRAIN OVERLAY ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    /* ─── PC LAYOUT ─── */
    .layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* LEFT: DRED SPACE (60%) */
    .dred-space {
      width: 60%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-right: 1px solid #111;
      flex-shrink: 0;
    }

    .dred-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .dred-state.active { opacity: 1; }

    /* State: image */
    .dred-state-img {
      background: #000;
    }

    .dred-state-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.75;
      filter: grayscale(20%);
    }

    /* State: text only */
    .dred-state-text {
      background: #000;
      flex-direction: column;
      gap: 0;
    }

    .dred-big-text {
      font-family: var(--font-main);
      font-size: clamp(4rem, 10vw, 10rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1;
      opacity: 0.08;
    }

    /* State: glow */
    .dred-state-glow {
      background: radial-gradient(ellipse at 40% 60%, rgba(91,79,207,0.18) 0%, transparent 70%), #000;
    }

    .dred-glow-dot {
      width: 2px;
      height: 2px;
      background: var(--purple);
      border-radius: 50%;
      box-shadow: 0 0 60px 30px rgba(91,79,207,0.3), 0 0 120px 80px rgba(91,79,207,0.1);
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* State: quote */
    .dred-state-quote {
      background: #000;
      padding: 3rem;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
    }

    .dred-quote-text {
      font-family: var(--font-mono);
      font-size: clamp(0.85rem, 1.2vw, 1.1rem);
      font-weight: 300;
      color: var(--grey);
      line-height: 1.7;
      letter-spacing: 0.01em;
      max-width: 360px;
    }

    .dred-quote-mark {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--purple);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    /* Purple corner accent */
    .dred-space::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1px;
      height: 30%;
      background: linear-gradient(to top, var(--purple), transparent);
      z-index: 10;
    }

    /* RIGHT: INTERACT SPACE (40%) */
    .interact-space {
      width: 40%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 2rem 2.5rem;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      flex-shrink: 0;
    }

    .d2-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--purple);
      text-transform: uppercase;
    }

    .lang-toggle {
      display: flex;
      gap: 0;
      border: 1px solid #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .lang-btn {
      background: none;
      border: none;
      padding: 0.35rem 0.7rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--grey);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--purple);
      color: var(--white);
    }

    /* ─── SELECTION SCREEN ─── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.visible { display: flex; }

    .prompt-text {
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 2.5rem;
      color: var(--white);
      flex-shrink: 0;
    }

    /* Keyword buttons — irregular scattered layout */
    .keywords-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      align-content: flex-start;
    }

    .kw-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--grey);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 300;
      padding: 0.55rem 1rem;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* Irregular sizing */
    .kw-btn:nth-child(3n+1) { font-size: 0.72rem; }
    .kw-btn:nth-child(4n+2) { font-size: 0.85rem; padding: 0.6rem 1.1rem; }
    .kw-btn:nth-child(5n) { font-size: 0.7rem; }

    .kw-btn:hover {
      border-color: var(--purple-mid);
      color: var(--white);
    }

    .kw-btn.selected {
      background: var(--purple-dim);
      border-color: var(--purple);
      color: var(--white);
    }

    .kw-btn.disabled {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }

    /* Divider */
    .kw-divider {
      width: 100%;
      height: 1px;
      background: #111;
      margin: 0.5rem 0;
    }

    /* Random btn */
    .random-btn {
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #333;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.05em;
      padding: 0.3rem 0;
      text-align: left;
    }

    .random-btn:hover { color: var(--grey); }

    /* Submit area */
    .submit-area {
      margin-top: auto;
      padding-top: 1.5rem;
      flex-shrink: 0;
    }

    .submit-btn {
      background: none;
      border: 1px solid var(--purple);
      color: var(--purple);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, background 0.2s, color 0.2s;
    }

    .submit-btn.ready {
      opacity: 1;
      pointer-events: all;
    }

    .submit-btn:hover {
      background: var(--purple);
      color: var(--white);
    }

    /* ─── LOADING SCREEN ─── */
    #screen-loading {
      align-items: center;
      justify-content: center;
    }

    .loading-text {
      font-family: var(--font-main);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--white);
      animation: blink-slow 1.8s ease-in-out infinite;
    }

    @keyframes blink-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ─── RESULT SCREEN ─── */
    #screen-result {
      justify-content: space-between;
    }

    .result-top { flex: 1; }

    .result-genre {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--purple);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .result-artist {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--grey);
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .result-title {
      font-family: var(--font-main);
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 2rem;
    }

    .result-dred-line {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 300;
      font-style: italic;
      color: var(--grey);
      line-height: 1.7;
      border-left: 1px solid var(--purple);
      padding-left: 1rem;
      margin-bottom: 2.5rem;
      max-width: 320px;
    }

    .spotify-wrap {
      margin-bottom: 2rem;
    }

    .spotify-wrap iframe {
      border-radius: 4px;
      width: 100%;
    }

    .result-actions {
      display: flex;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .action-btn {
      background: none;
      border: 1px solid #222;
      color: var(--grey);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }

    .action-btn:hover {
      border-color: var(--grey);
      color: var(--white);
    }

    .action-btn.primary {
      border-color: var(--purple);
      color: var(--purple);
    }

    .action-btn.primary:hover {
      background: var(--purple);
      color: var(--white);
    }

    /* ─── SHARE CARD OVERLAY ─── */
    .share-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .share-overlay.visible { display: flex; }

    .share-card {
      background: #000;
      border: 1px solid #222;
      width: 360px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .share-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: radial-gradient(ellipse at 100% 100%, rgba(91,79,207,0.2) 0%, transparent 70%);
    }

    .share-card-top {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--purple);
      text-transform: uppercase;
    }

    .share-card-artist {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--grey);
      margin-bottom: 0.3rem;
    }

    .share-card-title {
      font-family: var(--font-main);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .share-card-line {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-style: italic;
      color: var(--grey);
      line-height: 1.6;
    }

    .share-card-footer {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: #333;
      text-transform: uppercase;
    }

    .share-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--grey);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.5rem;
    }

    .share-hint {
      margin-top: 1rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ─── MOBILE ─── */
    @media (max-width: 767px) {
      html, body { overflow: hidden; }

      .layout {
        flex-direction: column;
        position: relative;
      }

      /* DRED as background */
      .dred-space {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border-right: none;
        z-index: 0;
      }

      .dred-state-img img { opacity: 0.12; }
      .dred-state-glow { opacity: 0.5; }
      .dred-big-text { opacity: 0.04; }
      .dred-quote-text { opacity: 0; }

      /* Interact as foreground */
      .interact-space {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background: transparent;
        padding: 1.5rem 1.5rem 2rem;
        display: flex;
        flex-direction: column;
      }

      .top-bar { margin-bottom: 2rem; }

      .prompt-text {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .keywords-wrap {
        gap: 0.45rem;
        margin-bottom: 1.5rem;
        flex: 1;
        overflow-y: auto;
        align-content: flex-start;
      }

      .kw-btn {
        font-size: 0.72rem;
        padding: 0.5rem 0.85rem;
      }

      .kw-btn:nth-child(3n+1),
      .kw-btn:nth-child(4n+2),
      .kw-btn:nth-child(5n) {
        font-size: 0.72rem;
        padding: 0.5rem 0.85rem;
      }

      .submit-area { padding-top: 1rem; }

      /* Mobile result — bottom sheet */
      #screen-result {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65vh;
        background: rgba(0,0,0,0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid #1a1a1a;
        padding: 1.5rem;
        z-index: 20;
        overflow-y: auto;
        border-radius: 12px 12px 0 0;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #screen-result.visible {
        transform: translateY(0);
        display: flex;
        flex-direction: column;
      }

      .result-title { font-size: 1.6rem; margin-bottom: 1rem; }
      .result-dred-line { font-size: 0.78rem; margin-bottom: 1.5rem; }

      /* Loading overlay on mobile */
      #screen-loading {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      .share-card { width: 300px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ═══ LEFT: DRED SPACE ═══ -->
  <div class="dred-space" id="dredSpace">

    <!-- State 1: DRED Image (watching) -->
    <div class="dred-state dred-state-img active" id="state1">
      <!-- Replace src with actual DRED headphone image path -->
      <img src="https://aurbgjnbfatcqgovwagp.supabase.co/storage/v1/object/public/assets/dred/dred_g3_music.webp" alt="DRED"
        onerror="this.style.display='none'; this.parentElement.style.background='#040404'">
    </div>

    <!-- State 2: Big text -->
    <div class="dred-state dred-state-text" id="state2">
      <div class="dred-big-text" id="bigText">.</div>
    </div>

    <!-- State 3: Purple glow -->
    <div class="dred-state dred-state-glow" id="state3">
      <div class="dred-glow-dot"></div>
    </div>

    <!-- State 4: Quote -->
    <div class="dred-state dred-state-quote" id="state4">
      <div class="dred-quote-mark">DRED</div>
      <div class="dred-quote-text" id="quoteText"></div>
    </div>

  </div>

  <!-- ═══ RIGHT: INTERACT SPACE ═══ -->
  <div class="interact-space">

    <!-- Top bar -->
    <div class="top-bar">
      <span class="d2-label">D2</span>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">KO</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <!-- Screen: Selection -->
    <div class="screen visible" id="screen-select">
      <div class="prompt-text" id="promptText">골라.</div>
      <div class="keywords-wrap" id="keywordsWrap"></div>
      <div class="kw-divider"></div>
      <button class="random-btn" id="randomBtn" onclick="submitRandom()"></button>
      <div class="submit-area">
        <button class="submit-btn" id="submitBtn" onclick="submitSelection()"></button>
      </div>
    </div>

    <!-- Screen: Loading -->
    <div class="screen" id="screen-loading">
      <div class="loading-text">잠깐.</div>
    </div>

    <!-- Screen: Result -->
    <div class="screen" id="screen-result">
      <div class="result-top">
        <div class="result-genre" id="resultGenre"></div>
        <div class="result-artist" id="resultArtist"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-dred-line" id="resultDredLine"></div>
        <div class="spotify-wrap" id="spotifyWrap"></div>
      </div>
      <div class="result-actions">
        <button class="action-btn" onclick="resetToSelect()" id="btnAgain"></button>
        <button class="action-btn primary" onclick="openShare()" id="btnShare"></button>
      </div>
    </div>

  </div>
</div>

<!-- Share Overlay -->
<div class="share-overlay" id="shareOverlay">
  <div style="position:relative">
    <div class="share-card" id="shareCard">
      <div class="share-card-top">D2 · DRED</div>
      <div>
        <div class="share-card-artist" id="sc-artist"></div>
        <div class="share-card-title" id="sc-title"></div>
        <div class="share-card-line" id="sc-line"></div>
      </div>
      <div class="share-card-footer">kinxdred.com/dred/d2</div>
    </div>
    <button class="share-close" onclick="closeShare()">×</button>
    <div class="share-hint" id="shareHint"></div>
  </div>
</div>

<script>
  /* ─── DATA ─── */
  const KEYWORDS = {
    ko: ['퇴근하는 길','새벽인데','밥은 혼자','잠이 안 와','그냥 걷고 싶어','어딘가 가는 중','그냥 지쳤어','멍때리는 중','뭔가 놓친 것 같아','할 말이 있는데','결정을 못 하겠어','괜찮다고 했는데','끝난 것 같은데','이유 없이 별로','설레면 안 되는데'],
    en: ['on the way home',"it's 3am",'eating alone',"can't sleep",'just walking','going somewhere','just tired','zoning out','feels like i missed something','i have something to say',"can't decide",'said i was fine',"feels like it's over",'off for no reason',"shouldn't be excited"]
  };

  const COPY = {
    ko: {
      prompt: '골라.',
      random: '— 그냥 줘',
      submit: '→',
      again: '다시',
      share: '공유',
      shareHint: '스크린샷으로 저장하세요',
    },
    en: {
      prompt: 'pick.',
      random: '— just give me one',
      submit: '→',
      again: 'again',
      share: 'share',
      shareHint: 'screenshot to save',
    }
  };

  const DRED_QUOTES = {
    ko: [
      '알고 있어.',
      '봐.',
      '그래서.',
      '네가 고른 거야.',
      '이미 답 알잖아.',
    ],
    en: [
      'already knew.',
      'watching.',
      'so.',
      "your pick.",
      'you already know.',
    ]
  };

  const BIG_TEXTS = ['.', '..', 'D', 'R', 'E', 'D'];

  const API_URL = 'https://d2-api-production.up.railway.app/api/d2/now';

  /* ─── STATE ─── */
  let currentLang = 'ko';
  let selectedTags = [];
  let currentResult = null;
  let dredStateIndex = 0;
  let dredStateTimer = null;

  /* ─── LANG ─── */
  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    renderKeywords();
    updateCopy();
  }

  function updateCopy() {
    const c = COPY[currentLang];
    document.getElementById('promptText').textContent = c.prompt;
    document.getElementById('randomBtn').textContent = c.random;
    document.getElementById('submitBtn').textContent = c.submit;
    document.getElementById('btnAgain').textContent = c.again;
    document.getElementById('btnShare').textContent = c.share;
    document.getElementById('shareHint').textContent = c.shareHint;

    // Update quote if active
    const qt = document.getElementById('quoteText');
    const quotes = DRED_QUOTES[currentLang];
    if (qt.textContent) {
      qt.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    }
  }

  /* ─── KEYWORDS ─── */
  function renderKeywords() {
    const wrap = document.getElementById('keywordsWrap');
    wrap.innerHTML = '';
    selectedTags = [];
    updateSubmitBtn();

    KEYWORDS[currentLang].forEach((kw, i) => {
      const btn = document.createElement('button');
      btn.className = 'kw-btn';
      btn.textContent = kw;
      btn.dataset.index = i;
      btn.onclick = () => toggleKeyword(btn, i);
      wrap.appendChild(btn);
    });
  }

  function toggleKeyword(btn, index) {
    const kw = KEYWORDS[currentLang][index];
    const isSelected = btn.classList.contains('selected');

    if (isSelected) {
      btn.classList.remove('selected');
      selectedTags = selectedTags.filter(t => t !== kw);
    } else {
      if (selectedTags.length >= 2) return;
      btn.classList.add('selected');
      selectedTags.push(kw);
    }

    // Disable unselected when 2 chosen
    document.querySelectorAll('.kw-btn').forEach(b => {
      if (!b.classList.contains('selected')) {
        b.classList.toggle('disabled', selectedTags.length >= 2);
      }
    });

    updateSubmitBtn();
  }

  function updateSubmitBtn() {
    const btn = document.getElementById('submitBtn');
    btn.classList.toggle('ready', selectedTags.length > 0);
  }

  /* ─── SUBMIT ─── */
  async function submitSelection() {
    if (selectedTags.length === 0) return;

    // Map KO tags to their KO equivalents for API (always send KO tags)
    const koTags = selectedTags.map(tag => {
      const enIdx = KEYWORDS.en.indexOf(tag);
      return enIdx >= 0 ? KEYWORDS.ko[enIdx] : tag;
    });

    await callAPI(koTags, false);
  }

  async function submitRandom() {
    await callAPI([], true);
  }

  async function callAPI(tags, isRandom) {
    showScreen('loading');

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tags, is_random: isRandom, lang: currentLang })
      });

      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      currentResult = data;
      showResult(data);
    } catch (err) {
      console.error(err);
      showScreen('select');
    }
  }

  /* ─── RESULT ─── */
  function showResult(data) {
    document.getElementById('resultGenre').textContent = data.track.genre || '';
    document.getElementById('resultArtist').textContent = data.track.artist;
    document.getElementById('resultTitle').textContent = data.track.title;
    document.getElementById('resultDredLine').textContent = data.dred_line;

    // Spotify embed
    const sw = document.getElementById('spotifyWrap');
    sw.innerHTML = `<iframe src="https://open.spotify.com/embed/track/${data.track.spotify_id}?utm_source=generator&theme=0"
      height="80" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"></iframe>`;

    showScreen('result');
  }

  /* ─── SCREENS ─── */
  function showScreen(name) {
    ['select','loading','result'].forEach(s => {
      const el = document.getElementById(`screen-${s}`);
      el.classList.toggle('visible', s === name);
    });
  }

  function resetToSelect() {
    renderKeywords();
    updateCopy();
    showScreen('select');
    // Clear spotify
    document.getElementById('spotifyWrap').innerHTML = '';
  }

  /* ─── SHARE ─── */
  function openShare() {
    if (!currentResult) return;
    document.getElementById('sc-artist').textContent = currentResult.track.artist;
    document.getElementById('sc-title').textContent = currentResult.track.title;
    document.getElementById('sc-line').textContent = currentResult.dred_line;
    document.getElementById('shareOverlay').classList.add('visible');
  }

  function closeShare() {
    document.getElementById('shareOverlay').classList.remove('visible');
  }

  document.getElementById('shareOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeShare();
  });

  /* ─── DRED SPACE CYCLING ─── */
  const states = ['state1','state2','state3','state4'];

  function cycleDredState() {
    // Hide current
    document.getElementById(states[dredStateIndex]).classList.remove('active');

    // Next
    dredStateIndex = (dredStateIndex + 1) % states.length;

    // Update content before showing
    if (dredStateIndex === 1) {
      document.getElementById('bigText').textContent =
        BIG_TEXTS[Math.floor(Math.random() * BIG_TEXTS.length)];
    }
    if (dredStateIndex === 3) {
      const quotes = DRED_QUOTES[currentLang];
      document.getElementById('quoteText').textContent =
        quotes[Math.floor(Math.random() * quotes.length)];
    }

    document.getElementById(states[dredStateIndex]).classList.add('active');

    // Vary timing
    const delay = [9000, 6000, 7000, 10000][dredStateIndex];
    dredStateTimer = setTimeout(cycleDredState, delay);
  }

  /* ─── INIT ─── */
  function init() {
    renderKeywords();
    updateCopy();
    // Start DRED cycling after 9s
    dredStateTimer = setTimeout(cycleDredState, 9000);
  }

  init();
</script>
</body>
</html>
