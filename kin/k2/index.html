<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="./assets/k2_favicon.svg">
<title>난 어떤 덕후? — KIN의 만화·애니</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./lib/design-tokens.css">
<link rel="stylesheet" href="./lib/common.css">
<style>
/* ── 랜딩 레이아웃 ── */
#page-landing{min-height:100dvh;overflow:hidden;background:transparent;}
.landing-v4{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  min-height:100dvh;padding-top:60px;
}
.landing-v4-kin{padding:28px 24px 8px;display:flex;flex-direction:column;}
.landing-v4-modes{flex:1;padding:16px 24px;display:flex;flex-direction:column;gap:10px;justify-content:flex-start;}
.landing-v4-meta{padding:12px 24px max(24px,env(safe-area-inset-bottom));display:flex;gap:16px;}

/* PC */
@media(min-width:768px){
  .landing-v4{flex-direction:row;padding-top:0;}
  .landing-v4-kin{
    width:40%;min-height:100dvh;
    padding:100px 40px 40px;justify-content:center;
    border-right:1px solid rgba(255,229,0,.07);
  }
  .landing-v4-modes{
    width:60%;min-height:100dvh;
    padding:100px 48px 40px;justify-content:center;gap:12px;
    background:var(--bg);position:relative;z-index:2;
  }
  .landing-v4-meta{display:none}
}

/* KIN 말풍선 */
.kin-bubble-landing{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;}
.kin-avatar-landing{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  object-fit:cover;
  border:1.5px solid rgba(255,229,0,.3);background:rgba(255,229,0,.05);
}
.kin-bubble-text{
  background:rgba(255,229,0,.05);
  border:1px solid rgba(255,229,0,.18);
  border-left:2.5px solid rgba(255,229,0,.55);
  border-radius:0 12px 12px 12px;
  padding:12px 16px;
  font-size:var(--t-sm);color:rgba(255,255,255,.88);line-height:1.7;
}

/* 모드 카드 */
.mode-card{border-radius:12px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.mode-card-active{background:rgba(255,255,255,.05);border:1px solid rgba(255,229,0,.32);}
.mode-card-done{background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.22);}
.mode-card-locked{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);opacity:.48;}
.mode-label{font-size:var(--t-label);letter-spacing:var(--ls-mono);text-transform:uppercase;margin-bottom:4px;}
.mode-title{font-size:var(--t-base);font-weight:700;margin-bottom:2px;}
.mode-sub{font-size:var(--t-label);color:rgba(255,255,255,.32);}

/* 버튼 */
.btn-start{
  background:var(--kin);color:#000;
  font-family:'DM Mono',monospace;
  font-size:var(--t-label);letter-spacing:var(--ls-mono);font-weight:700;
  text-transform:uppercase;border:none;cursor:pointer;
  padding:10px 20px;border-radius:8px;flex-shrink:0;
  transition:opacity .15s,transform .15s;white-space:nowrap;
}
.btn-start:active{transform:scale(.97)}
@media(hover:hover){.btn-start:hover{opacity:.88}}
.btn-mode-locked{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.25);
  font-family:'DM Mono',monospace;
  font-size:var(--t-label);letter-spacing:var(--ls-mono);font-weight:700;
  text-transform:uppercase;border:none;cursor:default;
  padding:10px 16px;border-radius:8px;flex-shrink:0;white-space:nowrap;
}

/* 메타 */
.today-count{font-size:var(--t-label);color:rgba(255,229,0,.65);letter-spacing:.06em}
.landing-meta-item{font-size:var(--t-label);color:rgba(255,255,255,.22);letter-spacing:var(--ls-mono);text-transform:uppercase}

/* 커버 마퀴 */
.cover-marquee{
  position:relative;width:100%;overflow:hidden;margin-top:32px;
  mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 10%,black 90%,transparent 100%);
}
.cover-marquee-track{display:flex;gap:0;width:max-content;animation:cover-scroll 16s linear infinite;}
@keyframes cover-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.cover-img{
  width:112px;height:158px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
  opacity:.65;margin-right:10px;transition:opacity .2s;
  border:1px solid rgba(255,255,255,.08);
}
.cover-img:hover{opacity:.95}
@media(max-width:767px){
  .cover-marquee{margin-top:20px}
  .cover-img{width:78px;height:110px;border-radius:6px;margin-right:8px}
}
@media(prefers-reduced-motion:reduce){
  .cover-marquee-track{animation:none!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <a class="h-back" href="/kin/">← KIN</a>
  <div class="h-name" id="h-title">난 어떤 덕후?</div>
  <div id="lang-toggle">
    <span class="lt active" data-lang="ko">KO</span>
    <span class="lt-sep"> / </span>
    <span class="lt" data-lang="en">EN</span>
  </div>
</header>

<div id="loading"><span>loading</span></div>
<div id="error-msg"></div>

<!-- 랜딩 -->
<div id="page-landing">
  <div class="landing-v4">

    <div class="landing-v4-kin">
      <div class="kin-bubble-landing">
        <img class="kin-avatar-landing" id="landing-kin-avatar" src="./assets/kin_thinking1.webp" alt="KIN">
        <div class="kin-bubble-text" id="landing-kin-bubble">넌 어떤 덕후야.</div>
      </div>
      <div class="cover-marquee" id="cover-marquee" style="display:none">
        <div class="cover-marquee-track" id="cover-marquee-track"></div>
      </div>
    </div>

    <div class="landing-v4-modes">

      <!-- 퀴즈 -->
      <div class="mode-card mode-card-active" id="mode-quiz">
        <div>
          <div class="mode-label" id="mode-quiz-label" style="color:rgba(255,229,0,.6)">퀴즈</div>
          <div class="mode-title" id="mode-quiz-title">10문제 · KIN 판정</div>
          <div class="mode-sub" id="mode-quiz-sub">설정 · 캐릭터 · 관계 · 작가</div>
        </div>
        <button class="btn-start" id="btn-start">
          <span class="btn-start-text">시작</span>
        </button>
      </div>

      <!-- 캐릭터 월드컵 -->
      <div class="mode-card mode-card-locked">
        <div>
          <div class="mode-label" style="color:rgba(255,255,255,.28)">캐릭터 월드컵</div>
          <div class="mode-title" style="color:rgba(255,255,255,.45)">최애 캐릭터 가려내기</div>
          <div class="mode-sub">1:1 대결 · 토너먼트</div>
        </div>
        <div class="btn-mode-locked">준비 중</div>
      </div>

      <!-- 작품 월드컵 -->
      <div class="mode-card mode-card-active" id="mode-worldcup-work">
        <div>
          <div class="mode-label" id="mode-ww-label" style="color:rgba(255,229,0,.6)">작품 월드컵</div>
          <div class="mode-title" id="mode-ww-title">최애 작품 가려내기</div>
          <div class="mode-sub" id="mode-ww-sub">1:1 대결 · 16강 토너먼트</div>
        </div>
        <button class="btn-start" id="btn-worldcup-work">
          <span class="btn-start-text">시작</span>
        </button>
      </div>

    </div>

    <div class="landing-v4-meta">
      <span class="today-count" id="today-count"></span>
      <span class="landing-meta-item">총 <span id="txt-total-q">—</span>문제</span>
      <span class="landing-meta-item" id="meta-kin-label">KIN 판정</span>
    </div>

  </div>
</div>

<script type="module">
import {
  getLang, t,
  SUPA_URL, SUPA_KEY, COVER_MAL_IDS,
  supaCount, fetchAniListCover, KIN_IMGS,
} from './lib/core.js';
import { initLangToggle, hideLoading } from './lib/ui.js';

// ── lang 토글 ──
initLangToggle(applyLandingLang);

// ── 오늘 플레이 수 ──
async function loadTodayCount() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const count = await supaCount(`quiz_sessions?created_at=gte.${today}T00:00:00&select=session_key`);
    const el = document.getElementById('today-count');
    if (el && count > 0) el.textContent = t(`오늘 ${(count * 10).toLocaleString()}명이 도전했어.`, `${(count * 10).toLocaleString()} people played today.`);
  } catch {}
}

// ── 총 문제 수 ──
async function loadTotalCount() {
  try {
    const count = await supaCount(`quiz_items?is_active=eq.true&select=item_id`);
    const el = document.getElementById('txt-total-q');
    if (el && count) el.textContent = count;
  } catch {}
}

// ── 커버 마퀴 ──
async function buildCoverMarquee() {
  const track   = document.getElementById('cover-marquee-track');
  const marquee = document.getElementById('cover-marquee');
  if (!track || !marquee) return;

  let started = false;

  function addImg(url, title) {
    const img = document.createElement('img');
    img.className = 'cover-img';
    img.src = url; img.alt = title; img.loading = 'eager';
    track.appendChild(img);

    // 3개 이상 로딩되면 바로 표시
    const count = track.querySelectorAll('img').length;
    if (!started && count >= 3) {
      started = true;
      marquee.style.display = 'block';
    }
  }

  // 병렬 fetch — 완료 순서대로 추가
  await Promise.allSettled(
    COVER_MAL_IDS.map(({ id, title }) =>
      fetchAniListCover(id).then(url => { if (url) addImg(url, title); }).catch(() => {})
    )
  );

  // 무한 스크롤을 위해 전체 복제
  const imgs = Array.from(track.querySelectorAll('img'));
  imgs.forEach(img => {
    const clone = img.cloneNode(true);
    track.appendChild(clone);
  });
}

// ── 랜딩 상태 업데이트 ──
function updateLandingState() {
  const quizDone = !!localStorage.getItem('k2_quiz_done');
  const bubble   = document.getElementById('landing-kin-bubble');
  const modeQuiz = document.getElementById('mode-quiz');
  const avatar   = document.getElementById('landing-kin-avatar');
  const isEn     = getLang() === 'en';

  if (quizDone) {
    if (bubble) bubble.textContent = isEn ? "Quiz alone wasn't enough." : "퀴즈만으론 다 못 읽었어.";
    if (modeQuiz) {
      modeQuiz.className = 'mode-card mode-card-done';
      const label = modeQuiz.querySelector('.mode-label');
      const btn   = modeQuiz.querySelector('.btn-start');
      if (label) { label.textContent = isEn ? 'Quiz · Done' : '퀴즈 · 완료'; label.style.color = 'rgba(74,222,128,.7)'; }
      if (btn) {
        const btnText = btn.querySelector('.btn-start-text');
        if (btnText) btnText.textContent = isEn ? 'Again' : '다시';
        else btn.textContent = isEn ? 'Again' : '다시';
      }
    }
    if (avatar) avatar.src = KIN_IMGS.happy;
  } else {
    if (bubble) bubble.textContent = isEn ? "What kind of fan are you." : "넌 어떤 덕후야.";
    if (modeQuiz) modeQuiz.className = 'mode-card mode-card-active';
    if (avatar) avatar.src = KIN_IMGS.thinking;
  }
}

// ── lang 전환 시 랜딩 텍스트 갱신 ──
function applyLandingLang(l) {
  const isEn = l === 'en';
  const startBtn = document.getElementById('btn-start');
  const startBtnText = startBtn?.querySelector('.btn-start-text');
  if (startBtnText) startBtnText.textContent = isEn ? 'Start' : '시작';

  const quizLabel = document.getElementById('mode-quiz-label');
  const quizTitle = document.getElementById('mode-quiz-title');
  const quizSub   = document.getElementById('mode-quiz-sub');
  if (quizLabel && !quizLabel.textContent.includes('완료') && !quizLabel.textContent.includes('Done')) {
    quizLabel.textContent = isEn ? 'Quiz' : '퀴즈';
  }
  if (quizTitle) quizTitle.textContent = isEn ? '10 questions · KIN judges' : '10문제 · KIN 판정';
  if (quizSub)   quizSub.textContent   = isEn ? 'setting · character · relation · author' : '설정 · 캐릭터 · 관계 · 작가';

  updateLandingState();

  const lp = document.getElementById('page-landing');
  const lockedCards = lp.querySelectorAll('.mode-card-locked');
  if (lockedCards[0]) {
    lockedCards[0].querySelector('.mode-label').textContent = isEn ? 'Character Worldcup' : '캐릭터 월드컵';
    lockedCards[0].querySelector('.mode-title').textContent = isEn ? 'Pick your favorite character' : '최애 캐릭터 가려내기';
    lockedCards[0].querySelector('.mode-sub').textContent   = isEn ? '1:1 · tournament' : '1:1 대결 · 토너먼트';
  }
  lp.querySelectorAll('.btn-mode-locked').forEach(btn => { btn.textContent = isEn ? 'Coming soon' : '준비 중'; });

  // 작품 월드컵 카드
  const wwLabel = document.getElementById('mode-ww-label');
  const wwTitle = document.getElementById('mode-ww-title');
  const wwSub   = document.getElementById('mode-ww-sub');
  const wwBtn   = document.getElementById('btn-worldcup-work');
  if (wwLabel) wwLabel.textContent = isEn ? 'Work Worldcup' : '작품 월드컵';
  if (wwTitle) wwTitle.textContent = isEn ? 'Pick your favorite work' : '최애 작품 가려내기';
  if (wwSub)   wwSub.textContent   = isEn ? '1:1 · 16-team tournament' : '1:1 대결 · 16강 토너먼트';
  if (wwBtn)   wwBtn.querySelector('.btn-start-text').textContent = isEn ? 'Start' : '시작';

  const metaKin = document.getElementById('meta-kin-label');
  if (metaKin) metaKin.textContent = isEn ? 'KIN judges' : 'KIN 판정';
}

// ── 퀴즈 시작 버튼 ──
document.getElementById('btn-start').addEventListener('click', () => {
  window.location.href = '/kin/k2/quiz';
});

// ── 작품 월드컵 버튼 ──
document.getElementById('btn-worldcup-work').addEventListener('click', () => {
  window.location.href = '/kin/k2/worldcup/work';
});

// ── 초기화 ──
(async () => {
  updateLandingState();
  applyLandingLang(getLang());
  await Promise.all([loadTotalCount(), loadTodayCount()]);
  buildCoverMarquee();
  hideLoading();
})();
</script>
</body>
</html>
