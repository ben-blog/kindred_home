<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIN × DRED</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none;font-family:'DM Mono',monospace}
@media(pointer:coarse){html,body{cursor:auto}}
#c{position:fixed;inset:0;z-index:0;display:block}
#grain{position:fixed;inset:0;z-index:80;pointer-events:none;opacity:.019;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:256px;animation:gr .28s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}25%{background-position:-55px 38px}50%{background-position:28px -48px}75%{background-position:-38px 58px}}
#cur{position:fixed;z-index:999;width:8px;height:8px;border-radius:50%;background:#fff;
  pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:difference;
  transition:width .28s,height .28s,border-radius .28s,background .28s}
#skip-btn{position:fixed;top:22px;right:26px;z-index:200;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.60);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.35em;text-transform:uppercase;
  padding:8px 16px;cursor:pointer;opacity:0;transition:opacity 1s,background .3s,color .3s}
#skip-btn:hover{background:rgba(255,255,255,.13);color:rgba(255,255,255,.88)}
#kin-char,#dred-char{position:fixed;bottom:0;z-index:30;pointer-events:none;
  height:clamp(360px,65vh,680px);width:auto;opacity:0;filter:brightness(0);mix-blend-mode:screen}
.sl{position:fixed;top:50%;z-index:40;font-size:8px;letter-spacing:.52em;
  text-transform:uppercase;opacity:0;writing-mode:vertical-lr}
#sl-kin {left:5vw;color:rgba(255,232,0,.42);transform:translateY(-50%) rotate(180deg)}
#sl-dred{right:5vw;color:rgba(91,79,207,.42);transform:translateY(-50%)}
#title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:40;text-align:center;opacity:0;pointer-events:none}
.t-row{display:flex;align-items:center;gap:.12em;line-height:1}
.tk{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(44px,8.5vw,116px);
  color:#FFE800;letter-spacing:-.02em}
.tx{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(32px,6vw,82px);
  color:rgba(255,255,255,.86);letter-spacing:.03em;
  text-shadow:0 0 20px rgba(255,255,255,.28),0 0 60px rgba(255,255,255,.08)}
.td{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(44px,8.5vw,116px);
  color:#5B4FCF;letter-spacing:-.02em}
#bot{position:fixed;bottom:0;left:0;right:0;padding:0 6vw 26px;z-index:40;
  display:flex;align-items:flex-end;justify-content:space-between;opacity:0}
.bn{font-size:9px;letter-spacing:.28em;text-transform:uppercase;line-height:1.95}
.bn-k{color:rgba(255,232,0,.32)}.bn-d{color:rgba(91,79,207,.32);text-align:right}
.sc{display:flex;flex-direction:column;align-items:center;gap:8px}
.scb{width:1px;height:36px;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);
  animation:scba 2.2s ease-in-out infinite}
@keyframes scba{0%,100%{opacity:.3}50%{opacity:.9}}
.sct{
  font-size:8px;letter-spacing:.48em;color:rgba(255,255,255,.42);
  text-transform:uppercase;
  transition:opacity .6s ease;
}
@media(max-width:700px){
  .sl{display:none}
  .tk,.td{font-size:clamp(40px,13vw,72px)}
  .tx{font-size:clamp(28px,9vw,52px)}
  .bn{font-size:8px}
}

/* ── HOVER ZONES ── */
#kin-zone,#dred-zone{position:fixed;bottom:0;z-index:35;pointer-events:none}

/* ── KIN BUBBLE ── */
#kin-bubble{
  position:fixed;z-index:50;pointer-events:none;
  opacity:0;transition:opacity .3s ease;
}
#kin-bubble.on{opacity:1}
.bwrap{
  background:rgba(8,8,8,.88);
  border:1px solid rgba(255,229,0,.28);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:9px 14px;position:relative;
}
/* tail — default points left (bubble is to the right of KIN) */
.bwrap::before{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  left:-7px;border:6px solid transparent;
  border-right:7px solid rgba(255,229,0,.28);border-left:0;
}
.bwrap::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  left:-5px;border:5px solid transparent;
  border-right:6px solid rgba(8,8,8,.88);border-left:0;
}
/* flip: bubble is to the left of KIN */
.bwrap.flip::before{left:auto;right:-7px;border-right:0;border-left:7px solid rgba(255,229,0,.28)}
.bwrap.flip::after {left:auto;right:-5px;border-right:0;border-left:6px solid rgba(8,8,8,.88)}
/* tail vertical offset when bubble is above/below center */
.bwrap.tail-top::before,.bwrap.tail-top::after{top:20%}
.bwrap.tail-bot::before,.bwrap.tail-bot::after{top:80%}

#btxt{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.03em;
  color:rgba(255,229,0,.90);white-space:nowrap;line-height:1.5;
}
#bcur{
  display:inline-block;width:5px;height:10px;background:rgba(255,229,0,.75);
  vertical-align:middle;margin-left:2px;animation:cb .85s step-end infinite;
}
@keyframes cb{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="nav-overlay" style="position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:9000;transition:opacity 0.45s ease"></div>
<canvas id="c"></canvas>
<div id="grain"></div>
<div id="cur"></div>
<button id="skip-btn">skip →</button>
<img id="kin-char"  src="./kin_default.webp"   alt="KIN"  draggable="false">
<img id="dred-char" src="./dred_default2.webp" alt="DRED" draggable="false">
<div id="kin-zone"></div>
<div id="dred-zone"></div>
<div id="kin-bubble"><div class="bwrap" id="bwrap"><span id="btxt"></span><span id="bcur"></span></div></div>
<span class="sl" id="sl-kin">KIN</span>
<span class="sl" id="sl-dred">DRED</span>
<div id="title"><div class="t-row"><span class="tk">KIN</span><span class="tx">×</span><span class="td">DRED</span></div></div>
<div id="bot">
  <span class="bn bn-k">Watches first.<br>Speaks later.</span>
  <div class="sc"><div class="scb"></div><span class="sct">explore</span></div>
  <span class="bn bn-d">Changes the room<br>without moving.</span>
</div>
<script>
/* ── MOBILE DETECTION ── */
const IS_TOUCH = window.matchMedia('(pointer:coarse)').matches;

/* ── CURSOR (desktop only) ── */
const $cur = document.getElementById('cur');
let mx = innerWidth/2, my = innerHeight/2;
if (!IS_TOUCH) {
  let cx = mx, cy = my, moved = false;
  $cur.style.opacity = '0';
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (!moved) { cx = mx; cy = my; $cur.style.opacity = '1'; moved = true; }
  });
  (function tick() {
    cx += (mx-cx)*.12; cy += (my-cy)*.12;
    $cur.style.left = cx+'px'; $cur.style.top = cy+'px';
    requestAnimationFrame(tick);
  })();
} else {
  $cur.style.display = 'none';
}

/* ── CANVAS ── */
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, ORBIT_R, CENTER_R;
function resize() {
  W = cv.width  = innerWidth;
  H = cv.height = innerHeight;
  ORBIT_R  = IS_TOUCH ? Math.round(W * 0.10) : Math.min(105, Math.round(W * 0.21));
  CENTER_R = IS_TOUCH ? Math.round(W * 0.12) : 70;
}
resize();
window.addEventListener('resize', resize);

/* ── MATH ── */
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
const lerp  = (a,b,t) => a + (b-a)*clamp(t,0,1);
const eIn   = t => t*t*t;
const eOut  = t => 1 - Math.pow(1-t, 3);
const eIO   = t => t<.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;

/* ── PHASES ──────────────────────────────────────────
  DARK     0.0 →  0.4
  EMERGE   0.4 →  1.6
  ORBIT    1.6 →  5.1
  CAPTURE  5.1 → 11.1
  WRIGGLE 11.1 → 21.1
  WORLDS  21.1 →  ∞
──────────────────────────────────────────────────── */
const PHASES = [
  {n:'DARK',    s:0,    e:0.4 },
  {n:'EMERGE',  s:0.4,  e:1.6 },
  {n:'ORBIT',   s:1.6,  e:5.1 },
  {n:'CAPTURE', s:5.1,  e:11.1},
  {n:'WRIGGLE', s:11.1, e:21.1},
  {n:'WORLDS',  s:21.1, e:1e9 },
];
const CAPTURE_START = 5.1;

function getPhase(t) {
  for (const ph of PHASES) if (t >= ph.s && t < ph.e)
    return { n:ph.n, p:clamp((t-ph.s)/(ph.e-ph.s), 0, 1) };
  return { n:'WORLDS', p:1 };
}

/* ── GEOMETRY ── */
const charH   = () => clamp(H*(IS_TOUCH?.34:.65), IS_TOUCH?160:360, 680);
const kinCX   = () => W*.24;
const dredCX  = () => W*.76;
const PLANET_Y = () => H*.50;
const TRANSIT_DUR = 3.5;
const KIN_EXIT  = Math.PI/2;    // bottom of CW center orbit
const DRED_EXIT = Math.PI*3/2;  // top of CW center orbit

/* ── PIXEL SAMPLING ── */
let kinTargets = null, dredTargets = null;

async function sampleCharPixels(src, count, mapFn) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const SW=220, SH=308;
      const off = document.createElement('canvas');
      off.width = SW; off.height = SH;
      const oc = off.getContext('2d', { willReadFrequently:true });
      try {
        oc.drawImage(img, 0, 0, SW, SH);
        const { data } = oc.getImageData(0, 0, SW, SH);
        const cands = [];
        for (let y=0; y<SH; y++)
          for (let x=0; x<SW; x++) {
            const i=(y*SW+x)*4;
            if (data[i]+data[i+1]+data[i+2] > 90) cands.push({nx:x/SW, ny:y/SH});
          }
        for (let i=cands.length-1; i>0; i--) {
          const j=~~(Math.random()*(i+1)); [cands[i],cands[j]]=[cands[j],cands[i]];
        }
        resolve(cands.slice(0, count).map(p => mapFn(p.nx, p.ny)));
      } catch(e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function buildGeomSilhouette(cx, top, h, count, mirror) {
  const w=h*0.72, m=mirror?-1:1, out=[], inn=[];
  const OS = count*10;
  for (let i=0; i<OS && out.length<Math.floor(count*.68); i++) {
    const t=i/OS; let nx,ny;
    if      (t<0.28){const a=(t/0.28)*Math.PI*2;nx=Math.cos(a)*.44+(Math.random()-.5)*.07;ny=Math.sin(a)*.17+.09+(Math.random()-.5)*.05}
    else if (t<0.60){const a=((t-.28)/.32)*Math.PI*2;nx=Math.cos(a)*.27+(Math.random()-.5)*.06;ny=Math.sin(a)*.21+.30+(Math.random()-.5)*.05}
    else if (t<0.68){nx=lerp(-.30,.30,(t-.60)/.08)+(Math.random()-.5)*.06;ny=.50+(Math.random()-.5)*.05}
    else{const s=Math.random()<.5?1:-1,tY=(t-.68)/.32;nx=s*lerp(.30,.22,tY)+(Math.random()-.5)*.06;ny=.52+tY*.46+(Math.random()-.5)*.05}
    if (Math.abs(nx)<=.50 && ny>=0 && ny<=1.0) out.push({x:cx+m*nx*w, y:top+ny*h});
  }
  const fillN = count - out.length;
  while (inn.length < fillN) {
    const ny=Math.random(), nx=Math.random()*2-1; let ok=false;
    if      (ny<.20 && (nx/.44)**2+((ny-.09)/.18)**2<=1) ok=true;
    else if (ny<.44 && (nx/.28)**2+((ny-.30)/.22)**2<=1) ok=true;
    else if (ny<.54 && Math.abs(nx)<.09) ok=true;
    else if (ny>=.54 && Math.abs(nx)<lerp(.30,.22,(ny-.54)/.46)) ok=true;
    if (ok) inn.push({x:cx+m*nx*w, y:top+ny*h});
  }
  const all = [...out,...inn];
  for (let i=all.length-1; i>0; i--) {
    const j=~~(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]];
  }
  return all.slice(0, count);
}

async function buildAllTargets() {
  const ki = document.getElementById('kin-char');
  const dr = document.getElementById('dred-char');
  const h = charH(), top = H-h;
  const kR = ki.naturalWidth && ki.naturalHeight ? ki.naturalWidth/ki.naturalHeight : 0.78;
  const dR = dr.naturalWidth && dr.naturalHeight ? dr.naturalWidth/dr.naturalHeight : 0.78;
  const kW = h*kR, dW = h*dR;
  const kinMap  = (nx,ny) => ({ x: kinCX()-kW*.5+nx*kW,  y: top+ny*h });
  const dredMap = (nx,ny) => ({ x: dredCX()+(0.5-nx)*dW, y: top+ny*h });
  const HALF = POOL/2;
  const kS = await sampleCharPixels('./kin_default.webp',   HALF, kinMap);
  const dS = await sampleCharPixels('./dred_default2.webp', HALF, dredMap);
  kinTargets  = kS && kS.length>50 ? kS : buildGeomSilhouette(kinCX(),  top, h, HALF, false);
  dredTargets = dS && dS.length>50 ? dS : buildGeomSilhouette(dredCX(), top, h, HALF, true);
}
(function() {
  const ki=document.getElementById('kin-char'), dr=document.getElementById('dred-char');
  let n=2; const done=()=>{ if(--n===0) buildAllTargets(); };
  ki.complete ? done() : ki.addEventListener('load', done, {once:true});
  dr.complete ? done() : dr.addEventListener('load', done, {once:true});
})();

/* ── PARTICLES ── */
const POOL = IS_TOUCH ? 1000 : 2000;
let parts = [];

function makePart(i) {
  const side = i < POOL/2 ? 'kin' : 'dred';
  const a = Math.random()*Math.PI*2;
  const r = 85 + Math.random()*Math.min(W,H)*.30;
  return {
    x: W/2+Math.cos(a)*r, y: H/2+Math.sin(a)*r, vx:0, vy:0,
    orbitA: a, orbitR: r, orbitDir: 1,
    orbitSpd: .005 + Math.random()*.012,
    noiseA: Math.random()*Math.PI*2,
    noiseSpd: .003 + Math.random()*.004,
    side,
    active: false, activatedAt: 0,
    sz: .7 + Math.random()*1.2,
    alpha: 0, r:255, g:255, b:255,
    captureAt: 0, captured: false, capturedAtT: 0,
    arrived: false,
    bx0:0,by0:0, bx1:0,by1:0, bx2:0,by2:0, bx3:0,by3:0,
    tx: 0, ty: 0,
  };
}
function initParts() { parts = []; for(let i=0; i<POOL; i++) parts.push(makePart(i)); }

/* ── WORLD WAVES ── */
const WAVES = Array.from({length:6}, (_,i) => ({
  yR: .14+i*.13, freq: .002+i*.0007,
  phase: i*1.2+Math.random()*2, spd: .00018+i*.00005, al: .018+i*.01,
}));

/* ── STATE ── */
let elapsed=0, lastTs=null, frameN=0;
let captureInited=false, titleFired=false, worldsFired=false;
let worldFade=0, balance=0, kinPres=0.5, dredPres=0.5;
let skipMode=false, skipVig=0;
let nmx=.5, nmy=.5, smx=.5, smy=.5;
let dredHovered = false;
document.addEventListener('mousemove', e => {
  nmx=e.clientX/W; nmy=e.clientY/H;
  // dred hover check handled by zone events
});

/* ── SKIP ── */
const $skip = document.getElementById('skip-btn');
setTimeout(() => $skip.style.opacity='1', 3000);
$skip.addEventListener('click', () => {
  if (skipMode) return;
  skipMode = true;
  $skip.style.opacity = '0'; $skip.style.pointerEvents = 'none';
});

/* ── CAPTURE INIT ── */
function doCaptureInit() {
  if (captureInited) return; captureInited = true;
  balance = W/2;
  if (!kinTargets) {
    const h=charH(), top=H-h;
    kinTargets  = buildGeomSilhouette(kinCX(),  top, h, POOL/2, false);
    dredTargets = buildGeomSilhouette(dredCX(), top, h, POOL/2, true);
  }
  const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} };
  const kPts=[...kinTargets]; shuffle(kPts);
  const dPts=[...dredTargets]; shuffle(dPts);
  let ki=0, di=0;
  parts.forEach(p => {
    if (!p.active) return;
    p.captureAt = Math.pow(Math.random(), .55) * .60;
    p.captured  = false;
    p.arrived   = false;
    if (p.side==='kin')  { p.tx=kPts[ki%kPts.length].x+(Math.random()-.5)*3; p.ty=kPts[ki%kPts.length].y+(Math.random()-.5)*3; ki++; }
    else                 { p.tx=dPts[di%dPts.length].x+(Math.random()-.5)*3; p.ty=dPts[di%dPts.length].y+(Math.random()-.5)*3; di++; }
  });
}

/* ── TITLE + UI REVEAL ── */
function doTitleReveal() {
  if (titleFired) return; titleFired = true;
  const show = (id, delay, dur=1.5) => setTimeout(() => {
    const el = document.getElementById(id);
    el.style.transition = `opacity ${dur}s ease`;
    el.style.opacity = '1';
  }, delay);
  show('title',   200, 1.5);
  show('sl-kin',  400, 1.2);
  show('sl-dred', 500, 1.2);
  show('bot',     700, 1.5);
  // Skip button fades out — experience is visually complete
  const $sk = document.getElementById('skip-btn');
  setTimeout(() => {
    $sk.style.transition = 'opacity 0.8s ease';
    $sk.style.opacity = '0';
    setTimeout(() => { $sk.style.display = 'none'; }, 800);
  }, 1200);
}

function doWorldsReveal() {
  if (worldsFired) return; worldsFired = true;
}

/* ── WORLD GRADIENT ── */
function drawWorldGradient() {
  const f=worldFade; if(f<.004) return;
  const bx=balance, kS=.5+kinPres*.9, dS=.08+dredPres*.10;
  const kb=ctx.createLinearGradient(0,0,bx+W*.18,0);
  kb.addColorStop(0,`rgba(18,12,3,${f})`); kb.addColorStop(.55,`rgba(10,7,2,${f*.60})`); kb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=kb; ctx.fillRect(0,0,W,H);
  const kg=ctx.createRadialGradient(W*.15+(smx-.5)*W*.06,H*.28,0,W*.15+(smx-.5)*W*.06,H*.28,H*.75);
  kg.addColorStop(0,`rgba(200,130,0,${(.06+kinPres*.08)*f})`); kg.addColorStop(.5,`rgba(140,80,0,${.03*f})`); kg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=kg; ctx.fillRect(0,0,W,H);
  WAVES.forEach(w => {
    ctx.beginPath();
    const base=w.yR*H, amp=(H*.022+w.yR*3)*kS;
    for (let x=0; x<=bx+W*.10; x+=2) {
      const y=base+Math.sin(w.freq*x+w.phase+frameN*w.spd)*amp;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(255,212,0,${w.al*f*kS})`; ctx.lineWidth=.8; ctx.stroke();
  });
  const db=ctx.createLinearGradient(W,0,bx-W*.18,0);
  db.addColorStop(0,`rgba(6,4,22,${f})`); db.addColorStop(.55,`rgba(4,3,14,${f*.60})`); db.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=db; ctx.fillRect(0,0,W,H);
  const dg=ctx.createRadialGradient(W*.85+(smx-.5)*W*.06,H*.20,0,W*.85+(smx-.5)*W*.06,H*.20,H*.70);
  dg.addColorStop(0,`rgba(50,34,175,${dS*f})`); dg.addColorStop(.4,`rgba(30,20,120,${dS*.35*f})`); dg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=dg; ctx.fillRect(0,0,W,H);
  const dom=Math.abs(smx-.5)*2, sW=lerp(110,32,dom), sI=lerp(.012,.040,dom);
  const sh=ctx.createLinearGradient(bx-sW,0,bx+sW,0);
  sh.addColorStop(0,'rgba(255,255,255,0)'); sh.addColorStop(.4,`rgba(255,255,255,${sI*.4})`);
  sh.addColorStop(.5,`rgba(255,255,255,${sI})`); sh.addColorStop(.6,`rgba(255,255,255,${sI*.4})`); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fillRect(bx-sW,0,sW*2,H);
}

/* ── CHARACTER IMAGES ── */
function positionChars(ph, phP) {
  const ki=document.getElementById('kin-char'), dr=document.getElementById('dred-char');
  const h=charH(); [ki,dr].forEach(el=>{el.style.height=h+'px';el.style.width='auto';});
  const kW=ki.naturalWidth&&ki.naturalHeight ? h*(ki.naturalWidth/ki.naturalHeight) : h*.78;
  const dW=dr.naturalWidth&&dr.naturalHeight ? h*(dr.naturalWidth/dr.naturalHeight) : h*.78;
  const dpx=(smx-.5)*22, dpy=(smy-.5)*10;
  if (ph==='WRIGGLE') {
    ki.style.transition='none'; dr.style.transition='none';
    const rev=eOut(clamp((phP-.55)/.36,0,1));
    ki.style.left   = Math.max(0, kinCX()-kW*.5+dpx*.18)+'px';
    ki.style.transform = `translateX(${dpx*.10}px) translateY(${dpy}px)`;
    ki.style.opacity = lerp(0,.90,rev).toFixed(3);
    ki.style.filter  = `brightness(${lerp(0,1,rev).toFixed(3)})`;
    dr.style.right   = Math.max(0,(W-dredCX())-dW*.5-dpx*.18)+'px'; dr.style.left='auto';
    dr.style.transform = `scaleX(-1) translateX(${-dpx*.10}px) translateY(${dpy}px)`;
    dr.style.opacity = lerp(0,.88,rev).toFixed(3);
    dr.style.filter  = `brightness(${lerp(0,1,rev).toFixed(3)})`;
    return;
  }
  if (ph==='WORLDS') {
    const kF=lerp(10,-14,kinPres), dF=lerp(10,-14,dredPres);
    ki.style.left   = Math.max(0, kinCX()-kW*.5+dpx*.18)+'px';
    ki.style.transform = `translateX(${dpx*.10}px) translateY(${dpy+kF}px) scale(${lerp(.965,1.04,kinPres).toFixed(4)})`;
    ki.style.opacity = lerp(.65,.94,kinPres).toFixed(3);
    ki.style.filter  = `brightness(${lerp(.72,1.20,kinPres).toFixed(3)})`;
    dr.style.right   = Math.max(0,(W-dredCX())-dW*.5-dpx*.18)+'px'; dr.style.left='auto';
    dr.style.transform = `scaleX(-1) translateX(${-dpx*.10}px) translateY(${dpy+dF}px) scale(${lerp(.965,1.04,dredPres).toFixed(4)})`;
    dr.style.opacity = lerp(.62,.92,dredPres).toFixed(3);
    // DRED hover: brightness dims slightly — present but withdrawing
    const dredBright = dredHovered
      ? lerp(.72,1.14,dredPres) * 0.62
      : lerp(.72,1.14,dredPres);
    dr.style.filter  = `brightness(${dredBright.toFixed(3)})`;
  }
}

/* ── CURSOR STYLE ── */
function updateCursor(ph) {
  if (IS_TOUCH) return;
  if (ph!=='WORLDS') {
    Object.assign($cur.style,{width:'8px',height:'8px',borderRadius:'50%',background:'#fff',mixBlendMode:'difference'});
    return;
  }
  // DRED hover: cursor shrinks to almost nothing
  if (dredHovered) {
    Object.assign($cur.style,{width:'2px',height:'2px',borderRadius:'50%',background:'rgba(91,79,207,.4)',mixBlendMode:'normal'});
    return;
  }
  const z=mx/W, bP=balance/W, tol=.10, lE=bP-tol, rE=bP+tol;
  if (z < lE)
    Object.assign($cur.style,{width:'13px',height:'13px',borderRadius:'50%',background:'#FFE800',mixBlendMode:'normal'});
  else if (z > rE)
    Object.assign($cur.style,{width:'2px',height:'22px',borderRadius:'2px',background:'#5B4FCF',mixBlendMode:'normal'});
  else {
    const t=(z-lE)/(tol*2);
    Object.assign($cur.style,{
      width:lerp(13,2,t)+'px', height:lerp(13,22,t)+'px',
      borderRadius:lerp(6.5,2,t)+'px',
      background:`rgb(${~~lerp(255,91,t)},${~~lerp(232,79,t)},${~~lerp(0,207,t)})`,
      mixBlendMode:'normal',
    });
  }
}

/* ══════════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════════ */
function frame(ts) {
  if (!lastTs) lastTs = ts;
  const rawDt = Math.min((ts-lastTs)/1000, .05); lastTs=ts; frameN++;
  smx += (nmx-smx)*.04; smy += (nmy-smy)*.04;

  elapsed += rawDt * (skipMode ? 10 : 1);
  if (skipMode) skipVig = clamp(skipVig + rawDt*1.8, 0, .72);

  const {n:ph, p:phP} = getPhase(elapsed);

  if (skipMode && ph==='WORLDS' && skipVig>0) {
    skipVig = clamp(skipVig - rawDt*.7, 0, .72);
    if (skipVig < .01) skipMode = false;
  }

  if (!balance) balance = W/2;
  if (ph==='WORLDS')  balance += (lerp(W*.32,W*.68,smx)-balance)*.04;
  if (ph==='WRIGGLE' && phP>.45) worldFade = clamp(worldFade+.0013, 0, 1);
  if (ph==='WORLDS')  { worldFade=clamp(worldFade+.0015,0,1); kinPres+=((1-smx)-kinPres)*.030; dredPres+=(smx-dredPres)*.030; }

  ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if (worldFade>.004) drawWorldGradient();
  if (ph==='WORLDS') {
    const kd=clamp(1-smx*2,0,1), dd=clamp(smx*2-1,0,1);
    if(kd>.005){ctx.fillStyle=`rgba(255,135,20,${kd*.032})`;ctx.fillRect(0,0,W,H);}
    if(dd>.005){ctx.fillStyle=`rgba(28,18,160,${dd*.038})`;ctx.fillRect(0,0,W,H);}
  }

  if (ph==='ORBIT' && phP>.40) {
    const gp=clamp((phP-.40)/.60,0,1);
    [[W*.40,'255,232,0'],[W*.60,'91,79,207']].forEach(([x,col])=>{
      const g=ctx.createRadialGradient(x,H*.5,0,x,H*.5,W*.18);
      g.addColorStop(0,`rgba(${col},${gp*.04})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });
  }

  if (ph==='CAPTURE' || ph==='WRIGGLE') {
    const bhP = ph==='CAPTURE' ? eIn(phP) : 1;
    [[kinCX(),PLANET_Y(),'255,232,0'],[dredCX(),PLANET_Y(),'91,79,207']].forEach(([x,y,col])=>{
      const pg=ctx.createRadialGradient(x,y,0,x,y,180*bhP);
      pg.addColorStop(0,`rgba(${col},${.10*bhP})`); pg.addColorStop(.5,`rgba(${col},${.04*bhP})`); pg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    });
    if (ph==='WRIGGLE') {
      const sg=clamp(phP*1.5,0,1);
      [[kinCX(),'255,232,0'],[dredCX(),'91,79,207']].forEach(([x,col])=>{
        const g=ctx.createRadialGradient(x,H*.52,0,x,H*.52,H*.42*sg);
        g.addColorStop(0,`rgba(${col},${.07*sg})`); g.addColorStop(.6,`rgba(${col},${.02*sg})`); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
    }
  }

  // Activate particles
  let tgt = 0;
  if      (ph==='EMERGE') tgt = Math.floor(lerp(0, POOL, eOut(phP)));
  else if (ph!=='DARK')   tgt = POOL;
  let aN=0; parts.forEach(p=>{if(p.active)aN++;});
  if (aN < tgt) {
    let n = tgt-aN;
    for (let i=0; i<parts.length && n>0; i++) {
      if (parts[i].active) continue;
      const p=parts[i];
      p.active=true; p.activatedAt=elapsed;
      const a=Math.random()*Math.PI*2, r=85+Math.random()*Math.min(W,H)*.30;
      p.x=W/2+Math.cos(a)*r; p.y=H/2+Math.sin(a)*r;
      p.orbitA=a; p.orbitR=r; p.vx=0; p.vy=0;
      aN++; n--;
    }
  }

  if (ph==='CAPTURE' && !captureInited)          doCaptureInit();
  if (ph==='WRIGGLE' && phP>=0.55 && !titleFired) doTitleReveal();
  if (ph==='WORLDS'  && !worldsFired)             doWorldsReveal();
  if (ph==='WRIGGLE' || ph==='WORLDS')            positionChars(ph, phP);
  updateCursor(ph);

  /* ═══════════════════════════════════════════
     PARTICLE UPDATE + DRAW
  ═══════════════════════════════════════════ */
  parts.forEach(p => {
    if (!p.active) return;
    /* EMERGE */
    if (ph==='EMERGE') {
      const fi = clamp((elapsed-p.activatedAt)/.6, 0, 1);
      p.noiseA += p.noiseSpd;
      const dx=p.x-W/2, dy=p.y-H/2, dist=Math.hypot(dx,dy)||1;
      p.vx += -(dy/dist)*lerp(0,.09,eOut(phP)) + Math.cos(p.noiseA)*lerp(.022,.004,phP);
      p.vy +=  (dx/dist)*lerp(0,.09,eOut(phP)) + Math.sin(p.noiseA)*lerp(.022,.004,phP);
      p.vx += -dx*.0006; p.vy += -dy*.0006;
      p.vx *= .94; p.vy *= .94; p.x += p.vx; p.y += p.vy;
      p.orbitA = Math.atan2(p.y-H/2, p.x-W/2);
      p.orbitR = Math.hypot(p.x-W/2, p.y-H/2);
      p.r=160; p.g=170; p.b=210;
      p.alpha = lerp(.04,.40,eOut(phP))*fi;
      p.sz    = lerp(.5,.85,phP);
    }

    /* ORBIT */
    else if (ph==='ORBIT') {
      p.orbitA += p.orbitDir*p.orbitSpd;
      p.orbitR += (CENTER_R-p.orbitR)*.0015;
      p.x = W/2+Math.cos(p.orbitA)*p.orbitR;
      p.y = H/2+Math.sin(p.orbitA)*p.orbitR;
      const cp = eIO(clamp((phP-.10)/.90,0,1))*.88;
      if (p.side==='kin') { p.r=255; p.g=lerp(200,232,cp); p.b=lerp(190,0,cp); }
      else                { p.r=lerp(200,91,cp); p.g=lerp(190,79,cp); p.b=lerp(220,207,cp); }
      p.alpha = lerp(.30,.56,phP);
      p.sz    = lerp(.8,1.20,phP);
    }

    /* CAPTURE — launch Bézier from current orbit position
       When captureAt is reached: start Bézier from current position immediately.
       No 3× racing, no angle-waiting, no snap.
       captureAt spread (0–0.60) staggers departures in time → paths don't pile up.
    */
    else if (ph==='CAPTURE') {
      if (!p.captured) {
        p.orbitA += p.orbitDir*p.orbitSpd; // normal speed
        p.orbitR += (CENTER_R-p.orbitR)*.001;
        p.x = W/2+Math.cos(p.orbitA)*p.orbitR;
        p.y = H/2+Math.sin(p.orbitA)*p.orbitR;
        if (phP >= p.captureAt) {
          // Launch Bézier from current position — no snap, no disappear
          p.captured=true; p.capturedAtT=elapsed; p.vx=0; p.vy=0;
          p.bx0=p.x; p.by0=p.y;
          if (p.side==='kin') { p.bx3=kinCX();  p.by3=PLANET_Y()-ORBIT_R; }
          else                { p.bx3=dredCX(); p.by3=PLANET_Y()+ORBIT_R; }
          const chDx=p.bx3-p.bx0, chDy=p.by3-p.by0;
          const chLen=Math.hypot(chDx,chDy)||1;
          const pX=chDy/chLen, pY=-chDx/chLen;
          const bow=IS_TOUCH ? 15+Math.random()*10 : 50+Math.random()*30;
          const jit=()=>(Math.random()-.5)*14;
          p.bx1=p.bx0+chDx/3+pX*bow+jit(); p.by1=p.by0+chDy/3+pY*bow+jit();
          p.bx2=p.bx0+2*chDx/3-pX*bow*1.5+jit(); p.by2=p.by0+2*chDy/3-pY*bow*1.5+jit();
        }
      } else if (!p.arrived) {
        const cp=clamp((elapsed-p.capturedAtT)/TRANSIT_DUR, 0, 1);
        const t=eIO(cp), mt=1-t;
        p.x = mt*mt*mt*p.bx0+3*mt*mt*t*p.bx1+3*mt*t*t*p.bx2+t*t*t*p.bx3;
        p.y = mt*mt*mt*p.by0+3*mt*mt*t*p.by1+3*mt*t*t*p.by2+t*t*t*p.by3;
        if (cp >= 0.97) {
          p.arrived  = true;
          p.orbitDir = p.side==='kin' ? -1 : 1;
          const ax=p.side==='kin'?kinCX():dredCX(), ay=PLANET_Y();
          const baseA = Math.atan2(p.by3-ay, p.bx3-ax);
          const captureElapsed = Math.max(0, elapsed-CAPTURE_START);
          p.orbitA = baseA + p.orbitDir*p.orbitSpd*60*captureElapsed;
          p.orbitR = ORBIT_R;
          p.vx=0; p.vy=0;
        }
      } else {
        const ax=p.side==='kin'?kinCX():dredCX(), ay=PLANET_Y();
        p.orbitA += p.orbitDir*p.orbitSpd;
        p.orbitR  = ORBIT_R;
        p.x = ax+Math.cos(p.orbitA)*p.orbitR;
        p.y = ay+Math.sin(p.orbitA)*p.orbitR;
      }
      if (p.side==='kin') {p.r=255;p.g=232;p.b=0;} else {p.r=91;p.g=79;p.b=207;}
      p.alpha = p.arrived ? lerp(.50,.68,eIn(phP)) : .54;
      p.sz    = p.arrived ? lerp(.85,1.10,phP)     : .80;
    }

    /* WRIGGLE — oscilloscope spatial waves → silhouette → image */
    else if (ph==='WRIGGLE') {
      const ax=p.side==='kin'?kinCX():dredCX(), ay=PLANET_Y();
      p.orbitA += p.orbitDir*p.orbitSpd*lerp(2.2,.04,eIO(phP));
      const baseR = lerp(ORBIT_R, ORBIT_R*.85, eIO(phP));
      const t=frameN;
      const wave =
        Math.sin(p.orbitA*2.3 + t*.024)*1.00 +
        Math.sin(p.orbitA*3.7 - t*.017)*.72  +
        Math.sin(p.orbitA*5.1 + t*.012)*.50  +
        Math.sin(p.orbitA*7.3 - t*.030)*.32  +
        Math.sin(p.orbitA*1.5 + t*.008)*.88;
      const ampGrow = eOut(clamp((phP-.10)/.22,0,1));
      const ampFade = eIn(clamp(1-(phP-.58)/.36,0,1));
      const gMod    = clamp(.30+.38*Math.sin(t*.0037+1.2)+.22*Math.sin(t*.0059-.8)+.18*Math.sin(t*.0091+2.3), 0, 1);
      const rDist   = baseR+wave*ampGrow*ampFade*gMod*72;
      const bX=ax+Math.cos(p.orbitA)*rDist, bY=ay+Math.sin(p.orbitA)*rDist;
      const tBlend = eIn(clamp((phP-.50)/.50,0,1));
      const k = lerp(.028,.14,tBlend);
      p.vx += (lerp(bX,p.tx,tBlend)-p.x)*k; p.vy += (lerp(bY,p.ty,tBlend)-p.y)*k;
      p.vx *= lerp(.86,.80,phP); p.vy *= lerp(.86,.80,phP);
      p.x += p.vx; p.y += p.vy;
      if (p.side==='kin') {p.r=255;p.g=232;p.b=0;} else {p.r=91;p.g=79;p.b=207;}
      p.alpha = lerp(.60, 0, eIn(clamp((phP-.72)/.25,0,1)));
      p.sz    = lerp(1.0,.18,eOut(clamp(phP/.97,0,1)));
    }

    /* WORLDS */
    else if (ph==='WORLDS') {
      p.noiseA += p.noiseSpd*.5; p.vx *= .95; p.vy *= .95;
      if (p.side==='kin') {
        const dom=clamp(1-smx,0,1);
        p.vx += Math.cos(p.noiseA)*lerp(.010,.020,dom); p.vy -= lerp(.032,.058,dom);
        p.r=255; p.g=lerp(200,220,dom); p.b=0;
        p.alpha = clamp(.012+Math.sin(frameN*.038+p.orbitA)*.016+dom*.030, 0, lerp(.045,.11,dom));
        p.sz    = lerp(.20,.50,dom)+Math.random()*.30;
        if (p.y<-10||p.x>balance+80) { p.x=Math.random()*Math.min(balance+60,W*.55); p.y=H+5; p.vx=0;p.vy=0; }
      } else {
        const dom=clamp(smx,0,1);
        p.vx += Math.cos(p.noiseA)*lerp(.008,.016,dom); p.vy += lerp(.036,.062,dom);
        p.r=91; p.g=79; p.b=lerp(180,215,dom);
        p.alpha = clamp(.012+Math.sin(frameN*.038+p.orbitA)*.016+dom*.030, 0, lerp(.045,.11,dom));
        p.sz    = lerp(.20,.50,dom)+Math.random()*.30;
        // DRED hover: particles gently drift away from cursor
        if (dredHovered) {
          const pdx = p.x - mx, pdy = p.y - my;
          const pdist = Math.hypot(pdx, pdy) || 1;
          if (pdist < 120) {
            const force = (120 - pdist) / 120 * 0.06;
            p.vx += (pdx / pdist) * force;
            p.vy += (pdy / pdist) * force;
          }
        }
        if (p.y>H+10||p.x<balance-80) { p.x=Math.max(balance-60,W*.45)+Math.random()*(W-Math.max(balance-60,W*.45)); p.y=Math.random()*H*.3; p.vx=0;p.vy=0; }
      }
      p.x += p.vx; p.y += p.vy;
    }

    const a=clamp(p.alpha,0,1);
    if (a<.004) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(.18,p.sz), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${~~p.r},${~~p.g},${~~p.b},${a.toFixed(3)})`;
    ctx.fill();
  });

  if (skipVig>.004) {
    ctx.fillStyle=`rgba(0,0,0,${skipVig.toFixed(3)})`; ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(frame);
}

initParts();
requestAnimationFrame(frame);

const LINES = {
  light: [
    "오래 봤더니 궁금해졌지?",
    "took you long enough.",
    "어, 나 봤어?",
    "you found me.",
  ],
  mid: [

    "여기까지 왔으면서.",

    "it's not that deep. just come in.",
  ],
  direct: [
    "나 지금 기다리는 거 진짜 싫은데.",
    "waiting is my least favorite thing.",
    "해봤어? 안 해봤으면 말을 마.",
    "같이 해보자. 별거 없어.",
    "let's just go. you can think later.",
    "you'll like it. probably.",
  ],
};

const $kinZone  = document.getElementById('kin-zone');
const $dredZone = document.getElementById('dred-zone');
const $bubble   = document.getElementById('kin-bubble');
const $bwrap    = document.getElementById('bwrap');
const $btxt     = document.getElementById('btxt');
const $bcur     = document.getElementById('bcur');

let visitCount = 0;
let typeTimer  = null;
const lastIdx  = { light:-1, mid:-1, direct:-1 };

// Random offset slots around KIN: right-top, right-mid, right-bot, left-top, left-mid, left-bot
const SLOTS = [
  { side:'right', vPos:'top'  },
  { side:'right', vPos:'mid'  },
  { side:'right', vPos:'bot'  },
  { side:'left',  vPos:'top'  },
  { side:'left',  vPos:'mid'  },
  { side:'left',  vPos:'bot'  },
];
let lastSlot = -1;

function pickSlot() {
  let idx;
  do { idx = Math.floor(Math.random() * SLOTS.length); }
  while (SLOTS.length > 1 && idx === lastSlot);
  lastSlot = idx;
  return SLOTS[idx];
}

function getBucket() {
  if (visitCount <= 1) return 'light';
  if (visitCount <= 3) return 'mid';
  return 'direct';
}

function pick(b) {
  const pool = LINES[b];
  let i;
  do { i = Math.floor(Math.random() * pool.length); }
  while (pool.length > 1 && i === lastIdx[b]);
  lastIdx[b] = i;
  return pool[i];
}

function typewrite(text) {
  clearTimeout(typeTimer);
  $btxt.textContent = '';
  $bcur.style.display = 'inline-block';
  const spd = Math.max(28, Math.min(58, Math.floor(820 / text.length)));
  let i = 0;
  (function tick() {
    $btxt.textContent = text.slice(0, i++);
    if (i <= text.length) typeTimer = setTimeout(tick, spd);
  })();
}

function placeBubble(slot, rect) {
  const GAP = 16;
  // Vertical position
  let top;
  if      (slot.vPos === 'top') top = rect.top  + rect.height * 0.15;
  else if (slot.vPos === 'mid') top = rect.top  + rect.height * 0.42;
  else                          top = rect.top  + rect.height * 0.68;

  // Horizontal: right or left of KIN
  let left;
  const flip = slot.side === 'left';
  if (flip) {
    left = rect.left - GAP - 240; // estimate bubble width ~240
    // guard against going off left edge
    if (left < 8) left = rect.right + GAP;
  } else {
    left = rect.right + GAP;
    // guard against going off right edge
    if (left + 240 > window.innerWidth - 8) left = rect.left - GAP - 240;
  }

  $bwrap.className = 'bwrap' +
    (left < rect.left ? ' flip' : '') +
    (slot.vPos === 'top' ? ' tail-top' : slot.vPos === 'bot' ? ' tail-bot' : '');

  $bubble.style.left = Math.max(8, left) + 'px';
  $bubble.style.top  = Math.max(8, top)  + 'px';
}

function showBubble() {
  const ph = getPhase(elapsed).n;
  if (ph !== 'WORLDS') return;
  visitCount++;
  const b    = getBucket();
  const text = pick(b);
  const ki   = document.getElementById('kin-char');
  const rect = ki.getBoundingClientRect();
  const slot = pickSlot();
  placeBubble(slot, rect);
  $bubble.classList.add('on');
  typewrite(text);
}

function hideBubble() {
  clearTimeout(typeTimer);
  $bubble.classList.remove('on');
}

// Sync zone divs to character image positions
function syncZones() {
  const ph = getPhase(elapsed).n;
  const active = ph === 'WORLDS';
  const pe = active ? 'all' : 'none';

  if (IS_TOUCH) {
    // 모바일: 화면 정확히 절반씩 분할
    $kinZone.style.left   = '0px';
    $kinZone.style.width  = (W/2) + 'px';
    $kinZone.style.height = H + 'px';
    $kinZone.style.pointerEvents = pe;

    $dredZone.style.left   = (W/2) + 'px';
    $dredZone.style.width  = (W/2) + 'px';
    $dredZone.style.height = H + 'px';
    $dredZone.style.pointerEvents = pe;
  } else {
    // 데스크탑: 이미지 영역 기반
    const ki  = document.getElementById('kin-char');
    const dr  = document.getElementById('dred-char');
    const kiR = ki.getBoundingClientRect();
    const drR = dr.getBoundingClientRect();

    $kinZone.style.left   = kiR.left   + 'px';
    $kinZone.style.width  = kiR.width  + 'px';
    $kinZone.style.height = kiR.height + 'px';
    $kinZone.style.pointerEvents = pe;
    $kinZone.style.cursor = active ? 'pointer' : 'default';

    $dredZone.style.left   = drR.left   + 'px';
    $dredZone.style.width  = drR.width  + 'px';
    $dredZone.style.height = drR.height + 'px';
    $dredZone.style.pointerEvents = pe;
  }
}

setInterval(syncZones, 120);

// KIN: show on enter, hide on leave
$kinZone.addEventListener('mouseenter', showBubble);
$kinZone.addEventListener('mouseleave', hideBubble);

// 모바일: tap 판별 후 네비게이션
if (IS_TOUCH) {
  let kinTx0 = 0, kinTy0 = 0;
  $kinZone.addEventListener('touchstart', e => {
    kinTx0 = e.touches[0].clientX;
    kinTy0 = e.touches[0].clientY;
    showBubble();
  }, {passive:true});
  $kinZone.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - kinTx0;
    const dy = e.changedTouches[0].clientY - kinTy0;
    if (Math.hypot(dx,dy) < 12 && getPhase(elapsed).n === 'WORLDS') {
      hideBubble();
      navTo('./kin/');
    } else {
      setTimeout(hideBubble, 1400);
    }
  }, {passive:true});
}

/* ══════════════════════════════════════════════════
   DRED HOVER — silence with three micro-signals
══════════════════════════════════════════════════ */
$dredZone.addEventListener('mouseenter', () => { dredHovered = true;  });
$dredZone.addEventListener('mouseleave', () => { dredHovered = false; });

if (IS_TOUCH) {
  let dredTx0 = 0, dredTy0 = 0;
  $dredZone.addEventListener('touchstart', e => {
    dredTx0 = e.touches[0].clientX;
    dredTy0 = e.touches[0].clientY;
    dredHovered = true;
  }, {passive:true});
  $dredZone.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - dredTx0;
    const dy = e.changedTouches[0].clientY - dredTy0;
    if (Math.hypot(dx,dy) < 12 && getPhase(elapsed).n === 'WORLDS') {
      navTo('./dred/');
    } else {
      setTimeout(() => { dredHovered = false; }, 800);
    }
  }, {passive:true});
}

/* ══════════════════════════════════════════════════
   NAVIGATION — KIN → kin.html / DRED → dred.html
══════════════════════════════════════════════════ */
const $navOverlay = document.getElementById('nav-overlay');

function navTo(href) {
  $navOverlay.style.pointerEvents = 'all';
  $navOverlay.style.opacity = '1';
  setTimeout(() => { window.location.href = href; }, 450);
}

$kinZone.addEventListener('click', () => {
  if (getPhase(elapsed).n !== 'WORLDS') return;
  hideBubble();
  navTo('./kin/');
});

$dredZone.addEventListener('click', () => {
  if (getPhase(elapsed).n !== 'WORLDS') return;
  navTo('./dred/');
});
</script>
</body>
</html>
