<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRED — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'DM Mono',monospace;cursor:none}
@media(pointer:coarse){html,body{cursor:auto}}

:root{--dred:#5B4FCF;--bg:#000}

#cur{position:fixed;z-index:999;width:8px;height:8px;border-radius:50%;
  background:var(--dred);pointer-events:none;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .2s,height .2s}
#cur.drag{width:20px;height:20px}

#grain{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
  background-size:200px;animation:gr .3s steps(1) infinite}
@keyframes gr{0%{background-position:0 0}33%{background-position:-40px 30px}66%{background-position:30px -40px}}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 32px;
  background:linear-gradient(rgba(0,0,0,.7),transparent);
}
.h-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--dred)}
.h-back{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.25);
  text-transform:uppercase;cursor:pointer;transition:color .2s}
.h-back:hover{color:var(--dred)}

/* ── LANG TOGGLE ── */
#lang-toggle{display:flex;gap:0;align-items:center;font-size:8px;letter-spacing:.2em;}
.lt{padding:4px 8px;cursor:pointer;color:rgba(255,255,255,.2);transition:color .2s;user-select:none;}
.lt.active{color:var(--dred);}
.lt-sep{color:rgba(255,255,255,.1);font-size:8px}

/* ── STRIP ── */
#strip-wrap{
  position:fixed;inset:0;top:60px;display:flex;align-items:center;
  user-select:none;-webkit-user-select:none;
}
#strip{
  display:flex;align-items:center;gap:20px;
  padding:0 calc(50vw - 160px);
  will-change:transform;
}

/* ── FRAME ── */
.frame{
  flex:0 0 auto;
  width:280px;height:380px;
  position:relative;overflow:hidden;
  cursor:grab;
  transition:filter .12s linear, opacity .12s linear;
}
.frame:active{cursor:grabbing}
.frame img{
  width:100%;height:100%;object-fit:cover;
  display:block;pointer-events:none;
}

.frame-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.75) 100%);
  opacity:0;transition:opacity .4s ease;
  display:flex;align-items:flex-end;padding:16px;
}
.frame:hover .frame-overlay{opacity:1}
.frame-caption{
  font-size:9px;letter-spacing:.22em;color:rgba(91,79,207,.8);
  text-transform:uppercase;line-height:1.8;
}

/* ── DETAIL PANEL ── */
#detail-panel{
  position:fixed;inset:0;z-index:200;
  display:none;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
#detail-panel.open{display:flex;align-items:center;justify-content:center;}

#detail-inner{
  display:flex;gap:clamp(24px,4vw,60px);align-items:flex-start;
  width:90%;max-width:860px;
  animation:fadeUp .4s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

#detail-img{
  flex:0 0 auto;
  width:clamp(140px,24vw,280px);
  aspect-ratio:3/4;
  overflow:hidden;
  border:1px solid rgba(91,79,207,.2);
}
#detail-img img{width:100%;height:100%;object-fit:cover;display:block;}

#detail-text{flex:1 1 auto;overflow-y:auto;max-height:80vh;padding-right:8px;}
#detail-eyebrow{font-size:8px;letter-spacing:.32em;color:rgba(91,79,207,.3);text-transform:uppercase;margin-bottom:10px;}
#detail-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(22px,3.5vw,48px);
  color:var(--dred);letter-spacing:-.02em;line-height:1;margin-bottom:10px;
}
#detail-style{font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.15);margin-bottom:16px;}
#detail-desc{font-size:11px;line-height:1.85;color:rgba(255,255,255,.35);margin-bottom:16px;}

.perspective-block{margin-bottom:12px;}
.perspective-label{font-size:7px;letter-spacing:.28em;color:rgba(91,79,207,.3);text-transform:uppercase;margin-bottom:4px;}
.perspective-text{font-size:11px;line-height:1.75;color:rgba(255,255,255,.28);}

#detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;}
.action-btn{
  font-size:7px;letter-spacing:.22em;text-transform:uppercase;
  padding:6px 12px;border:1px solid rgba(91,79,207,.25);
  color:rgba(91,79,207,.5);cursor:pointer;
  transition:border-color .2s,color .2s;
  text-decoration:none;display:inline-block;
}
.action-btn:hover{border-color:var(--dred);color:var(--dred);}

#detail-close{
  display:inline-block;font-size:8px;letter-spacing:.28em;
  color:rgba(255,255,255,.18);text-transform:uppercase;
  cursor:pointer;transition:color .2s;margin-top:16px;
}
#detail-close:hover{color:var(--dred)}

#detail-nav{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:none;gap:24px;z-index:201;
}
#detail-panel.open ~ #detail-nav,
#detail-panel.open + * #detail-nav{display:flex}
.dn{font-size:9px;letter-spacing:.28em;color:rgba(255,255,255,.18);
  cursor:pointer;transition:color .2s;padding:10px;user-select:none}
.dn:hover{color:var(--dred)}
#detail-counter{font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.12);display:flex;align-items:center}

/* ── FOCUS DOTS ── */
#focus-dot{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;z-index:50;pointer-events:none;
}
.fdot{width:4px;height:4px;border-radius:50%;background:rgba(91,79,207,.2);transition:all .3s}
.fdot.active{background:var(--dred);transform:scale(1.4)}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:300;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
#loading span{
  font-size:9px;letter-spacing:.4em;color:rgba(91,79,207,.4);
  text-transform:uppercase;animation:pulse 1.4s ease infinite;
}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── HINT ── */
#hint{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.4em;color:rgba(255,255,255,.15);
  text-transform:uppercase;pointer-events:none;transition:opacity .5s;
}

@media(max-width:680px){
  .frame{width:220px;height:300px;}
  #strip{padding:0 calc(50vw - 110px);}
  #detail-inner{flex-direction:column;gap:14px;padding:0 16px;}
  #detail-img{width:100%;aspect-ratio:16/9;}
  #detail-desc{display:none}
  .perspective-block{display:none}
}
</style>
</head>
<body>
<div id="loading"><span>loading</span></div>
<div id="grain"></div>
<div id="cur"></div>

<div id="header">
  <div class="h-name">DRED</div>
  <div id="lang-toggle">
    <span class="lt" id="lt-ko">KO</span>
    <span class="lt-sep">·</span>
    <span class="lt" id="lt-en">EN</span>
  </div>
  <div class="h-back">← back</div>
</div>

<div id="strip-wrap">
  <div id="strip"></div>
</div>

<div id="hint">drag to explore</div>
<div id="focus-dot"></div>

<div id="detail-panel">
  <div id="detail-inner">
    <div id="detail-img"><img id="detail-img-el" src="" alt=""></div>
    <div id="detail-text">
      <div id="detail-eyebrow"></div>
      <div id="detail-title"></div>
      <div id="detail-style"></div>
      <div id="detail-desc"></div>
      <div class="perspective-block">
        <div class="perspective-label">KIN</div>
        <div class="perspective-text" id="detail-kin"></div>
      </div>
      <div class="perspective-block">
        <div class="perspective-label">DRED</div>
        <div class="perspective-text" id="detail-dred"></div>
      </div>
      <div id="detail-actions"></div>
      <div id="detail-close">close ×</div>
    </div>
  </div>
</div>

<div id="detail-nav">
  <div class="dn" id="dn-prev">←</div>
  <div class="dn" id="detail-counter"></div>
  <div class="dn" id="dn-next">→</div>
</div>

<script>
/* ── CONFIG ── */
const SUPA_URL = 'https://aurbgjnbfatcqgovwagp.supabase.co';
const SUPA_KEY = 'sb_publishable_Eg-9eLFO2wAe0NiJBJWqcA_t8MSg1t_'; // ← 여기 채워줘
const IMG_BASE = `${SUPA_URL}/storage/v1/object/public/assets/dred/`;

/* ── STATE ── */
const IS_TOUCH = window.matchMedia('(pointer:coarse)').matches;
let lang = navigator.language.startsWith('ko') ? 'ko' : 'en';
let items = [];
let currentIdx = 0;
let offset = 0, targetOffset = 0;
let isDragging = false, dragStartX = 0, dragStartOffset = 0;
let velocity = 0, lastX = 0, lastT = 0;
let hintHidden = false;

const FRAME_W = IS_TOUCH ? 220 : 280;
const FRAME_GAP = 20;
const STEP = FRAME_W + FRAME_GAP;

/* ── CURSOR ── */
const $cur = document.getElementById('cur');
if (!IS_TOUCH) {
  document.addEventListener('mousemove', e => {
    $cur.style.left = e.clientX + 'px';
    $cur.style.top  = e.clientY + 'px';
  });
} else {
  $cur.style.display = 'none';
}

/* ── LANG TOGGLE ── */
const $ltKo = document.getElementById('lt-ko');
const $ltEn = document.getElementById('lt-en');

function setLang(l) {
  lang = l;
  $ltKo.classList.toggle('active', l === 'ko');
  $ltEn.classList.toggle('active', l === 'en');
  if (items.length) renderStrip();
  if (document.getElementById('detail-panel').classList.contains('open')) {
    fillDetail(currentIdx);
  }
}
$ltKo.addEventListener('click', () => setLang('ko'));
$ltEn.addEventListener('click', () => setLang('en'));
setLang(lang);

/* ── FETCH ── */
async function fetchItems() {
  const res = await fetch(
    `${SUPA_URL}/rest/v1/gallery_items?character=eq.dred&is_active=eq.true&order=order_num.asc`,
    { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
  );
  if (!res.ok) throw new Error('fetch failed');
  return res.json();
}

/* ── BUILD STRIP ── */
const $strip = document.getElementById('strip');
const $dots  = document.getElementById('focus-dot');
let frameEls = [];

function renderStrip() {
  $strip.innerHTML = '';
  $dots.innerHTML  = '';
  frameEls = [];

  const MAX_OFF = -(items.length - 1) * STEP;

  items.forEach((item, i) => {
    const fr = document.createElement('div');
    fr.className = 'frame';

    const title = item[`title_${lang}`] || '';
    fr.innerHTML = `
      <img src="${IMG_BASE}${item.filename}" alt="${title}" loading="lazy">
      <div class="frame-overlay">
        <div class="frame-caption">${title}</div>
      </div>`;

    fr.addEventListener('click', () => {
      const snapped = Math.round(-offset / STEP);
      if (snapped === i) openDetail(i);
      else snapTo(i);
    });

    $strip.appendChild(fr);
    frameEls.push(fr);

    const dot = document.createElement('div');
    dot.className = 'fdot' + (i === 0 ? ' active' : '');
    $dots.appendChild(dot);
  });
}

/* ── STRIP ANIMATION ── */
function clamp(v, a, b) { return Math.min(b, Math.max(a, v)); }

function snapTo(idx) {
  idx = clamp(idx, 0, items.length - 1);
  targetOffset = -idx * STEP;
}

function getActiveIdx() {
  return clamp(Math.round(-offset / STEP), 0, items.length - 1);
}

function applyVelocityBlur(vel) {
  const absV = Math.abs(vel);
  const blurPx = clamp(absV * 0.18, 0, 14);
  const op = clamp(1 - absV * 0.004, 0.3, 1);
  frameEls.forEach(fr => {
    fr.style.filter  = blurPx > 0.5 ? `blur(${blurPx.toFixed(1)}px)` : '';
    fr.style.opacity = op.toFixed(3);
  });
}

function updateDots(idx) {
  document.querySelectorAll('.fdot').forEach((d, i) =>
    d.classList.toggle('active', i === idx));
}

;(function loop() {
  const diff = targetOffset - offset;
  offset += diff * 0.09;
  velocity = diff * 0.09;
  $strip.style.transform = `translateX(${offset.toFixed(2)}px)`;
  applyVelocityBlur(velocity);
  const idx = getActiveIdx();
  if (idx !== currentIdx && !document.getElementById('detail-panel').classList.contains('open')) {
    currentIdx = idx;
    updateDots(idx);
  }
  requestAnimationFrame(loop);
})();

function hideHint() {
  if (hintHidden) return;
  hintHidden = true;
  document.getElementById('hint').style.opacity = '0';
}

/* ── MOUSE DRAG ── */
if (!IS_TOUCH) {
  const $wrap = document.getElementById('strip-wrap');
  $wrap.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartOffset = offset;
    lastX = e.clientX; lastT = performance.now();
    $cur.classList.add('drag');
    hideHint();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    const now = performance.now();
    velocity = (e.clientX - lastX) / (now - lastT + 1) * 16;
    lastX = e.clientX; lastT = now;
    const MAX_OFF = -(items.length - 1) * STEP;
    targetOffset = clamp(dragStartOffset + dx, MAX_OFF, 0);
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    $cur.classList.remove('drag');
    if (Math.abs(velocity) > 3) {
      snapTo(getActiveIdx() + (velocity < 0 ? 1 : -1));
    } else {
      snapTo(getActiveIdx());
    }
  });
  $wrap.addEventListener('wheel', e => {
    e.preventDefault();
    hideHint();
    snapTo(getActiveIdx() + Math.sign(e.deltaX || e.deltaY));
  }, {passive:false});
}

/* ── TOUCH ── */
if (IS_TOUCH) {
  const $wrap = document.getElementById('strip-wrap');
  let tStartX = 0, tStartOff = 0, tLastX = 0, tLastT = 0, tVel = 0;
  $wrap.addEventListener('touchstart', e => {
    tStartX = e.touches[0].clientX;
    tStartOff = offset; tLastX = tStartX; tLastT = performance.now(); tVel = 0;
    hideHint();
  }, {passive:true});
  $wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    const dx = e.touches[0].clientX - tStartX;
    const now = performance.now();
    tVel = (e.touches[0].clientX - tLastX) / (now - tLastT + 1) * 16;
    tLastX = e.touches[0].clientX; tLastT = now;
    const MAX_OFF = -(items.length - 1) * STEP;
    targetOffset = clamp(tStartOff + dx, MAX_OFF, 0);
  }, {passive:false});
  $wrap.addEventListener('touchend', () => {
    if (Math.abs(tVel) > 3) snapTo(getActiveIdx() + (tVel < 0 ? 1 : -1));
    else snapTo(getActiveIdx());
  });
}

/* ── DETAIL ── */
const $panel = document.getElementById('detail-panel');

function fillDetail(i) {
  const item = items[i];
  const t = lang;
  document.getElementById('detail-eyebrow').textContent =
    `DRED · ${String(i+1).padStart(2,'0')} / ${items.length}`;
  document.getElementById('detail-title').textContent = item[`title_${t}`] || '';
  document.getElementById('detail-style').textContent = item.style || '';
  document.getElementById('detail-desc').textContent  = item[`description_${t}`] || '';
  document.getElementById('detail-kin').textContent   = item[`kin_perspective_${t}`] || '';
  document.getElementById('detail-dred').textContent  = item[`dred_perspective_${t}`] || '';
  document.getElementById('detail-counter').textContent =
    `${String(i+1).padStart(2,'0')} / ${items.length}`;

  const $img = document.getElementById('detail-img-el');
  $img.src = `${IMG_BASE}${item.filename}`;
  $img.alt = item[`title_${t}`] || '';

  const $acts = document.getElementById('detail-actions');
  $acts.innerHTML = '';
  (item.actions?.[t] || []).forEach(a => {
    const btn = document.createElement('a');
    btn.className = 'action-btn';
    btn.textContent = a.label;
    btn.href = a.url || '#';
    $acts.appendChild(btn);
  });
}

function openDetail(i) {
  currentIdx = i;
  fillDetail(i);
  $panel.classList.add('open');
  document.getElementById('detail-nav').style.display = 'flex';
}

function closeDetail() {
  $panel.classList.remove('open');
  document.getElementById('detail-nav').style.display = 'none';
}

function nav(dir) {
  const next = (currentIdx + dir + items.length) % items.length;
  snapTo(next);
  openDetail(next);
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
$panel.addEventListener('click', e => { if (e.target === $panel) closeDetail(); });
document.getElementById('dn-prev').addEventListener('click', () => nav(-1));
document.getElementById('dn-next').addEventListener('click', () => nav(1));

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if ($panel.classList.contains('open')) {
    if (e.key === 'ArrowRight') nav(1);
    if (e.key === 'ArrowLeft')  nav(-1);
  }
});

/* ── BACK ── */
const $back = document.querySelector('.h-back');
const $backOverlay = document.createElement('div');
Object.assign($backOverlay.style, {
  position:'fixed',inset:'0',background:'#000',opacity:'0',
  pointerEvents:'none',zIndex:'9000',transition:'opacity 0.4s ease'
});
document.body.appendChild($backOverlay);
$back.addEventListener('click', () => {
  $backOverlay.style.pointerEvents = 'all';
  $backOverlay.style.opacity = '1';
  setTimeout(() => { window.location.href = '../main.html'; }, 400);
});

/* ── INIT ── */
const $loading = document.getElementById('loading');
fetchItems()
  .then(data => {
    items = data;
    renderStrip();
    snapTo(0);
    $loading.style.opacity = '0';
    setTimeout(() => { $loading.style.display = 'none'; }, 400);
  })
  .catch(err => {
    console.error(err);
    $loading.querySelector('span').textContent = 'error loading';
  });
</script>
</body>
</html>
